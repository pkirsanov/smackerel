# Smackerel CI — lint, unit test, build on every push/PR
# Runs ./smackerel.sh commands per project CLI contract
name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.24'

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'

    - name: Verify Go module checksums
      run: go mod verify

    - name: Lint
      run: ./smackerel.sh lint

    - name: Unit tests
      run: ./smackerel.sh test unit

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Build Docker images
      run: |
        export SMACKEREL_VERSION="${GITHUB_REF_NAME}"
        export SMACKEREL_COMMIT="${GITHUB_SHA:0:12}"
        export SMACKEREL_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ./smackerel.sh build

    - name: Tag images on version push
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${VERSION}"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${GITHUB_SHA:0:12}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${GITHUB_SHA:0:12}"

    - name: Log in to GHCR
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push images to GHCR
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        CORE_IMAGE="ghcr.io/${{ github.repository_owner }}/smackerel-core"
        ML_IMAGE="ghcr.io/${{ github.repository_owner }}/smackerel-ml"

        COMMIT_SHORT="${GITHUB_SHA:0:12}"
        docker tag smackerel-smackerel-core:latest "${CORE_IMAGE}:${VERSION}"
        docker tag smackerel-smackerel-core:latest "${CORE_IMAGE}:${COMMIT_SHORT}"
        docker push "${CORE_IMAGE}:${VERSION}"
        docker push "${CORE_IMAGE}:${COMMIT_SHORT}"

        docker tag smackerel-smackerel-ml:latest "${ML_IMAGE}:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "${ML_IMAGE}:${COMMIT_SHORT}"
        docker push "${ML_IMAGE}:${VERSION}"
        docker push "${ML_IMAGE}:${COMMIT_SHORT}"

  integration:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: smackerel
          POSTGRES_PASSWORD: smackerel
          POSTGRES_DB: smackerel_test
        ports:
        - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smackerel -d smackerel_test" --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.24'

    - name: Start NATS with auth and JetStream
      run: |
        docker run -d --name nats-ci \
          --network host \
          nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927 \
          --auth ci-test-token-integration \
          --http_port 8222 \
          --jetstream
        timeout 30 bash -c 'until wget -qO- http://localhost:8222/healthz >/dev/null 2>&1; do sleep 1; done'
        echo "NATS is ready with auth enforcement and JetStream enabled"

    - name: Apply database migrations
      env:
        PGPASSWORD: smackerel
      run: |
        for f in internal/db/migrations/*.sql; do
          echo "Applying $f..."
          psql -h localhost -U smackerel -d smackerel_test -f "$f"
        done

    - name: Run integration tests
      env:
        DATABASE_URL: postgres://smackerel:smackerel@localhost:5432/smackerel_test?sslmode=disable
        NATS_URL: nats://localhost:4222
        SMACKEREL_AUTH_TOKEN: ci-test-token-integration
      run: |
        go test -tags=integration ./tests/integration/... -v -count=1 -timeout 10m
