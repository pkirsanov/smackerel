# Smackerel CI — lint, unit test, build on every push/PR
# Runs ./smackerel.sh commands per project CLI contract
name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # spec-047 R7: bumped 10→20 to rule out timing as a possible cause
    # while we diagnose the chronic CI Unit tests failure (see report.md).
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.25'

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'

    - name: Verify Go module checksums
      run: go mod verify

    - name: Lint
      run: ./smackerel.sh lint

    # spec-047 R9: generate the SST-derived config files
    # (config/generated/{dev.env,nats.conf,prometheus.yml}) before unit
    # tests run. R8 artifact-upload diagnostics revealed the chronic Go
    # CI failure root cause: 2 tests in internal/config/docker_security_test.go
    # (TestNATSConf_GeneratedFile_TokenProperlyQuoted and
    # TestNATSConf_HasPayloadAndStorageLimits, spec 046 FR-046-002 adversarial
    # regression coverage) read config/generated/nats.conf via t.Fatalf()
    # if the file does not exist. Locally the file is always present
    # because operators run `./smackerel.sh config generate` during normal
    # workflow; in CI the file is never generated before unit tests run, so
    # the tests fail consistently. The SST-derived config generator is a
    # pure-bash script (scripts/commands/config.sh) with no docker
    # dependency and no host-side state requirement; it is safe to run
    # ahead of unit tests on the GitHub Actions runner.
    - name: Generate SST config files for unit tests
      run: ./smackerel.sh config generate

    # spec-047 R7: split combined "Unit tests" step into Go+Python so the
    # next CI run surfaces which leg fails (the public REST API only
    # exposes step-level pass/fail metadata, not log content). Combined
    # with `set -euxo pipefail` in scripts/runtime/{go,python}-unit.sh,
    # this gives operators step-name attribution even without log access.
    #
    # spec-047 R8: capture each leg's combined stdout+stderr to a log
    # file via `tee` and upload as a workflow artifact. Workflow
    # artifacts on public repos are reachable through the REST artifacts
    # API without admin auth, so this restores observability for
    # operators who lack log-content read permission. Both legs run
    # under `continue-on-error: true` so a Go failure does not skip the
    # Python leg; a final step fails the job if either leg failed.
    - name: Unit tests (Go)
      id: gotest_step
      continue-on-error: true
      shell: bash
      run: |
        set -o pipefail
        ./smackerel.sh test unit --go 2>&1 | tee go-unit-test.log

    - name: Unit tests (Python)
      id: pytest_step
      continue-on-error: true
      shell: bash
      run: |
        set -o pipefail
        ./smackerel.sh test unit --python 2>&1 | tee python-unit-test.log

    - name: Upload Go unit test log
      if: always() && hashFiles('go-unit-test.log') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: go-unit-test-log
        path: go-unit-test.log
        retention-days: 7

    - name: Upload Python unit test log
      if: always() && hashFiles('python-unit-test.log') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-unit-test-log
        path: python-unit-test.log
        retention-days: 7

    - name: Fail job if any unit tests failed
      if: steps.gotest_step.outcome == 'failure' || steps.pytest_step.outcome == 'failure'
      run: |
        echo "Go test outcome:     ${{ steps.gotest_step.outcome }}"
        echo "Python test outcome: ${{ steps.pytest_step.outcome }}"
        exit 1

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Build Docker images
      run: |
        export SMACKEREL_VERSION="${GITHUB_REF_NAME}"
        export SMACKEREL_COMMIT="${GITHUB_SHA:0:12}"
        export SMACKEREL_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ./smackerel.sh build

  integration:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    # spec-045 BUG-045-002 DD-3: raise 15 → 30 to absorb the cold-cache Ollama
    # image pull (~4 GB) + test model pull (~3 GB for gemma3:4b) + Compose
    # build of smackerel-core / smackerel-ml that the full local stack
    # requires when brought up by ./smackerel.sh --env test up. See
    # specs/045-deploy-resource-filesystem-hardening/bugs/
    # BUG-045-002-ci-integration-failure-persists/design.md § Decision DD-3.
    # The build-time topology contract test
    # (internal/deploy/ci_integration_topology_contract_test.go) asserts
    # `timeout-minutes >= 30` so a future revert below this floor fails the
    # build before merge.
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.25'

    # spec-045 BUG-045-002 Path A (Decision DD-1): route CI through the
    # canonical CLI so the integration job exercises byte-for-byte the same
    # full-stack topology + sequential `-p 1` test-binary execution that
    # `./smackerel.sh test integration` uses locally. The CLI brings up the
    # FULL Compose stack (postgres + nats + ollama + smackerel-core +
    # smackerel-ml) via tests/integration/test_runtime_health.sh with
    # KEEP_STACK_UP=1, runs `go test -p 1 -tags integration -v -count=1
    # -timeout 300s ./tests/integration/...` in a golang:1.25.10-bookworm
    # container, and tears down via trap-driven cleanup. The previous CI
    # topology (GH services.postgres + docker-run nats sidecar + raw
    # `go test -tags=integration`) omitted ollama / smackerel-core /
    # smackerel-ml AND the `-p 1` flag, which caused 20 consecutive chronic
    # failures on main between 2026-05-14 and 2026-05-16 (see report.md
    # § Evidence 3 in the BUG-045-002 packet). The build-time topology
    # contract test in internal/deploy/ci_integration_topology_contract_test.go
    # locks this contract to prevent regression.
    - name: Generate SST config files for integration tests
      run: |
        ./smackerel.sh config generate
        ./smackerel.sh config generate --env test

    - name: Bring up test stack
      run: ./smackerel.sh --env test up

    - name: Stack status snapshot
      run: ./smackerel.sh --env test status

    - name: Run integration tests
      id: itest_step
      continue-on-error: true
      shell: bash
      run: |
        set -o pipefail
        ./smackerel.sh test integration 2>&1 | tee integration-test.log

    - name: Upload integration test log
      if: always() && hashFiles('integration-test.log') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: integration-test-log
        path: integration-test.log
        retention-days: 7

    - name: Fail job if integration tests failed
      if: steps.itest_step.outcome == 'failure'
      run: |
        echo "Integration test outcome: ${{ steps.itest_step.outcome }}"
        exit 1

    - name: Tear down test stack
      if: always()
      run: |
        ./smackerel.sh --env test down --volumes || true
