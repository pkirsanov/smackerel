# Smackerel CI — lint, unit test, build on every push/PR
# Runs ./smackerel.sh commands per project CLI contract
name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Verify Go module checksums
      run: go mod verify

    - name: Lint
      run: ./smackerel.sh lint

    - name: Unit tests
      run: ./smackerel.sh test unit

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        export SMACKEREL_VERSION="${GITHUB_REF_NAME}"
        export SMACKEREL_COMMIT="${GITHUB_SHA:0:12}"
        export SMACKEREL_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ./smackerel.sh build

    - name: Tag images on version push
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        COMMIT_SHA="${GITHUB_SHA}"
        BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${VERSION}"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${COMMIT_SHA:0:12}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${COMMIT_SHA:0:12}"

  integration:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Integration tests (main only)
      run: echo "Integration tests deferred to spec 031 — live-stack CI not yet wired"
