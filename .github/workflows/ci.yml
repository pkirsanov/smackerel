# Smackerel CI — lint, unit test, build on every push/PR
# Runs ./smackerel.sh commands per project CLI contract
name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # spec-047 R7: bumped 10→20 to rule out timing as a possible cause
    # while we diagnose the chronic CI Unit tests failure (see report.md).
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.25'

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'

    - name: Verify Go module checksums
      run: go mod verify

    - name: Lint
      run: ./smackerel.sh lint

    # spec-047 R9: generate the SST-derived config files
    # (config/generated/{dev.env,nats.conf,prometheus.yml}) before unit
    # tests run. R8 artifact-upload diagnostics revealed the chronic Go
    # CI failure root cause: 2 tests in internal/config/docker_security_test.go
    # (TestNATSConf_GeneratedFile_TokenProperlyQuoted and
    # TestNATSConf_HasPayloadAndStorageLimits, spec 046 FR-046-002 adversarial
    # regression coverage) read config/generated/nats.conf via t.Fatalf()
    # if the file does not exist. Locally the file is always present
    # because operators run `./smackerel.sh config generate` during normal
    # workflow; in CI the file is never generated before unit tests run, so
    # the tests fail consistently. The SST-derived config generator is a
    # pure-bash script (scripts/commands/config.sh) with no docker
    # dependency and no host-side state requirement; it is safe to run
    # ahead of unit tests on the GitHub Actions runner.
    - name: Generate SST config files for unit tests
      run: ./smackerel.sh config generate

    # spec-047 R7: split combined "Unit tests" step into Go+Python so the
    # next CI run surfaces which leg fails (the public REST API only
    # exposes step-level pass/fail metadata, not log content). Combined
    # with `set -euxo pipefail` in scripts/runtime/{go,python}-unit.sh,
    # this gives operators step-name attribution even without log access.
    #
    # spec-047 R8: capture each leg's combined stdout+stderr to a log
    # file via `tee` and upload as a workflow artifact. Workflow
    # artifacts on public repos are reachable through the REST artifacts
    # API without admin auth, so this restores observability for
    # operators who lack log-content read permission. Both legs run
    # under `continue-on-error: true` so a Go failure does not skip the
    # Python leg; a final step fails the job if either leg failed.
    - name: Unit tests (Go)
      id: gotest_step
      continue-on-error: true
      shell: bash
      run: |
        set -o pipefail
        ./smackerel.sh test unit --go 2>&1 | tee go-unit-test.log

    - name: Unit tests (Python)
      id: pytest_step
      continue-on-error: true
      shell: bash
      run: |
        set -o pipefail
        ./smackerel.sh test unit --python 2>&1 | tee python-unit-test.log

    - name: Upload Go unit test log
      if: always() && hashFiles('go-unit-test.log') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: go-unit-test-log
        path: go-unit-test.log
        retention-days: 7

    - name: Upload Python unit test log
      if: always() && hashFiles('python-unit-test.log') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-unit-test-log
        path: python-unit-test.log
        retention-days: 7

    - name: Fail job if any unit tests failed
      if: steps.gotest_step.outcome == 'failure' || steps.pytest_step.outcome == 'failure'
      run: |
        echo "Go test outcome:     ${{ steps.gotest_step.outcome }}"
        echo "Python test outcome: ${{ steps.pytest_step.outcome }}"
        exit 1

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Build Docker images
      run: |
        export SMACKEREL_VERSION="${GITHUB_REF_NAME}"
        export SMACKEREL_COMMIT="${GITHUB_SHA:0:12}"
        export SMACKEREL_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ./smackerel.sh build

    - name: Tag images on version push
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${VERSION}"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${GITHUB_SHA:0:12}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${GITHUB_SHA:0:12}"

    - name: Log in to GHCR
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push images to GHCR
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        CORE_IMAGE="ghcr.io/${{ github.repository_owner }}/smackerel-core"
        ML_IMAGE="ghcr.io/${{ github.repository_owner }}/smackerel-ml"

        COMMIT_SHORT="${GITHUB_SHA:0:12}"
        docker tag smackerel-smackerel-core:latest "${CORE_IMAGE}:${VERSION}"
        docker tag smackerel-smackerel-core:latest "${CORE_IMAGE}:${COMMIT_SHORT}"
        docker push "${CORE_IMAGE}:${VERSION}"
        docker push "${CORE_IMAGE}:${COMMIT_SHORT}"

        docker tag smackerel-smackerel-ml:latest "${ML_IMAGE}:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "${ML_IMAGE}:${COMMIT_SHORT}"
        docker push "${ML_IMAGE}:${VERSION}"
        docker push "${ML_IMAGE}:${COMMIT_SHORT}"

  integration:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: smackerel
          POSTGRES_PASSWORD: smackerel
          POSTGRES_DB: smackerel_test
        ports:
        - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smackerel -d smackerel_test" --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.25'

    - name: Start NATS with auth and JetStream
      run: |
        docker run -d --name nats-ci \
          --network host \
          nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927 \
          --auth ci-test-token-integration \
          --http_port 8222 \
          --jetstream
        timeout 30 bash -c 'until wget -qO- http://localhost:8222/healthz >/dev/null 2>&1; do sleep 1; done'
        echo "NATS is ready with auth enforcement and JetStream enabled"

    # spec-047 R11: do NOT pre-apply migrations via raw psql.
    # The Go integration test helpers (db.Migrate, embedded in
    # internal/db/migrate.go) are fully idempotent — they track
    # applied migrations in a `schema_migrations` table and skip
    # any migration whose version is already recorded. The previous
    # raw-psql pre-apply step bypassed that tracking table, so when
    # test helpers later called db.Migrate they re-applied 001
    # from scratch and crashed on `chk_rating_range` already-exists
    # (SQLSTATE 42710). Removing the pre-apply lets the embedded
    # migration runner be the single source of truth and resolves
    # ~33 auth tests + TestMigrations_SchemaVersionCount.

    # spec-047 R11: generate SST config files for integration tests.
    # The integration job runs `go test -tags=integration ./tests/integration/...`
    # against the real DB+NATS stack, but several integration tests
    # (drive_config_contract_test.go, drive_connectors_endpoint_test.go,
    # drive_foundation_canary_test.go config subtest, photos_foundation_test.go,
    # photos_privacy_boundary_test.go, ollama_config_contract_test.go,
    # ollama_image_availability_test.go) read config/generated/{test,dev}.env
    # via shared helpers and t.Fatalf on ENOENT. R9 added this same step to
    # lint-and-test; R10 unmasked that the integration job was equally
    # affected. The renderer is pure-bash (scripts/commands/config.sh) and
    # runs in <1s with no docker/network/host-state deps.
    - name: Generate SST config files for integration tests
      run: ./smackerel.sh config generate

    # NOTE: CI integration uses raw go test because GitHub Actions service
    # containers replace the Docker Compose stack that ./smackerel.sh test
    # integration manages. The CLI command expects to bring up/down its own
    # Compose project, which conflicts with Actions service lifecycle.
    #
    # spec-047 R10: capture combined stdout+stderr to integration-test.log
    # via tee and upload as a workflow artifact (same pattern as R8 for
    # unit tests). R9 unmasked the chronic integration failure that the
    # lint-and-test gate had been hiding (build was conditional on
    # lint-and-test pass; integration was conditional on build pass).
    # Without log capture the failure is opaque to operators because the
    # GitHub Actions step log requires admin auth. Artifact upload uses
    # `if: always() && hashFiles(...) != ''` so the log is captured even
    # on test failure. continue-on-error: true ensures the upload step
    # runs; a final aggregator step exits non-zero if the test step
    # outcome is failure so the integration job still fails the build.
    - name: Run integration tests
      id: itest_step
      continue-on-error: true
      env:
        DATABASE_URL: postgres://smackerel:smackerel@localhost:5432/smackerel_test?sslmode=disable
        NATS_URL: nats://localhost:4222
        SMACKEREL_AUTH_TOKEN: ci-test-token-integration
      shell: bash
      run: |
        set -o pipefail
        go test -tags=integration ./tests/integration/... -v -count=1 -timeout 10m 2>&1 | tee integration-test.log

    - name: Upload integration test log
      if: always() && hashFiles('integration-test.log') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: integration-test-log
        path: integration-test.log
        retention-days: 7

    - name: Fail job if integration tests failed
      if: steps.itest_step.outcome == 'failure'
      run: |
        echo "Integration test outcome: ${{ steps.itest_step.outcome }}"
        exit 1
