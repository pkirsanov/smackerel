# Smackerel CI — lint, unit test, build on every push/PR
# Runs ./smackerel.sh commands per project CLI contract
name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Verify Go module checksums
      run: go mod verify

    - name: Lint
      run: ./smackerel.sh lint

    - name: Unit tests
      run: ./smackerel.sh test unit

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        export SMACKEREL_VERSION="${GITHUB_REF_NAME}"
        export SMACKEREL_COMMIT="${GITHUB_SHA:0:12}"
        export SMACKEREL_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ./smackerel.sh build

    - name: Tag images on version push
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        COMMIT_SHA="${GITHUB_SHA}"
        BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${VERSION}"
        docker tag smackerel-smackerel-core:latest "smackerel-core:${COMMIT_SHA:0:12}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "smackerel-ml:${COMMIT_SHA:0:12}"

  push-images:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        export SMACKEREL_VERSION="${VERSION}"
        export SMACKEREL_COMMIT="${GITHUB_SHA:0:12}"
        export SMACKEREL_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ./smackerel.sh build

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and push images
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        CORE_IMAGE="ghcr.io/${{ github.repository_owner }}/smackerel-core"
        ML_IMAGE="ghcr.io/${{ github.repository_owner }}/smackerel-ml"

        docker tag smackerel-smackerel-core:latest "${CORE_IMAGE}:${VERSION}"
        docker tag smackerel-smackerel-core:latest "${CORE_IMAGE}:latest"
        docker push "${CORE_IMAGE}:${VERSION}"
        docker push "${CORE_IMAGE}:latest"

        docker tag smackerel-smackerel-ml:latest "${ML_IMAGE}:${VERSION}"
        docker tag smackerel-smackerel-ml:latest "${ML_IMAGE}:latest"
        docker push "${ML_IMAGE}:${VERSION}"
        docker push "${ML_IMAGE}:latest"

  integration:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: smackerel
          POSTGRES_PASSWORD: smackerel
          POSTGRES_DB: smackerel_test
        ports:
        - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smackerel -d smackerel_test" --health-interval 5s --health-timeout 5s --health-retries 5

      nats:
        image: nats:2.10-alpine
        ports:
        - 4222:4222

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Apply database migrations
      env:
        PGPASSWORD: smackerel
      run: |
        for f in internal/db/migrations/*.sql; do
          echo "Applying $f..."
          psql -h localhost -U smackerel -d smackerel_test -f "$f"
        done

    - name: Run integration tests
      env:
        DATABASE_URL: postgres://smackerel:smackerel@localhost:5432/smackerel_test?sslmode=disable
        NATS_URL: nats://localhost:4222
        SMACKEREL_AUTH_TOKEN: ci-test-token-integration
      run: |
        go test -tags=integration ./tests/integration/... -v -count=1 -timeout 10m
