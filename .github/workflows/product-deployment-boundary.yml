name: product deployment boundary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  product-deployment-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout product
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        path: product

    - name: Mint knb read token
      id: knb_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ secrets.KNB_APP_ID }}
        private-key: ${{ secrets.KNB_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: knb

    - name: Checkout knb boundary authority
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        repository: ${{ github.repository_owner }}/knb
        token: ${{ steps.knb_token.outputs.token }}
        path: knb

    - name: Reject concrete deployment details in product repo
      run: bash knb/scripts/lint/product-deployment-boundary.sh --repo "$GITHUB_WORKSPACE/product"
