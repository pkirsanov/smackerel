  per-turn-state-snapshot:
    label: Per-turn state snapshot
    state: shipped
    summary: Orchestrator agents emit a turn-start and turn-end snapshot to `.specify/memory/bubbles.session.json` under a `turnSnapshots[]` array on every multi-turn cycle. Each record carries `turnNumber`, `timestamp`, `phase`, `scopeId`, `mode`, `note`, and `agent`. Enables deterministic resume-after-crash and a per-turn audit trail for compliance. Helper script `bubbles/scripts/state-snapshot.sh` plus pattern documented in `agents/bubbles_shared/operating-baseline.md`. Modeled after SWE-agent trajectory persistence.
    ownerSurface: bubbles/scripts/state-snapshot.sh
