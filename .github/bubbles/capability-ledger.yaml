  done-with-concerns-outcome-state:
    label: strict terminal observations
    state: shipped
    summary: Gate G092 narrows new terminal certification writes to `done` or `blocked`. Non-blocking low/medium notes attach to `done` through `observations[]` or `certification.observations[]`; high-severity or remediation-required findings remain `blocked`. Legacy `done_with_concerns` is read-only compatibility for old untouched specs only and must migrate to `done` plus observations or `blocked` when touched or recertified. Defined in `bubbles/workflows.yaml`, `agents/bubbles_shared/completion-governance.md`, and `bubbles/scripts/strict-terminal-status-guard.sh`.
    ownerSurface: bubbles/workflows.yaml
    releaseIntroduced: v3.8.0
    docsRefs:
    - bubbles/workflows.yaml
    - agents/bubbles_shared/completion-governance.md
    - agents/bubbles.workflow.agent.md
