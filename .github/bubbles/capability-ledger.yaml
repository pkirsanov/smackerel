  mode-template-inheritance:
    label: Mode template inheritance
    state: shipped
    summary: >
      Workflow modes in `bubbles/workflows.yaml` may declare `inherits: [<template-name>...]` to share common scalars, maps, and arrays via reusable bundles defined under a new top-level `modeTemplates:` block. The resolver (`bubbles/scripts/mode-resolver.sh`) deep-merges maps, concatenates and dedups arrays (`requiredGates` is sorted alphabetically as a canonical gate set), uses scalar latest-wins, rejects inherits cycles, and rejects unknown template references. v3.9 ships 4 templates (`base-delivery`, `delivery-quality-constraints`, `delivery-gate-baseline`, `finding-owned-remediation`) with 5 modes refactored (`full-delivery`, `bugfix-fastlane`, `harden-to-doc`, `gaps-to-doc`, `iterate`); 32 other modes intentionally stay verbose pending follow-up refactor. Resolver `--validate` and a 6-case selftest are wired into `framework-validate`. Hard dependency on yq (mikefarah, v4+).
    ownerSurface: bubbles/workflows.yaml
    releaseIntroduced: v3.9.0
    docsRefs:
    - bubbles/workflows.yaml
    - agents/bubbles_shared/workflow-mode-resolution.md
    evidenceRefs:
    - bubbles/scripts/mode-resolver.sh
    - bubbles/scripts/mode-resolver-selftest.sh
    - bubbles/workflows.yaml
    competitorTags:
    - yaml-inheritance
    - dry-config
    freshnessTargets:
    - agents/bubbles_shared/workflow-mode-resolution.md
    - bubbles/workflows.yaml

  impact-aware-validation-trace-contracts:
    label: Impact-aware validation and trace contracts
    state: shipped
    summary: >
      Projects can now declare optional `testImpact` and `traceContracts` sections in `.github/bubbles-project.yaml` or `bubbles-project.yaml`. `test-impact-plan.sh` maps changed paths to impacted components, first-pass test categories, always-run checks, and full-suite triggers (G079). `trace-contract-guard.sh` validates actual trace/log evidence against required spans, attributes, invariants, and red flags (G080). Both are no-op when unconfigured unless invoked with `--require-config`, and neither weakens final completion gates.
    ownerSurface: bubbles/scripts/test-impact-plan.sh
    releaseIntroduced: v3.9.0
    docsRefs:
