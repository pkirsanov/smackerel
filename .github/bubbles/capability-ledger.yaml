    ownerSurface: bubbles/scripts/test-impact-plan.sh
    releaseIntroduced: v3.9.0
    docsRefs:
    - docs/guides/CONTROL_PLANE_SCHEMAS.md
    - docs/recipes/impact-aware-validation.md
    - agents/bubbles_shared/project-config-contract.md
    - agents/bubbles_shared/planning-core.md
    - agents/bubbles_shared/test-core.md
    - agents/bubbles_shared/validation-core.md
    evidenceRefs:
    - bubbles/scripts/test-impact-plan.sh
    - bubbles/scripts/test-impact-plan-selftest.sh
    - bubbles/scripts/trace-contract-guard.sh
    - bubbles/scripts/trace-contract-guard-selftest.sh
    - bubbles/scripts/framework-validate.sh
    - bubbles/workflows.yaml
    consumers:
    - bubbles/scripts/trace-contract-guard.sh # validates trace evidence (G080)
    - bubbles/scripts/framework-validate.sh # runs test-impact + trace-contract selftests
    - agents/bubbles_shared/validation-core.md # the impact-aware validation contract
    competitorTags:
    - test-impact-analysis
    - observability-contracts
    - trace-validation
    freshnessTargets:
    - docs/guides/CONTROL_PLANE_SCHEMAS.md
    - docs/recipes/impact-aware-validation.md
    - agents/bubbles_shared/project-config-contract.md
    - bubbles/workflows.yaml

  skills-first-discovery-layer:
    label: Skills-first discovery layer
    state: shipped
    summary: >
      v4.0 architectural posture: agents lean on auto-loaded discovery skills (anti-fabrication, evidence capture, DoD validation, status transition, result envelope, ownership routing, quality gates, scope workflow, and a top-level discovery entry point) instead of eager-loading the full governance corpus into every prompt. Skills are thin shims that route to the authoritative `agents/bubbles_shared/*.md` modules and `bubbles/scripts/*.sh` enforcement; rules, mechanical guards, and the grandfather clause for historical done specs are unchanged.
