  linter-on-edit-gate:
    label: Linter-on-edit gate
    state: shipped
    summary: Project-pluggable linter trampoline. Downstream projects register language-specific linters via `.specify/memory/bubbles.config.json` under `editLintGate.linters`; the framework supplies the gate dispatcher (`bubbles/scripts/edit-lint-gate.sh`). Default state is no-op (opt-in only) to preserve framework agnosticity — the framework MUST NOT bundle default linters. Pattern documented in `agents/bubbles_shared/operating-baseline.md`. Modeled after SWE-agent linter integration.
