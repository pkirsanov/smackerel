# Status Ceiling Policy (NON-NEGOTIABLE)
#
# Each mode defines the MAXIMUM status it is allowed to set in state.json.
# Modes that only produce planning/documentation artifacts MUST NOT set
# status to "done". Only modes that include implementation + test phases
# with passing evidence may set status to "done".
#
# Allowed ceilings:
#   done             - Full implementation + tests completed and verified
#   specs_hardened   - Planning artifacts improved, no implementation done
#   docs_updated     - Documentation updated, no implementation done
#   validated        - Validation/audit completed, no implementation done
#   in_progress      - Partial work, used for resume-only

# Mode Defaults (applied to ALL modes with statusCeiling: done)
#
# These constraints are inherited by every delivery mode unless explicitly
# overridden with `false` in the mode's own constraints block.
modeDefaults:
  deliveryModes:
    # Workflow MUST run to completion — no stopping to suggest commands.
    # Only truly terminal conditions (all specs done/blocked, user stop,
    # unresolvable input) are allowed stop reasons.
    runUntilComplete: true
    # When the workflow discovers that different actions are needed
    # (e.g., specs need hardening, bugs block progress, gaps need closing),
    # it MUST handle them inline by invoking specialist agents rather than
    # stopping and suggesting the user run a different mode.
    autoModeEscalation: true
    # Delivery stays autonomous unless the caller explicitly opts into
    # an interactive clarification loop.
    defaultAutonomy: autonomous
    allowOptionalSocraticDiscovery: true
    allowGitIsolationFlag: true
    allowAutoCommitFlag: true
    requireSmallWellDefinedScopes: true
    requireRedGreenEvidence: true
    enableMicroFixLoops: true
    inheritedRequiredGates: [ G036, G037, G038, G040, G042, G047, G048, G051, G052, G053, G063, G064, G066, G074, G075, G076, G077, G079, G080, G081, G093 ]

  # v5.1 (M7): model-tier floor advisory. Per-phase minimum model capability
  # the host client should report via BUBBLES_ACTIVE_MODEL. Advisory only in
  # v5.1 (warning); v6 S9 promotes to blocking. Operators may override per
  # mode under modes.<name>.modelFloor.<phase>.
  #
  # Tiers (low → high): haiku-class < sonnet-class < opus-class.
  # Defaults are intentionally conservative: planning/audit/design/security
  # phases get sonnet-class floor; mechanical phases (test runners,
  # report-only) have no floor.
  modelFloor:
    default: ""
    analyze: sonnet-class
    design: sonnet-class
    plan: sonnet-class
    implement: sonnet-class
    test: ""
    validate: sonnet-class
    audit: sonnet-class
    security: opus-class
    chaos: sonnet-class
    review: sonnet-class
    retro: sonnet-class
    spec-review: sonnet-class

  # v6.1 (S9 / R4): phases where the model floor is BLOCKING (not advisory).
  # For these phases, model-tier-advisory.sh check exits non-zero when the
  # active model (BUBBLES_ACTIVE_MODEL) is known and below the declared floor.
  # Unknown model or undeclared floor never blocks. Operators may extend this
  # list (e.g. add `design`) per project policy. Enforced by G126.
  modelFloorEnforcedPhases: [ audit, security, validate ]
# Batch Execution Parameter (NON-NEGOTIABLE)
#
# `batch: true|false` is a UNIVERSAL parameter for delivery modes.
# When enabled, the orchestrator splits the mode's phaseOrder at the last
# `implement` phase: phases up to and including implement run per-spec,
# phases after implement run ONCE covering all specs together.
#
# This avoids redundant builds when multiple specs touch the same codebase.
#
# Split rule: per-spec = phases up to and including the LAST implement in
# phaseOrder. Shared = everything after that implement.
#
# Auto-detection: batch defaults to true when multiple specs are targeted,
# false when a single spec is targeted. User can override with batch: true
# or batch: false explicitly.
batchExecution:
  # Auto-detect based on spec count: >1 spec = batch, 1 spec = sequential
  autoDetect: true
  autoDetectRule: "batch = (target_spec_count > 1)"
  # Mechanical split rule applied to any mode when batch is enabled
  splitRule: at_last_implement
  # These constraints are auto-applied when batch is enabled
  inheritedConstraints:
    batchImplementation: true
    sequentialWithinBatch: true
    singleBuildAfterBatch: true
    perSpecDodRequired: true
  # G019 (sequentialSpecCompletion) is relaxed within the batch —
  # specs proceed through per-spec phases without waiting for previous
  # spec's full quality chain. ALL specs must pass ALL gates before
  # ANY spec is marked done.

executionOptions:
  description: Universal optional workflow tags. These never override the default autonomous behavior unless explicitly enabled.
  policyRegistry:
    configFile: .specify/memory/bubbles.config.json
    requiredStateField: policySnapshot
    provenanceValues: [ user-request, repo-default, workflow-forced, spec-lockdown ]
  optionalWorkflowTags:
    autonomy:
      type: string
      default: full
      values:
        full: 100% autonomous — grillMode off, socratic false, decisionPolicy auto-resolves (today's default)
        guarded: grillMode required-on-ambiguity plus a conditional clarify consistency gate — stop only on genuine ambiguity
        interactive: grillMode on-demand plus socratic true — human-in-the-loop; taste decisions surfaced
      meaning: Convenience alias that sets grillMode/socratic/clarify together. Explicit flags override this alias. Default `full` preserves current behavior.
    socratic:
      type: boolean
      default: false
      meaning: Enable a bounded clarification loop before discovery/bootstrap work.
    socraticQuestions:
      type: integer
      default: 3
      min: 1
      max: 5
      meaning: Maximum number of targeted Socratic questions when socratic=true.
    grillFirst:
      type: boolean
      default: false
      meaning: Deprecated compatibility alias for enabling a preflight grill pass. Prefer `grillMode` for new workflow invocations.
    grillMode:
      type: string
      default: inherit
      values:
        inherit: Resolve grill behavior from the policy registry
        off: Do not interrogate the user unless explicitly requested
        on-demand: Allow explicit grill invocation without forcing it
        required-on-ambiguity: Require bubbles.grill when ambiguity blocks safe execution
        required-for-lockdown: Require bubbles.grill for locked-behavior changes
      meaning: Override or elevate the effective grill policy for this workflow run.
    tdd:
      type: boolean
      default: false
      meaning: Enforce red-green-first execution inside implement and test loops.
    lockdown:
      type: string
      default: inherit
      values:
        inherit: Resolve lockdown behavior from the policy registry
        off: Do not enforce scenario lockdown rules for this run
        protect-existing-scenarios: Treat existing linked scenarios as protected behavior contracts
        require-approval: Require grill approval plus invalidation for locked scenario changes
      meaning: Override or elevate the effective lockdown policy for this workflow run.
    backlogExport:
      type: string
      default: "off"
      values:
        off: Do not add derived backlog outputs
        tasks: Add per-scope backlog task checklists
        issues: Add per-scope issue seeds with acceptance bullets
      meaning: Forward backlog export preferences to bubbles.plan when scopes are created or refreshed.
    improvementPrelude:
      type: string
      default: off
      values:
        off: Do not run a planning prelude before lockdown rounds
        analyze-design-plan: Run analyst → ux → design → plan before each eligible lockdown round
        analyze-ux-design-plan: Run analyst → ux → design → plan before each eligible lockdown round
      meaning: Full-delivery only. Optional planning prelude to run before each implementation round.
    improvementPreludeRounds:
      type: integer
      default: null
      meaning: Full-delivery only. Maximum number of rounds that may include the improvementPrelude. Null means every round until completion.
    specReview:
      type: string
      default: off
      values:
        off: Do not run a one-shot spec freshness and redundancy review inside the workflow
        once-before-implement: Run bubbles.spec-review once per target spec before the first implementation-capable stage in this workflow
      meaning: Optional one-shot spec-review hook. If the mode includes analyze, run after analyze; otherwise run before the first improvement or implementation-capable stage. Never repeats on later rounds unless explicitly invoked again.
    gitIsolation:
      type: boolean
      default: false
      meaning: Opt into isolated branch/worktree setup before implementation when repo policy allows it.
    autoCommit:
      type: string
      default: "off"
      values:
        off: No automatic commits
        scope: Commit after scope reaches Done (recommended)
        dod: Commit after each validated DoD item (fine-grained)
      commitMessageTemplate: |
        bubbles({spec}/{scope}): {scope_name} — {status}

        Spec: {spec_name}
        Scope: {scope_id}-{scope_name}
        DoD: {checked}/{total} checked
        Agent: {agent_name}
      meaning: Opt into atomic commits after validated milestones.
    maxScopeMinutes:
      type: integer
      default: null
      meaning: Optional planning heuristic for maximum intended effort per scope.
    maxDodMinutes:
      type: integer
      default: null
      meaning: Optional planning heuristic for maximum intended effort per DoD item.
    microFixes:
      type: boolean
      default: true
      meaning: Keep failure recovery inside narrow error-scoped fix loops before broader retries.
    crossModelReview:
      type: string
      default: "off"
      values:
        off: Single-model review only
        codex: Use Codex CLI or configured reviewer for independent second opinion
        terminal: Run project-configured review command via terminal
      meaning: Request independent cross-model review during code-review or audit phases. Requires model registry in .specify/memory/bubbles.config.json.
    parallelScopes:
      type: string
      default: "off"
      values:
        off: Sequential scope execution (current behavior, always safe)
        dag: Execute DAG-independent scopes in parallel using git worktrees
        dag-dry: Show parallelization plan without executing
      meaning: Parallel independent scope execution using git worktrees. Scopes with no mutual dependencies run concurrently. Dependent scopes still wait for predecessors. Off by default.
    maxParallelScopes:
      type: integer
      default: 2
      min: 2
      max: 4
      meaning: Maximum concurrent scope executions when parallelScopes=dag. Each parallel scope runs in its own worktree.
    dryRun:
      type: string
      default: false
      values:
        false: Normal execution
        plan: Resolve the full plan (specs/scopes/intended changes) and REPORT without mutating code or state
      meaning: Propose-only preview for goal/sprint/iterate. Extends parallelScopes=dag-dry to the whole convergence loop.
    guidedJourney:
      type: boolean
      default: false
      meaning: Append an optional bubbles.journey walkthrough for human-in-the-loop scenario refinement against the live product.

  sessionBudget:
    maxTotalConvergenceIterations:
      type: integer
      default: null
      meaning: Aggregate cap on convergence iterations across ALL specs in one goal/sprint session. null = unbounded (today). Advisory — orchestrators self-enforce and stop with a blocked RESULT-ENVELOPE when exceeded.
    maxWallClockMinutes:
      type: integer
      default: null
      meaning: Aggregate wall-clock budget for the whole session. null = unbounded. Advisory.
    maxToolCalls:
      type: integer
      default: null
      meaning: Aggregate tool-call budget for the whole session. null = unbounded. Advisory.

  defaultPolicyBehavior:
    scenarioTddDefault: scenario-first
    grillDefault: off
    lockdownDefault: false
    specReviewDefault: off
    validateCertificationRequired: true
    protectedRegressionContracts: true

# ── Decision Policy: Mechanical vs. Taste Decisions ──
#
# When bubbles.plan or bubbles.design are invoked by the orchestrator
# (not directly by the user), decisions are classified as mechanical
# or taste. Mechanical decisions are auto-resolved. Taste decisions
# are batched and surfaced at phase boundaries.
#
# COMPATIBILITY:
# - autonomy alias: The `autonomy` executionOption (full|guarded|interactive) is a
#   convenience alias that sets grillMode/socratic/clarify together. EXPLICIT
#   grillMode/socratic flags ALWAYS WIN over the autonomy alias.
# - grillMode: When grillMode is `required-on-ambiguity` or `required-for-lockdown`,
#   taste decisions are routed through bubbles.grill before surfacing to user.
#   Grill may approve, challenge, or split the decision.
# - socratic: When socratic=true, taste decisions become Socratic questions
#   (max socraticQuestions) before the decision batch. Mechanical decisions
#   are still auto-resolved — socratic mode does NOT make everything interactive.
# - Direct invocation: When user calls /bubbles.plan or /bubbles.design directly,
#   ALL decisions are interactive (no auto-resolution). The decision policy
#   only activates when callerMode=orchestrated.
#
decisionPolicy:
  enabled: true
  # Only applies when agent is invoked by orchestrator, not direct user invocation
  activationCondition: callerMode=orchestrated
  mechanicalPrinciples:
  - name: prefer_completeness
    description: "When two approaches differ by <30% effort, choose the more complete one"
  - name: match_existing_patterns
    description: "Follow conventions already established in the codebase (file structure, naming, test patterns)"
  - name: prefer_reversible
    description: "When both options are viable, choose the one easier to undo"
  - name: defer_ambiguous
    description: "When confidence is below 60%, classify as taste decision"
  - name: escalate_security
    description: "Security-affecting decisions are ALWAYS taste decisions — never auto-resolved"
  - name: use_prior_preferences
    description: "If user made a similar choice in prior sessions (from learnings.jsonl), follow that pattern"
  - name: respect_spec_constraints
    description: "If spec.md or design.md already specifies the approach, follow it (not a decision at all)"
  tasteDecisionHandling:
    batchTiming: end_of_phase # Collect during phase, present at boundary
    maxPerPhase: 5 # If >5 taste decisions, the spec needs more clarity — route to bubbles.clarify
    overflowAction: route_to_clarify
    format: |
      ## Taste Decisions (Require Your Input)
      1. **{description}**
         - Option A: {option_a} — {rationale_a}
         - Option B: {option_b} — {rationale_b}
         - Auto-resolution would choose: {auto_pick} because {auto_reason}
         - [Choose A / Choose B / Accept auto-resolution]
    grillIntegration:
      # When grillMode is active, taste decisions get pressure-tested first
      grillModes: [ required-on-ambiguity, required-for-lockdown ]
      grillAction: "bubbles.grill reviews each taste decision and may approve, challenge, split, or escalate"
    socraticIntegration:
      # When socratic=true, taste decisions become the Socratic questions
      socraticAction: "Taste decisions are converted to targeted questions (up to socraticQuestions limit), then remaining auto-resolve using mechanicalPrinciples"

# ── Cross-Model Review Registry ──
#
# ── Cross-Model Review Registry ──
#
# Optional multi-AI review capability. When enabled, code review or audit
# phases can request an independent review from a different AI model.
#
# DYNAMIC REGISTRY: The model list is maintained per-project in bubbles.config.json.
# It is updated DYNAMICALLY based on actual usage:
#
# 1. When the user works with a model (any agent session), agents SHOULD
#    increment `usageCount` and update `lastUsed` for that model in the registry.
# 2. Models the user hasn't used in 90+ days get flagged for review.
# 3. When the user switches to a new model not in the registry, agents SHOULD
#    prompt: "You're using {model} which isn't in your model registry. Add it?"
# 4. The `lastVerified` date triggers a full registry review reminder after 90 days.
#
# USER SOVEREIGNTY: The user always decides. Agents suggest additions/removals
# based on usage patterns but never auto-modify the registry without confirmation.
#
crossModelReview:
  enabled: false # User must explicitly enable in bubbles.config.json
  freshnessPolicy:
    maxAgeDays: 90
    reminderAgent: bubbles.super
    reminderTrigger: workflow_start
    reminderMessage: "Your cross-model review registry was last verified {days} days ago. New models may be available. Run /bubbles.super update model registry to refresh."
  # Dynamic usage tracking
  usageTracking:
    enabled: true # When autoTrackUsage=true in config, agents update usage stats
    trackFields:
      usageCount: integer # Incremented each time the model is used in a session
      lastUsed: iso_date # Updated to current date on each use
    stalePeriodDays: 90 # Models unused for 90+ days are flagged for review
    autoDiscovery:
      # When the active session model is not in the registry, suggest adding it
      promptOnUnknownModel: true
      promptFormat: "You're using {model} which isn't in your model registry. Want to add it? (Role: {suggested_role})"
      # Suggest role based on provider heuristics
      roleHeuristics:
        anthropic: primary
        openai: reviewer
        google: adversarial
        meta: reviewer
        mistral: reviewer
    # Periodic usage report (part of /bubbles.retro output)
    usageReport:
      includeInRetro: true
      reportFields: [ name, provider, role, usageCount, lastUsed, daysSinceLastUse ]
      flagStaleModels: true # Highlight models unused for >stalePeriodDays
  # Model registry schema
  modelRegistry:
    configFile: .specify/memory/bubbles.config.json
    registryKey: crossModelReview.models
    schema:
    - name: string # e.g., "claude-opus-4.6-1m"
      provider: string # e.g., "anthropic", "openai", "google"
      role: string # "primary" | "reviewer" | "adversarial"
      available: boolean # user-set — is this model currently accessible?
      notes: string # user notes
      usageCount: integer # dynamic — incremented on use
      lastUsed: iso_date # dynamic — updated on use
    lastVerified: null # ISO date set by user when they confirm the registry
  # How cross-model review integrates with phases
  phaseIntegration:
    codeReview:
      when: crossModelReview.enabled AND reviewer model available
      action: "bubbles.code-review invokes reviewer model via terminal command (configured per project)"
      output: "Cross-model finding comparison table: overlapping vs unique findings"
    audit:
      when: crossModelReview.enabled AND adversarial model available
      action: "bubbles.audit invokes adversarial model to challenge findings"
      output: "Adversarial challenge report appended to audit output"
  # Project-specific invocation command (resolved from agents.md or bubbles-project.yaml)
  invocationPattern:
    configKey: crossModelReview.command
    example: "codex review --diff HEAD~1"
    fallback: "echo 'Cross-model review command not configured. Set crossModelReview.command in bubbles-project.yaml'"

# ─────────────────────────────────────────────────────────────────────────────
# Scope-Kind Taxonomy (added in v4.1.0)
#
# Scopes declare their kind via an optional `Scope-Kind:` header in
# scopes.md / scopes/<NN>/scope.md. The kind controls which evidence
# classes gates require. Default when omitted is `runtime-behavior`
# (full E2E + runtime evidence required) to preserve v4.0.x behavior.
#
# Gates that consume scopeKinds:
#   - G008A (Scenario-specific E2E regression coverage): only enforced
#     when kind is runtime-behavior AND scope is not lockdown-deferred
#   - G028 (Implementation Reality Scan): tightened for runtime-behavior,
#     loosened to "contract or pointer verified" for contract-only /
#     deploy-pointer / ci-config / docs-only
#   - G029 (Integration Completeness): runtime wiring required for
#     runtime-behavior; producer↔consumer contract sufficient for
#     contract-only; manifest pointer + lint sufficient for deploy-pointer
# ─────────────────────────────────────────────────────────────────────────────
scopeKinds:
  runtime-behavior:
    description: "Scope changes runtime behavior visible to a user, API consumer, or external system. Full live-system E2E coverage required."
    requiresLiveE2E: true
    requiresIntegrationWiring: true
    requiresImplementationRealityScan: true
    isDefault: true
  contract-only:
    description: "Scope changes an interface contract (proto, OpenAPI, schema) without runtime behavior change. Contract tests + producer/consumer compatibility tests required; live runtime E2E not required."
    requiresLiveE2E: false
    requiresIntegrationWiring: false
    requiresContractTests: true
    requiresBackwardCompatTest: true
  deploy-pointer:
    description: "Scope updates a deployment manifest pointer, adapter script, or operator-facing config without changing the application image. Shellcheck/yamllint + dry-run validation required; live runtime E2E deferred to operator apply."
    requiresLiveE2E: false
    requiresIntegrationWiring: false
    requiresShellLint: true
    requiresManifestSchemaCheck: true
  ci-config:
    description: "Scope updates CI/CD workflow, build pipeline, or release automation. Workflow syntax check + dry-run required; live runtime E2E not applicable."
    requiresLiveE2E: false
    requiresIntegrationWiring: false
    requiresWorkflowSyntaxCheck: true
  docs-only:
    description: "Scope updates documentation, ADRs, or governance artifacts. Markdown lint + cross-reference check required."
    requiresLiveE2E: false
    requiresIntegrationWiring: false
    requiresMarkdownLint: true
  bootstrap:
    description: "Scope creates initial scaffolding (specs, templates, agent skeletons). Artifact lint required; runtime evidence not applicable."
    requiresLiveE2E: false
    requiresIntegrationWiring: false
    requiresArtifactLint: true

# ─────────────────────────────────────────────────────────────────────────────
# Lockdown Contract (added in v4.1.0)
#
# Some work is honestly blocked on external actors (operator commit, third
# party approval, scheduled cutover window, regulator review). Such work
# can ship to `delivered_pending_activation` ceiling provided every
# deferred DoD item or phase carries an explicit lockdown tag that names
# the gating FR / condition / unblocker.
#
# Gates that consume lockdownContract:
#   - G040 (Deferral Language Scan): allow-lists strings matching
#     lockdownContract.patterns when they appear alongside a cited FR ID
#     OR a structured `condition:` field
#   - G008A: skips E2E enforcement when scope-level lockdown is declared
#   - G022 (Specialist Phase Completion): accepts `phaseStubs[<phase>] =
#     {reason: "lockdown-deferred-<FR-ID>"}` as honest completion
# ─────────────────────────────────────────────────────────────────────────────
lockdownContract:
  patterns:
  - "[lockdown-deferred-FR-NNN]"
  - "[lockdown-deferred-<spec>-FR-NNN]"
  - "[awaiting-operator-commit]"
  - "[awaiting-third-party-approval]"
  - "[awaiting-cutover-window]"
  - "[awaiting-regulator-review]"
  requiredFields:
    # Every lockdown tag MUST be accompanied by at least one of these
    # so the gate can verify the deferral is honest, not vague hand-waving.
    anyOf:
    - "FR-NNN citation in same line or following bullet"
    - "condition: <free text> in same scope/DoD item"
    - "unblocker: <actor + action> in same scope/DoD item"
    - "expectedActivation: <ISO date or named milestone>"
  forbiddenWithoutLockdown:
  # These deferral strings continue to fail G040 unless tagged.
  - "deferred"
  - "future work"
  - "TODO later"
  - "punt"
  - "placeholder"
  - "stub for now"

# ── Workflow modes ─────────────────────────────────────────────────────────
# The modes registry (mode definitions + phaseRelevance) lives in its own
# canonical file: bubbles/workflows/modes.yaml (v6.1 / S2 true split).
# mode-resolver.sh composes workflows.yaml + modes.yaml at read time; the
# other consumers read modes.yaml directly. Do NOT re-inline a modes: block
# here — generate-modes-block.sh --check (run by framework-validate) blocks
# that duplication regression.
