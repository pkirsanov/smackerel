  test:
    owner: bubbles.test
    requiredGates: [ G003, G004, G005, G051, G079 ]
  docs:
    owner: bubbles.docs
    requiredGates: [ G006 ]
  validate:
    owner: bubbles.validate
    requiredGates: [ G007, G080 ]
  audit:
    owner: bubbles.audit
    requiredGates: [ G008 ]
  chaos:
    owner: bubbles.chaos
    requiredGates: [ G009 ]
  regression:
    owner: bubbles.regression
    requiredGates: [ G044 ]
  simplify:
    owner: bubbles.simplify
    requiredGates: [ G031 ]
  stabilize:
    owner: bubbles.stabilize
