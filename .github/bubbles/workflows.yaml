  release-planning-to-doc:
    description: "Phase release packet planning. Owned by bubbles.releases (Sonny Iron Lung Smith). Reads the Product Direction Surfaces trio (docs/INVESTOR_OVERVIEW.md, docs/Product-Principles.md, .github/instructions/product-principles.instructions.md), reconciles current product capabilities, then produces or refreshes a phase release packet (vision, features, actions, business-plan, deployment, marketing, monetization, ops-scalability) under docs/plans/<phase>/ and docs/releases/<phase>.md, plus updates the Phase Overview table in docs/INVESTOR_OVERVIEW.md. Refuses to run on a repo missing the trio — routes to bubbles.setup first. Supports modes: bootstrap, refresh, extend, cross-product."
    statusCeiling: docs_updated
    terminalAliases: [ docs_updated ]
    phaseOrder: [ select, releases, docs, finalize ]
    requiredGates: [ G001, G010, G011, G012 ]
    constraints:
      requireExistingImplementation: false
      readOnlyAudit: false
      noCodeChanges: true
      requireProductDirectionTrio: true
      requireCarryForwardTable: true
      requireInlineVisionRestatement: true
      noFabricatedPrinciples: true
      noFabricatedCapabilities: true
      noFabricatedCompetitors: true
      sequentialSpecCompletion: false
      antiFabricationDetection: true

  idea-to-release-completion:
    description: "Full lifecycle chained mode. Walks an idea end-to-end: optional brainstorm, release packet bootstrap (declaring the new capability as `planned`), spec/design/scopes via product-to-delivery, full implementation + hardening + audit, then a final release packet refresh that flips the capability to `delivered` with the spec evidence link AND updates the INVESTOR_OVERVIEW Phase Overview table. The `releases` phase appears TWICE: at the start (mode: bootstrap or refresh) to declare intent, and at the end (mode: refresh) to record reality. Both are owned exclusively by bubbles.releases (Sonny Iron Lung Smith). Refuses to run if the Product Direction Surfaces trio is missing — routes to bubbles.setup first."
    statusCeiling: done
    phaseOrder: [ analyze, releases, select, bootstrap, implement, test, regression, simplify, stabilize, devops, security, docs, validate, audit, chaos, releases, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G013, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G032, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    maxChaosRounds: 5
    constraints:
      requireProductDirectionTrio: true
      requireBusinessAnalysis: true
      requireUXDesign: true
      requireDesignBeforeImplement: true
      requireArtifactFreshnessReconciliation: true
      requireCarryForwardTable: true
      requireInlineVisionRestatement: true
      noFabricatedPrinciples: true
      noFabricatedCapabilities: true
      noFabricatedCompetitors: true
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true
      # First releases phase: bootstrap or refresh the packet so the
      # new capability appears as `planned` (or `in-progress` if the
      # spec already exists) before delivery starts.
      firstReleasesPhaseMode: bootstrap-or-refresh
      firstReleasesPhasePosition: 1
      # Final releases phase: refresh the packet so the delivered
      # capability flips from `planned`/`in-progress` to `delivered`
      # with evidence link, AND the INVESTOR_OVERVIEW Phase Overview
      # table updates. This step is the ONLY way the framework
      # guarantees the release packet does not drift after delivery.
      finalReleasesPhaseMode: refresh
      finalReleasesPhasePosition: -2
      releasesPhaseOwner: bubbles.releases
      # If audit did not certify the spec as done, the final refresh
      # MUST leave the capability at `in-progress` (not `delivered`).
      # bubbles.releases never fabricates a delivered claim.
      forbidFabricatedDeliveredClaim: true

