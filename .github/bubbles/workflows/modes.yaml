      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  redteam-to-doc:
    description: Run adversarial red-team attacks on a finished result (Green Bastard); if an attack exposes a real weakness, execute the full finding-owned planning/remediation chain before completing validation, audit, docs, and finalize. Off by default — resolves posture via adversarial-resolve.sh; redteam emits findings and never certifies.
    statusCeiling: done
    phaseOrder: [ select, redteam, validate, audit, docs, finalize ]
    requiredGates: [ G001, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    maxChaosRounds: 3
    constraints:
      requireFindingOwnedPlanningWorkflow: true
      findingPlanningAgents: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      findingDeliveryPhases: [ implement, test, validate, audit, docs, finalize ]
      requireTerminalFindingClosure: true
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true
      # Adversarial-verification control plane (IMP-002): the redteam phase
      # resolves its effective posture (mode/passes/teeth) via
      # adversarial-resolve.sh. mode=off short-circuits the phase to a
      # completed_diagnostic no-op (zero behavior change on upgrade).
      adversarialControlPlane: true

  production-adversarial-probe:
    description: Bounded, armed, read-only adversarial probing of a LIVE / production system (Green Bastard on a leash — the chaos-monkey mode). Requires explicit arming AND a target allowlist; observes and injects bounded hostile input on the READ-ONLY operate plane only; restores any mutated state before completing; never certifies and never edits source.
    statusCeiling: validated
    terminalAliases: [ validated ]
    phaseOrder: [ select, redteam, finalize ]
    requiredGates: [ G001, G009, G011, G012, G073 ]
    constraints:
      modeClass: validate-only
      specReviewDefault: off
      specReviewOptOutReason: production-adversarial-probe is a read-only diagnostic with statusCeiling validated and cannot run pre-implementation hooks
      planningTruthMutation: false
      # Production-probe safety rails (IMP-002 S6). The redteam agent enforces
      # each of these per its PRODUCTION SAFETY section; the mode declares them
      # so an orchestrator cannot dispatch an unarmed or write-plane probe.
      adversarialControlPlane: true
      productionProbe: true
      requireArming: true
      requireTargetAllowlist: true
      operatePlaneReadOnly: true
      requireRestoreOrFix: true
      boundedExecution: true

  validate-to-doc:
    description: Run validation, audit, and docs sync. For specs needing final quality verification without re-running tests or chaos.
    statusCeiling: validated
