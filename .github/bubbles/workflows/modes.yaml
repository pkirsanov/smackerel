    maxChaosRounds: 5
    constraints:
      continueOnBlocked: false
      finalGlobalPassRequired: true
      requireDesignBeforeImplement: true
      allowBootstrapIterations: true
      bootstrapAgents: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      bootstrapLoopExit: design_spec_scopes_ready
      forceSequentialPerSpec: true
      requirePerSpecPhaseCompletion: [ simplify, gaps, harden, stabilize, security, validate, audit, chaos, docs ]
      requireQualityLoopUntilCertifiedDone: true
      restartLoopAtPhase: implement
      allowImprovementPrelude: true
      improvementPreludeDefault: off
      improvementPreludeRoundLimitDefault: null
      specReviewDefault: once-before-implement
      useChildWorkflows: true
      childWorkflowBundles:
        testVerification: test-to-doc
        qualitySweep: harden-gaps-to-doc
        validationCertification: validate-to-doc
        bugClosure: bugfix-fastlane
      improvementPreludeProfiles:
        analyze-design-plan: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
        analyze-ux-design-plan: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      blockedOnlyWhenValidateBlocked: true
      requireImplementedVsClaimedReconciliation: true
      requireNoSkippedTests: true
      requireNoPreexistingFailingTests: true
      requireNoInternalMocksExceptExternalDeps: true
      requireGherkinE2eCoverage: true
      requireCoveragePolicyCompliance: true
      requireChaosInQualitySweep: true
      requireIssuePromotionToScenarioOrBug: true
      requireScenarioExpansionTests: true
      requireRegressionTestsForNewBugs: true
      requireAllDiscoveredBugsClosedInRun: true
      runUntilAllSpecsDone: true
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requirePhaseEvidenceBeforeAdvance: true
      blockOnMissingSpecialistExecution: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  bugfix-fastlane:
    description: Focused bug loop with mandatory reproduction and verification. Loops until validate certifies the fix or returns a documented blocked verdict.
    inherits: [ base-delivery, delivery-gate-baseline, delivery-quality-constraints ]
    phaseOrder: [ select, bootstrap, implement, test, regression, simplify, gaps, harden, stabilize, devops, security, validate, audit, finalize ]
    requiredGates: [ G002, G060 ]
    constraints:
      requireBugReproductionBeforeFix: true
      requireBugVerificationAfterFix: true
      forceTddMode: scenario-first
      requireProtectedRegressionContracts: true
      requireQualityLoopUntilCertifiedDone: true
      restartLoopAtPhase: implement
      blockedOnlyWhenValidateBlocked: true
      requireNoSkippedTests: true
      requireNoPreexistingFailingTests: true
      requireNoInternalMocksExceptExternalDeps: true
      requireGherkinE2eCoverage: true
      requireAllDiscoveredBugsClosedInRun: true
      requirePhaseEvidenceBeforeAdvance: true
      blockOnMissingSpecialistExecution: true

  docs-only:
    description: Documentation maintenance without implementation changes.
    statusCeiling: docs_updated
    terminalAliases: [ docs_updated ]
    phaseOrder: [ select, docs, validate, audit, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073 ]
    constraints:
      modeClass: docs-only
      specReviewDefault: off
      specReviewOptOutReason: docs-only has statusCeiling docs_updated and cannot run pre-implementation hooks
      planningTruthMutation: false

  validate-only:
    description: Validation-only run with evidence output.
    statusCeiling: validated
    terminalAliases: [ validated ]
    phaseOrder: [ select, validate, finalize ]
    requiredGates: [ G001, G007, G011, G012, G073 ]
    constraints:
      modeClass: validate-only
      specReviewDefault: off
      specReviewOptOutReason: validate-only has statusCeiling validated and cannot run pre-implementation hooks
      planningTruthMutation: false

  audit-only:
    description: Audit-only run for already validated scopes.
    statusCeiling: validated
    terminalAliases: [ validated ]
    phaseOrder: [ select, audit, finalize ]
    requiredGates: [ G001, G008, G011, G012, G073 ]
    constraints:
      modeClass: validate-only
      specReviewDefault: off
      specReviewOptOutReason: audit-only has statusCeiling validated and cannot run pre-implementation hooks

  chaos-hardening:
    description: Start with chaos probes, then run the remediation, verification, docs, and finalize chain until clean or retry limit.
    statusCeiling: done
    phaseOrder: [ select, bootstrap, chaos, implement, test, regression, simplify, stabilize, devops, security, validate, audit, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G058, G059, G060, G061 ]
    maxChaosRounds: 5
    constraints:
      requireFindingOwnedPlanningWorkflow: true
      findingPlanningAgents: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      findingDeliveryPhases: [ implement, test, validate, audit, docs, finalize ]
      requireTerminalFindingClosure: true
      forceTddMode: scenario-first
      lockdownAware: true
      requireProtectedRegressionContracts: true
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  harden-to-doc:
    description: Start from validation baseline, then harden, implement fixes, and run full quality chain. For specs with existing implementation that need quality hardening.
    inherits: [ base-delivery, delivery-gate-baseline, delivery-quality-constraints, finding-owned-remediation ]
    phaseOrder: [ select, bootstrap, validate, harden, implement, test, regression, simplify, stabilize, devops, security, chaos, validate, audit, docs, finalize ]
    maxChaosRounds: 3

  gaps-to-doc:
    description: Start from validation baseline, then close implementation/design gaps, implement fixes, and run full quality chain. For specs needing gap remediation before quality verification.
    inherits: [ base-delivery, delivery-gate-baseline, delivery-quality-constraints, finding-owned-remediation ]
    phaseOrder: [ select, bootstrap, validate, gaps, implement, test, regression, simplify, stabilize, devops, security, chaos, validate, audit, docs, finalize ]
    requiredGates: [ G002 ]
    maxChaosRounds: 3

  harden-gaps-to-doc:
    description: Full quality sweep - validate baseline, harden existing implementation, close design gaps, implement fixes, then run complete quality chain. Most thorough pre-release verification.
    statusCeiling: done
    phaseOrder: [ select, bootstrap, validate, harden, gaps, implement, test, regression, simplify, stabilize, devops, security, chaos, validate, audit, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    maxChaosRounds: 3
    constraints:
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  reconcile-to-doc:
    description: Validate claimed completion against actual artifacts and evidence, reconcile stale state and scope status, then implement fixes and run the full quality chain.
    statusCeiling: done
    phaseOrder: [ select, bootstrap, validate, implement, test, regression, simplify, stabilize, devops, security, validate, audit, chaos, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    maxChaosRounds: 3
    constraints:
      requireFindingOwnedPlanningWorkflow: true
      findingPlanningAgents: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      findingDeliveryPhases: [ implement, test, validate, audit, docs, finalize ]
      requireTerminalFindingClosure: true
      requireArtifactStateReconciliation: true
      requireArtifactFreshnessReconciliation: true
      specReviewDefault: once-before-implement
      validateClaimsBeforeImplementation: true
      resetStaleStateBeforeImplement: true
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  test-to-doc:
