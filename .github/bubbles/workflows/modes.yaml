modes:
  # ──────────────────────────────────────────────────────────────────────────
  # CANONICAL modes registry (v6.1 / S2 true split). This file is the single
  # source of truth for every workflow mode definition plus the phaseRelevance
  # sub-block. It used to live inline at the end of bubbles/workflows.yaml; that
  # duplication was removed in S2. mode-resolver.sh composes workflows.yaml with
  # this file at read time; the other consumers (artifact-lint, state-transition
  # -guard, generate-framework-stats, workflow-registry-consistency, …) read
  # this file directly. Edit mode definitions HERE.
  # `generate-modes-block.sh --check` (run by framework-validate) blocks any
  # re-inlining of a modes: block back into workflows.yaml.
  # ──────────────────────────────────────────────────────────────────────────

  # ── Phase Relevance: Smart Phase Routing ──
  #
  # Before invoking each phase, bubbles.workflow evaluates whether the phase
  # is relevant to the current scope's changed surface. Irrelevant phases
  # are SKIPPED with a recorded justification — never silently omitted.
  #
  # SAFETY GUARANTEES (NON-NEGOTIABLE):
  # 1. Skipped phases are recorded in executionHistory as { phase, outcome: "skipped", reason }
  # 2. If artifacts change AFTER a phase was skipped (e.g., specs updated by clarify/harden),
  #    the skip decision is RE-EVALUATED. A previously-skipped phase MUST be included if new
  #    changes make it relevant.
  # 3. neverSkip phases are ALWAYS invoked regardless of relevance rules.
  # 4. Phase relevance only applies to orchestrated workflows (bubbles.workflow).
  #    Direct agent invocations are not subject to skip rules.
  # 5. The orchestrator MUST log skip decisions so audits can verify correctness.
  #
  # Gate compatibility: G027 (phase-scope coherence) accepts skipped-with-reason as
  # valid. Skipped phases do NOT appear in completedPhaseClaims. They appear only
  # in executionHistory with outcome: skipped.
  #
  phaseRelevance:
    enabled: true
    # Re-evaluate skip decisions when these events occur
    reevaluateTriggers:
    - artifact_modified # spec.md, design.md, or scopes.md changed by a prior phase
    - scope_surface_expanded # new files/directories added to scope plan
    - gate_failure # a gate that was met pre-skip now fails (e.g., security finding added)
    - phase_routed_new_work # a prior phase routed work that changes relevance
    rules:
    - phase: simplify
      skipWhen: scope_changed_fewer_than_50_lines
      reason: "Simplification pass skipped — scope delta is small enough to not warrant a dedicated pass"
    - phase: stabilize
      skipWhen: scope_has_no_sla_or_perf_targets
      reason: "Stability pass skipped — scope defines no latency SLAs or performance targets"
    - phase: devops
      skipWhen: scope_has_no_ci_deploy_or_infra_changes
      reason: "DevOps pass skipped — scope does not modify CI, deployment, monitoring, or infrastructure"
    - phase: chaos
      skipWhen: scope_is_docs_only_or_config_only
      reason: "Chaos pass skipped — scope is documentation or configuration only, no runtime behavior to probe"
    - phase: interrogate # grill
      skipWhen: scope_has_no_ambiguity_markers
      reason: "Grill pass skipped — scope has clear requirements with no ambiguity markers"
    - phase: security
      skipWhen: scope_has_no_auth_input_crypto_or_trust_boundary_changes
      reason: "Security pass skipped — scope does not touch authentication, input handling, crypto, or trust boundaries"
    - phase: regression
      skipWhen: scope_is_new_feature_with_no_prior_specs
      reason: "Regression pass skipped — no prior specs exist that could be affected"
    # Phases that NEVER skip regardless of relevance rules
    neverSkip:
    - select
    - bootstrap
    - implement
    - test
    - validate
    - finalize
    - docs # docs must always sync after any change
    - audit # audit is the final quality gate, never optional
    # How skip decisions are recorded
    skipRecordSchema:
      phase: string
      outcome: skipped
      reason: string
      changedSurface: list # dirs/files that were evaluated
      reevaluated: boolean # true if skip was re-evaluated and upheld
      reevaluationTrigger: string # which trigger caused re-evaluation (if any)

  value-first-e2e-batch:
    description: Discover highest-value next work (spec/scope/bug/gap/hardening/new feature), bootstrap missing artifacts, then run full E2E delivery loop.
    statusCeiling: done
    phaseOrder: [ discover, select, bootstrap, implement, test, regression, simplify, stabilize, devops, security, docs, validate, audit, chaos, redteam, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G013, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    maxChaosRounds: 5
    constraints:
      valueFirstSelection: true
      allowBootstrapIterations: true
      bootstrapAgents: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      bootstrapLoopExit: design_spec_scopes_ready
      executionWorkflowMode: full-delivery
      usePriorityScoring: true
      scoringProfile: default
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  spec-scope-hardening:
    description: Harden spec/design/scopes quality and expand Gherkin-to-E2E coverage before implementation.
    statusCeiling: specs_hardened
    terminalAliases: [ specs_hardened ]
    phaseOrder: [ select, bootstrap, harden, docs, validate, audit, finalize ]
    requiredGates: [ G001, G002, G006, G007, G008, G010, G011, G012, G014, G015, G016, G073 ]
    constraints:
      requireDetailedStoriesAndGherkin: true
      requireGherkinToE2ETraceability: true
      requireDoDE2EExpansion: true
      requireScenarioCoverageAcrossDeclaredUseCases: true
      focus: specs_and_scopes_only
      allowImplementationForFindings: false

  product-to-planning:
    description: Full analysis and planning pipeline from business analysis through UX, design, and scope planning — no implementation. Use when creating specs, designs, scopes, or bug artifacts from findings, requirements, or review outputs.
    statusCeiling: specs_hardened
    terminalAliases: [ specs_hardened ]
    phaseOrder: [ analyze, select, bootstrap, harden, docs, validate, audit, finalize ]
    requiredGates: [ G001, G002, G006, G007, G008, G010, G011, G012, G014, G015, G016, G032, G073 ]
    constraints:
      requireBusinessAnalysis: true
      requireUXDesign: true
      requireDetailedStoriesAndGherkin: true
      requireGherkinToE2ETraceability: true
      requireDoDE2EExpansion: true
      requireScenarioCoverageAcrossDeclaredUseCases: true
      focus: planning_only
      allowImplementationForFindings: false

  full-delivery:
    description: Default maximum-assurance delivery loop. Runs the full improvement and certification chain repeatedly until validate certifies done or returns a documented blocked verdict. Optional improvement preludes can front-load analyst/UX/design/plan passes for a bounded number of rounds.
    inherits: [ base-delivery, delivery-gate-baseline, delivery-quality-constraints ]
    phaseOrder: [ select, bootstrap, implement, test, regression, simplify, gaps, harden, stabilize, devops, security, validate, audit, chaos, redteam, docs, finalize ]
    requiredGates: [ G002 ]
    maxChaosRounds: 5
    constraints:
      continueOnBlocked: false
      finalGlobalPassRequired: true
      requireDesignBeforeImplement: true
      allowBootstrapIterations: true
      bootstrapAgents: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      bootstrapLoopExit: design_spec_scopes_ready
      forceSequentialPerSpec: true
      requirePerSpecPhaseCompletion: [ simplify, gaps, harden, stabilize, security, validate, audit, chaos, docs ]
      requireQualityLoopUntilCertifiedDone: true
      restartLoopAtPhase: implement
      allowImprovementPrelude: true
      improvementPreludeDefault: off
      improvementPreludeRoundLimitDefault: null
      specReviewDefault: once-before-implement
      useChildWorkflows: true
      childWorkflowBundles:
        testVerification: test-to-doc
        qualitySweep: harden-gaps-to-doc
        validationCertification: validate-to-doc
        bugClosure: bugfix-fastlane
      improvementPreludeProfiles:
        analyze-design-plan: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
        analyze-ux-design-plan: [ bubbles.analyst, bubbles.ux, bubbles.design, bubbles.plan ]
      blockedOnlyWhenValidateBlocked: true
      requireImplementedVsClaimedReconciliation: true
      requireNoSkippedTests: true
      requireNoPreexistingFailingTests: true
      requireNoInternalMocksExceptExternalDeps: true
      requireGherkinE2eCoverage: true
      requireCoveragePolicyCompliance: true
      requireChaosInQualitySweep: true
      requireIssuePromotionToScenarioOrBug: true
      requireScenarioExpansionTests: true
      requireRegressionTestsForNewBugs: true
      requireAllDiscoveredBugsClosedInRun: true
      runUntilAllSpecsDone: true
      requirePhaseEvidenceBeforeAdvance: true
      blockOnMissingSpecialistExecution: true

  # delivery-lockdown — pre-v6 (v5) name of full-delivery. The v5→v6 mode
  # collapse renamed it to full-delivery: identical maximum-assurance delivery
  # semantics (full-delivery additionally adds the v6 `redteam` phase and moves
  # the shared constraints into templates). This v5 KEY is retained so persisted
  # artifacts (state.json.workflowMode: delivery-lockdown) keep resolving via the
  # grandfather path (BUBBLES_MODE_GRANDFATHER=1 / --grandfather). New operator
  # input MUST use full-delivery (v6 form: `implement action:full-delivery
  # target:spec`). The block below is the faithful v5 original under which the
  # affected specs were worked.
