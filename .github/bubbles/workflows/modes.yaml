  stochastic-quality-sweep:
    description: Run multiple randomized rounds where each round picks a random spec (from all specs by default, or from a user-provided subset) AND a random trigger, then executes the mapped trigger-owned end-to-end workflow mode for that trigger. Stochastic sweep itself only chooses the target and trigger; the mapped mode owns probing, remediation, verification, docs, and finalize.
    statusCeiling: done
    phaseOrder: [ select, chaos, harden, gaps, simplify, stabilize, devops, security, regression, validate, bug, implement, test, validate, audit, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G031, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    maxChaosRounds: 5
    constraints:
      # Fan-out mode: each round dispatches a mapped child workflow that itself
      # spans multiple specialist agents (bug → implement → test → validate →
      # audit → docs). Cannot run as a subagent because subagents lack the
      # runSubagent tool needed to dispatch their own children. MUST run in the
      # top-level session runtime that owns the operator turn. See
      # workflow-execution-loops.md → Top-level-runtime modes.
      requiresTopLevelRuntime: true
      # Stochastic round execution model — NOT sequential phaseOrder.
      # The orchestrator runs N rounds, each round:
      #   1. Pick a random spec from the spec pool
      #      - Default pool: ALL specs discovered from specs/ folder
      #      - Optional: user provides spec targets (range, list, paths) to limit the pool
      #   2. Pick a random trigger from triggerAgentPool (or user-specified subset)
      #   3. Resolve the trigger-owned child workflow mode from triggerWorkflowModes
      #   4. Execute that mapped workflow mode against the selected spec
      #   5. Record the mapped workflow outcome and execution model in the sweep ledger
      # After all rounds: parent records a sweep summary only; mapped modes own docs/finalize
      stochasticRoundExecution: true
      # Spec pool discovery: when no spec targets provided, discover ALL spec
      # folders under specs/ as the pool. User can restrict with standard spec
      # target syntax (range: 011-037, list: 011,027,037, paths: specs/...).
      autoDiscoverAllSpecs: true
      # Default trigger pool — all probing/quality agents
      # User can override with triggerAgents option to limit the pool
      triggerAgentPool: [ chaos, harden, gaps, simplify, stabilize, test, devops, validate, improve, security, regression ]
      # Max rounds (overridable via maxRounds user option)
      defaultMaxRounds: 10
      # Time budget in minutes (overridable via minutes user option)
      # When set, rounds continue until time runs out (finishing the active round)
      defaultTimeBudgetMinutes: 60
      # Trigger-owned child workflow map.
      # Every trigger in triggerAgentPool MUST resolve to a delivery-capable child workflow.
      # The stochastic parent MUST NOT execute the trigger directly as the entire round or build
      # an inline bespoke fix cycle when a mapped child workflow mode exists. If nested workflow
      # delegation is unavailable, the parent MUST execute the mapped mode in parent-expanded form.
      requireTriggerOwnedChildWorkflows: true
      allowParentExpandedChildWorkflow: true
      recordChildWorkflowExecutionModel: true
      triggerWorkflowModes:
        chaos: chaos-hardening
        harden: harden-to-doc
        gaps: gaps-to-doc
        simplify: simplify-to-doc
        stabilize: stabilize-to-doc
        test: test-to-doc
        devops: devops-to-doc
        validate: reconcile-to-doc
        improve: improve-existing
        security: security-to-doc
        regression: regression-to-doc
      # Mapped child workflow modes own docs/finalize/certification; parent only records sweep summary.
      tailPhases: []
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  iterate:
    description: Priority-driven iterative execution loop. Each iteration picks the highest-priority work item across all specs (bugs, incomplete scopes, gaps, hardening needs, improvements, chaos probes), auto-selects the correct workflow mode for that work, and executes a full delivery cycle. Runs for N iterations or until a time budget is exhausted. Unlike stochastic-quality-sweep (random probing), iterate is deterministic and priority-ordered. Supports ALL work types including implementation, bug fixes, improvements, chaos hardening, gap closure, and competitive analysis.
    inherits: [ base-delivery, delivery-gate-baseline, delivery-quality-constraints ]
    # phaseOrder represents the SUPERSET of all possible phases iterate may use.
    # Each iteration selects a SUBSET based on auto-mode-selection (Work-Type-to-Mode Mapping).
    phaseOrder: [ discover, select, analyze, bootstrap, harden, gaps, simplify, stabilize, devops, security, regression, bug, implement, test, docs, validate, audit, chaos, finalize ]
    requiredGates: [ G002 ]
    constraints:
      # Fan-out mode: each iteration auto-selects and dispatches a delivery child
      # workflow (full-delivery / bugfix-fastlane / chaos-hardening / ...) that
      # itself spans multiple specialist agents. Cannot run as a subagent because
      # subagents lack the runSubagent tool needed to dispatch their own children.
      # MUST run in the top-level session runtime that owns the operator turn. See
      # workflow-execution-loops.md → Top-level-runtime modes.
      requiresTopLevelRuntime: true
      # Iterate round execution model — priority-driven, NOT random.
      # Each round:
      #   1. bubbles.iterate picks the highest-priority work item across all specs
      #      using its Priority 0-4 selection logic
      #   2. bubbles.iterate auto-selects the correct workflow mode for the work
      #      (bugfix-fastlane, full-delivery, improve-existing, chaos-hardening, etc.)
      #   3. bubbles.iterate dispatches to specialist agents following the selected
      #      mode's phaseOrder
      #   4. After the work item is complete (or blocked), the round ends
      #   5. Next round: re-evaluate priorities and pick the next work item
      # After all rounds: per-spec finalize for any spec that was touched
      iterativeRoundExecution: true
      # When no spec targets provided, iterate picks across ALL specs
      autoDiscoverAllSpecs: true
      # Priority-driven work selection (deterministic, not random)
      priorityDrivenWorkSelection: true
      # Auto-mode selection — iterate determines the correct workflow mode
      # for each work item based on its type (see Work-Type-to-Mode Mapping)
      autoModeSelection: true
      # Supported sub-modes that iterate can dispatch per-iteration
      supportedSubModes:
      - full-delivery
      - bugfix-fastlane
      - harden-to-doc
      - gaps-to-doc
      - harden-gaps-to-doc
      - stabilize-to-doc
      - chaos-hardening
      - improve-existing
      - test-to-doc
      - docs-only
      - retro-to-simplify
      - retro-to-harden
      - retro-quality-sweep
      - retro-to-review
      - release-planning-to-doc
      - product-to-delivery
      - idea-to-release-completion
      # Default iterations (overridable via iterations user option)
      defaultIterations: 1
      # Default time budget in minutes (overridable via minutes user option)
      # When set, iterations continue until time runs out (finishing the active iteration)
      defaultTimeBudgetMinutes: 120
      # Supported work types for type: filtering
      supportedWorkTypes: [ tests, docs, stabilize, simplify, gaps, harden, implement, refactor, feature, bugfix, analyze, improve, security, chaos, release ]
      # Shared tail phases after all iterations complete
      tailPhases: [ finalize ]

  autonomous-goal:
    description: Fully autonomous single-goal execution. User provides a goal in natural language; the agent autonomously discovers requirements, creates specs/designs/scopes, implements, tests, validates, audits, runs chaos/E2E, remediates all findings, and loops until convergence (zero open findings + all gates pass) or max iterations reached. Never stops on fixable obstacles — searches for solutions, tries alternative approaches. Delegates to bubbles.goal as the outer convergence controller.
    statusCeiling: done
    phaseOrder: [ discover, analyze, bootstrap, implement, test, validate, audit, chaos, redteam, harden, gaps, security, regression, simplify, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G031, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    constraints:
      # Fan-out mode: convergence loop dispatches remediationWorkflowModes per
      # finding (chaos-hardening / harden-to-doc / gaps-to-doc / ...). Each
      # mapped child workflow spans multiple specialists. Cannot run as a
      # subagent because subagents lack the runSubagent tool. MUST run in the
      # top-level session runtime. See workflow-execution-loops.md →
      # Top-level-runtime modes.
      requiresTopLevelRuntime: true
      convergenceLoopExecution: true
      maxConvergenceIterations: 10
      maxIdenticalFailureRetries: 3
      solutionSearchOnBlock: true
      solutionSearchSources: [ web, docs, codebase, similar-patterns ]
      mandatoryE2EPerVerifyCycle: true
      mandatoryChaosPerVerifyCycle: true
      autoBootstrap: true
      requireFindingRemediation: true
      neverStopForFixableObstacles: true
      triggerPhases: [ validate, audit, chaos, harden, gaps, security, regression, devops, stabilize ]
      remediationWorkflowModes:
        chaos: chaos-hardening
        harden: harden-to-doc
        gaps: gaps-to-doc
        security: security-to-doc
        regression: regression-to-doc
        validate: reconcile-to-doc
        audit: reconcile-to-doc
        test: test-to-doc
        devops: devops-to-doc
        stabilize: stabilize-to-doc
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  autonomous-sprint:
    description: Multi-goal time-bounded autonomous execution. User provides a list of goals and a time budget; the agent prioritizes goals by estimated effort and impact, executes each goal using the autonomous-goal convergence loop, checks the wall clock before each goal/scope, and stops gracefully when time expires (finishing the current scope completely). Can reorder goals dynamically if a smaller goal fits remaining time better. Delegates to bubbles.sprint as the sprint controller.
    statusCeiling: done
    phaseOrder: [ discover, select, analyze, bootstrap, implement, test, validate, audit, chaos, redteam, harden, gaps, security, regression, simplify, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G015, G016, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G031, G033, G034, G035, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061 ]
    constraints:
      # Fan-out mode: each goal runs the autonomous-goal convergence loop, which
      # itself dispatches remediation child workflows per finding. Cannot run as
      # a subagent because subagents lack the runSubagent tool. MUST run in the
      # top-level session runtime. See workflow-execution-loops.md →
      # Top-level-runtime modes.
      requiresTopLevelRuntime: true
      sprintExecution: true
      requireTimeBudget: true
      defaultTimeBudgetMinutes: 240
      wrapUpReserveMinutes: 15
      dynamicGoalReordering: true
      effortEstimates:
        small: 30
        medium: 90
        large: 240
      finishCurrentScopeBeforeStopping: true
      resumeSupport: true
      goalExecutionMode: autonomous-goal
      requireSprintReport: true
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  # ─────────────────────────────────────────────────────────────────────────
  # Modes that target the `delivered_pending_activation` ceiling (v4.1.0).
  #
  # These modes ship implementation + contract-level tests + audit + docs
  # to an HONEST intermediate state when the final live-runtime evidence
  # depends on an external actor (operator commit, third-party approval,
  # scheduled cutover, regulator review). They are NOT a workaround to
  # skip testing — every scope still requires the test classes that ARE
  # possible at ship time (contract, integration with stubs/contracts,
  # shell/manifest lint, dry-run apply). The deferred portion MUST be
  # tagged with a lockdownContract pattern that cites the FR / condition
  # / unblocker / expectedActivation.
  #
  # Gates G073, G008A, G022, G040 consult the scopeKinds / lockdownContract
  # registries to evaluate these modes correctly.
  # ─────────────────────────────────────────────────────────────────────────

  adapter-readiness-to-packet:
    description: "Deploy-adapter readiness mode. Ships an adapter (apply.sh / verify.sh / rollback.sh / manifest schema) plus an operator activation packet to `delivered_pending_activation`. Contract-level tests, shellcheck, yamllint, manifest schema validation, and dry-run apply are required. Live runtime E2E is honestly deferred until the operator commits per-host params and runs the activation packet. Every deferred DoD item MUST cite the lockdown FR (typically the explicit live-activation lockdown FR in the spec)."
    statusCeiling: delivered_pending_activation
    terminalAliases: [ delivered_pending_activation ]
    phaseOrder: [ select, bootstrap, implement, test, validate, audit, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G009, G010, G011, G012, G019, G020, G021, G022, G023, G024, G025, G027, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061, G073, G074 ]
    constraints:
      defaultScopeKind: deploy-pointer
      requiresLockdownDeclaration: true
      requireDeliverableManifest: true
      requireContractTestsInLieuOfLiveE2E: true
      requireShellLint: true
      requireManifestSchemaCheck: true
      requireDryRunApply: true
      requireActivationPacket: true
      sequentialSpecCompletion: true
      antiFabricationDetection: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireEvidenceByReference: true

  dark-launch-shipped:
    description: "Dark-launch mode. Ships a feature behind an off-by-default feature flag to `delivered_pending_activation`. Full implement + test + audit + integration tests with flag forced on in a sealed test env required. Live production E2E is honestly deferred until rollout. Every deferred runtime-E2E DoD item MUST cite the rollout lockdown FR plus the rollout owner (unblocker) and expectedActivation milestone."
    statusCeiling: delivered_pending_activation
    terminalAliases: [ delivered_pending_activation ]
    phaseOrder: [ select, bootstrap, implement, test, validate, audit, regression, simplify, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G009, G010, G011, G012, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061, G073 ]
    constraints:
      defaultScopeKind: runtime-behavior
      requiresLockdownDeclaration: true
      requireDeliverableManifest: true
      requireFeatureFlagOffByDefault: true
      requireSealedEnvE2EWithFlagOn: true
      requireRolloutPlanInActivationPacket: true
      sequentialSpecCompletion: true
      antiFabricationDetection: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireEvidenceByReference: true

  migration-shipped-pending-cutover:
    description: "Migration mode. Ships forward/backward-compatible migration code (DB schema, API version, protocol upgrade) to `delivered_pending_activation`. Backward-compat contract tests, dual-read or dual-write tests, and explicit rollback plan are required. Live cutover E2E is honestly deferred until the scheduled cutover window. Every deferred DoD item MUST cite the cutover lockdown FR, the cutover window (expectedActivation), and the rollback path (unblocker)."
    statusCeiling: delivered_pending_activation
    terminalAliases: [ delivered_pending_activation ]
    phaseOrder: [ select, bootstrap, implement, test, validate, audit, regression, security, docs, finalize ]
    requiredGates: [ G001, G002, G003, G004, G005, G006, G007, G009, G010, G011, G012, G019, G020, G021, G022, G023, G024, G025, G027, G040, G044, G047, G048, G051, G055, G056, G057, G059, G061, G073 ]
    constraints:
      defaultScopeKind: contract-only
      requiresLockdownDeclaration: true
      requireDeliverableManifest: true
      requireBackwardCompatTest: true
      requireForwardCompatTest: true
      requireDualReadOrDualWriteTest: true
      requireRollbackPlanInActivationPacket: true
      requireCutoverWindowDeclared: true
      sequentialSpecCompletion: true
      antiFabricationDetection: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireEvidenceByReference: true

  # ─────────────────────────────────────────────────────────────────────────
  # RELEASE TRAIN MODES (DVS — bubbles.train)
  # Trunk-based release trains: cut, promote between slots, rollback,
  # retire. Train identifiers are operator-chosen strings; phases are
  # `active|maintained|frozen|retired`; slots are `prod|staging|none`.
  # ─────────────────────────────────────────────────────────────────────────

  release-train-cut:
    description: "Cut a release-train candidate. Tags trunk at SHA, triggers CI to build signed image digests + per-train config bundle. Cut produces evidence (build manifest + bundle SHA + signature receipts) but does NOT deploy. Refuses if any spec on this train has off-train flags defaulted ON (G111) or missing compliance declarations (G117-G120)."
    statusCeiling: train_cut
    terminalAliases: [ train_cut ]
    phaseOrder: [ select, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G074, G081, G110, G111, G117, G118, G120 ]
    constraints:
      modeClass: release-train
      requireDeclaredTrainInRegistry: true
      requireTrainPhaseAllowsCut: [ active, maintained ]
      requireAllOffTrainFlagsDefaultOff: true
      requireCompliancePreflightDeclared: true
      requireSignedBuildManifest: true
      requirePerTrainConfigBundle: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: release-train-cut consumes existing planning truth; does not modify spec/design/scopes

  release-train-promote:
    description: "Promote a release-train candidate from one slot to another (typically staging → prod). Pure pointer-swap on knb-side <product>/<target>/manifest.yaml to the candidate's digests + bundle. Requires staging soak evidence + passing backup-freshness gate (G112). Refuses if restore-drill has not run within cadence (G113)."
    statusCeiling: train_promoted
    terminalAliases: [ train_promoted ]
    phaseOrder: [ select, validate, devops, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G074, G081, G110, G112, G113, G117 ]
    constraints:
      modeClass: release-train
      requireDeclaredTrainInRegistry: true
      requireTrainPhaseAllowsPromote: [ active ]
      requireCandidateExistsForTrain: true
      requirePriorSlotSoakEvidence: true
      requireBackupFreshness: true
      requireRestoreDrillWithinCadence: true
      requireAtomicManifestCommit: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: release-train-promote is a pointer-swap operation; no planning surface

  release-train-rollback:
    description: "Roll back a release-train slot to the previous manifest commit. Pure pointer-swap on knb-side <product>/<target>/manifest.yaml. Never rebuilds. Reads previous manifest from `git show HEAD~1:...`, calls adapter apply.sh with old digests + bundle."
    statusCeiling: train_rolled_back
    terminalAliases: [ train_rolled_back ]
    phaseOrder: [ select, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G081, G110, G117 ]
    constraints:
      modeClass: release-train
      requireDeclaredTrainInRegistry: true
      requirePreviousManifestExists: true
      forbidRebuild: true
      requireAtomicManifestCommit: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: release-train-rollback is a pointer-swap operation; no planning surface

  release-train-retire:
    description: "Retire a release train. Pre-step requires ALL flags introduced by specs on this train to be cleaned up (removed from code + bundle) via flag-cleanup audits. Transitions train phase to `retired`. After retire, no cuts or promotes are allowed."
    statusCeiling: train_retired
    terminalAliases: [ train_retired ]
    phaseOrder: [ select, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G110, G111 ]
    constraints:
      modeClass: release-train
      requireDeclaredTrainInRegistry: true
      requireTrainPhaseAllowsRetire: [ active, maintained, frozen ]
      requireZeroLiveFlagsForTrain: true
      requireFlagCleanupAuditClean: true
      planningTruthMutation: false
      specReviewDefault: off

  release-train-status-all:
    description: "Read-only rollup of every train declared in config/release-trains.yaml. Reports id, phase, target_slot, flags_bundle, retention, pii, and open-flag count per train. Invoked via `/bubbles.train status --all-trains` or NL phrases routed by intent-routes.yaml (`what's in prod and dev`, `release status`). Never mutates state."
    statusCeiling: train_status_reported
    terminalAliases: [ train_status_reported ]
    phaseOrder: [ select, audit, finalize ]
    requiredGates: [ G001, G006, G007, G011, G012, G073, G110 ]
    constraints:
      modeClass: release-train
      auditOnly: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: release-train-status-all is read-only multi-train rollup

  # ─────────────────────────────────────────────────────────────────────────
  # UPKEEP MODES (Treena Lahey — bubbles.upkeep)
  # Recurring operational hygiene: backup, restore drill, BCDR drill,
  # patch cycle, secret rotation, flag cleanup audit, compliance sweep.
  # Calendar-driven via config/upkeep-calendar.yaml; ledger at
  # /srv/backups/upkeep-ledger.jsonl (append-only).
  # ─────────────────────────────────────────────────────────────────────────

  upkeep-backup-verify:
    description: "Daily backup verification. Runs T1 (ZFS snapshot) + T2 (host-local restic). Conditionally runs T3 (USB) and T4 (offsite cloud) based on OFFSITE_BACKEND env. Writes ledger entry with restic check exit code. Failure packets to bubbles.devops."
    statusCeiling: backup_verified
    terminalAliases: [ backup_verified ]
    phaseOrder: [ select, devops, validate, docs, finalize ]
    requiredGates: [ G001, G006, G007, G011, G012, G073, G112, G115, G117, G118 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: backup
      requireBackupLedgerWrite: true
      requireResticCheckPasses: true
      requireEphemeralRestoreNamespace: false
      planningTruthMutation: false
      specReviewDefault: off

  upkeep-restore-drill:
    description: "Weekly restore drill. Restores latest T2 snapshot into isolated `restore-test` namespace, runs product's smoke check, tears down namespace. Proves backup is restorable. Failure blocks next release-train-promote for that product (G113)."
    statusCeiling: restore_verified
    terminalAliases: [ restore_verified ]
    phaseOrder: [ select, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G113, G115, G117 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: restore-test
      requireEphemeralRestoreNamespace: true
      requireSmokeCheckPasses: true
      requireNamespaceTeardownOnExit: true
      requireProdStackUntouched: true
      planningTruthMutation: false
      specReviewDefault: off

  upkeep-bcdr-drill:
    description: "Quarterly BCDR drill. Full DR exercise restoring entire product stack into isolated namespace. Warns when OFFSITE_BACKEND=local-only (true BCDR impossible against single host). Records RTO/RPO actuals in ledger."
    statusCeiling: bcdr_verified
    terminalAliases: [ bcdr_verified ]
    phaseOrder: [ select, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G114, G115, G116, G117 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: bcdr-drill
      requireEphemeralRestoreNamespace: true
      requireFullStackRestore: true
      requireRtoRpoMeasurement: true
      warnOnLocalOnlyOffsite: true
      planningTruthMutation: false
      specReviewDefault: off

  upkeep-patch-cycle:
    description: "Monthly patch cycle. Base-image refresh + dependency audit. Produces a candidate via release-train-cut for the affected trains. Failure packets to bubbles.security if CVE-related, bubbles.stabilize otherwise."
    statusCeiling: patched
    terminalAliases: [ patched ]
    phaseOrder: [ select, security, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G117 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: patch-cycle
      requireBaseImageRefresh: true
      requireDependencyAudit: true
      planningTruthMutation: false
      specReviewDefault: off

  upkeep-secret-rotation:
    description: "Quarterly secret rotation. Rotates managed secrets (DB passwords, JWT keys, API tokens, OAuth secrets). Records old/new key-id hashes (NEVER values) in ledger (G119). Coordinates with bubbles.security if any secret is suspected compromised."
    statusCeiling: secrets_rotated
    terminalAliases: [ secrets_rotated ]
    phaseOrder: [ select, security, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G117, G119 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: secret-rotation
      requireKeyIdHashesRecorded: true
      forbidSecretValuesInLedger: true
      planningTruthMutation: false
      specReviewDefault: off

  upkeep-flag-cleanup:
    description: "Monthly flag-cleanup audit. Identifies flags whose owning train has graduated > 1 cycle ago and are still live in code. Packets cleanup work to bubbles.train (owner of flag lifecycle). Audit-only; never edits code."
    statusCeiling: flags_audited
    terminalAliases: [ flags_audited ]
    phaseOrder: [ select, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G111 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: flag-cleanup-audit
      auditOnly: true
      planningTruthMutation: false
      specReviewDefault: off

  upkeep-compliance-sweep:
    description: "Quarterly compliance sweep. Verifies G117 (audit-trail-immutable), G118 (backup-retention-declared), G119 (secret-rotation-recorded), G120 (pii-classification-declared). Generates docs/Compliance_Report.md with evidence; packets to bubbles.audit for sign-off. Treena gathers evidence, Ted certifies."
    statusCeiling: compliance_swept
    terminalAliases: [ compliance_swept ]
    phaseOrder: [ select, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G117, G118, G119, G120 ]
    constraints:
      modeClass: upkeep
      requireCalendarTaskDue: compliance-sweep
      requireComplianceReportGeneration: true
      requireAuditSignoffPacket: true
      auditOnly: true
      planningTruthMutation: false
      specReviewDefault: off

  # ─────────────────────────────────────────────────────────────────────────
  # CROSS-TRAIN PROPAGATION MODES (J-Roc — bubbles.propagate)
  # Forward-merge fixes between trains, backport under approval guard,
  # audit drift. Reads propagation-policy.yaml; appends to
  # propagation-ledger.yaml. Routes cherry-pick execution to bubbles.devops
  # and receiving-train validation to bubbles.validate/bubbles.test.
  # ─────────────────────────────────────────────────────────────────────────

  propagate-forward:
    description: "Cherry-pick latest commits forward across declared train edges. For each `defaultFlow` edge with `auto: true`, identifies commits on the source train not yet on the target, routes cherry-pick to bubbles.devops, routes receiving-train validation per `receivingTrainValidationMode`, appends ledger entry. NEVER moves changes backward. NEVER edits flag bundles."
    statusCeiling: propagated_forward
    terminalAliases: [ propagated_forward ]
    phaseOrder: [ select, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G110, G111, G117, G121, G122, G123 ]
    constraints:
      modeClass: propagation
      requirePropagationPolicy: true
      requireDeclaredTrainsInPolicy: true
      requireReceivingTrainValidation: true
      requireLedgerAppendOnly: true
      forbidFlagBundleEdits: true
      forbidBackwardMerge: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: propagate-forward moves existing trunk commits; does not modify planning surface

  propagate-backport:
    description: "Cherry-pick a fix backward (later train → earlier train) under approval guard. Refuses unless edge has `backportable: true` in policy AND operator supplies `--approval-token=<sha>` when `backportRequiresApproval: true`. Records approval token in ledger entry. Used for hotfixes shipped first to prod that need to flow back to trunk."
    statusCeiling: propagated_backward
    terminalAliases: [ propagated_backward ]
    phaseOrder: [ select, devops, validate, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G110, G111, G117, G121, G122, G123 ]
    constraints:
      modeClass: propagation
      requirePropagationPolicy: true
      requireBackportableEdge: true
      requireApprovalTokenWhenPolicyDemandsApproval: true
      requireReceivingTrainValidation: true
      requireLedgerAppendOnly: true
      forbidFlagBundleEdits: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: propagate-backport moves existing prod commits; does not modify planning surface

  propagate-audit:
    description: "Read-only drift report. For each `defaultFlow` edge, lists commits on the source train not yet on the target. No cherry-pick, no validation, no ledger entry. Used before release windows to see what's drifted."
    statusCeiling: propagation_audited
    terminalAliases: [ propagation_audited ]
    phaseOrder: [ select, audit, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G121 ]
    constraints:
      modeClass: propagation
      requirePropagationPolicy: true
      auditOnly: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: propagate-audit is read-only

  # ─────────────────────────────────────────────────────────────────────────
  # INCIDENT FASTLANE (Shitty Bill diagnoses, DVS rolls back, Tommy executes)
  # Chains stabilize diagnostics → train rollback → devops redeploy → validate
  # under a single workflow mode for production incidents.
  # ─────────────────────────────────────────────────────────────────────────

  incident-fastlane:
    description: "Production incident response chain. bubbles.stabilize diagnoses with severity tagging (G124); any `incident` severity routes pointer-swap rollback authority to bubbles.train (DVS); bubbles.devops executes the redeploy via repo CLI; bubbles.validate confirms the rollback target is live; bubbles.docs records post-incident notes (optional). Routed by NL phrases like 'prod is broken', 'rollback prod', 'production incident'. Preserves ownership boundaries — stabilize never rolls back inline."
    statusCeiling: incident_mitigated
    terminalAliases: [ incident_mitigated ]
    phaseOrder: [ select, stabilize, devops, validate, audit, redteam, docs, finalize ]
    requiredGates: [ G001, G006, G007, G008, G011, G012, G073, G110, G117, G124 ]
    constraints:
      modeClass: incident
      requireSeverityClassification: true
      forbidInlineRollbackInStabilize: true
      requireRollbackAuthorityRoutedToTrain: true
      planningTruthMutation: false
      specReviewDefault: off
      specReviewOptOutReason: incident-fastlane operates on existing trunk state; no planning surface change

  framework-health:
