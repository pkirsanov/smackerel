version: 1

generatedFrom:
- agents/bubbles.*.agent.md
- bubbles/agent-ownership.yaml
- bubbles/workflows.yaml

policyRegistry:
  configFile: .specify/memory/bubbles.config.json
  provenanceValues:
  - user-request
  - repo-default
  - workflow-forced
  - spec-lockdown

stateModel:
  executionClaimWriters:
  - bubbles.workflow
  - bubbles.iterate
  - bubbles.goal
  - bubbles.sprint
  - bubbles.bug
  - bubbles.analyst
  - bubbles.ux
  - bubbles.clarify
  - bubbles.design
  - bubbles.plan
  - bubbles.implement
  - bubbles.test
  - bubbles.devops
  - bubbles.docs
  - bubbles.chaos
  - bubbles.regression
  - bubbles.harden
  - bubbles.gaps
  - bubbles.stabilize
  - bubbles.security
  - bubbles.simplify
  - bubbles.audit
  certificationWriter: bubbles.validate

childWorkflowPolicy:
  defaultAllowed: false
  maxDepth: 1
  callers:
  - bubbles.workflow
  - bubbles.iterate
  - bubbles.goal
  - bubbles.sprint
  - bubbles.bug

resultPolicy:
  allowedOutcomes:
  - completed_owned
  - completed_diagnostic
  - route_required
  - blocked

agents:
  bubbles.super:
    class: utility
    canAskUserDirectly: true
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: []
  bubbles.workflow:
    class: orchestrator
    canInvokeChildWorkflows: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ finalize ]
  bubbles.iterate:
    class: orchestrator
    canInvokeChildWorkflows: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ select ]
  bubbles.goal:
    class: orchestrator
    canInvokeChildWorkflows: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ autonomous-goal ]
  bubbles.sprint:
    class: orchestrator
    canInvokeChildWorkflows: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ autonomous-sprint ]
  bubbles.analyst:
    class: planning-owner
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: [ spec.md ]
    ownsPhases: [ analyze ]
  bubbles.ux:
