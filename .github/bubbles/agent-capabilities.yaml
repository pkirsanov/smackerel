version: 1

generatedFrom:
- agents/bubbles.*.agent.md
- bubbles/agent-ownership.yaml
- bubbles/workflows.yaml

policyRegistry:
  configFile: .specify/memory/bubbles.config.json
  provenanceValues:
  - user-request
  - repo-default
  - workflow-forced
  - spec-lockdown

stateModel:
  executionClaimWriters:
  - bubbles.workflow
  - bubbles.iterate
  - bubbles.goal
  - bubbles.sprint
  - bubbles.bug
  - bubbles.analyst
  - bubbles.ux
  - bubbles.clarify
  - bubbles.design
  - bubbles.plan
  - bubbles.implement
  - bubbles.test
  - bubbles.devops
  - bubbles.docs
  - bubbles.chaos
  - bubbles.regression
  - bubbles.harden
  - bubbles.gaps
  - bubbles.stabilize
  - bubbles.security
  - bubbles.simplify
  - bubbles.audit
  - bubbles.train
  - bubbles.upkeep
  - bubbles.propagate
  certificationWriter: bubbles.validate

workflowModeGrants:
  defaultAllowed: false
  executionModel: direct-authorized-runner
  topLevelRuntimeRequired: true
  nestedWorkflowRunnerDispatch: forbidden
  agents:
    bubbles.workflow:
      modes: [ "*" ]
      excludedModes: [ autonomous-goal, autonomous-sprint, iterate ]
      maxRootModesPerRun: 1
    bubbles.goal:
      modes: [ "*" ]
      excludedModes: [ autonomous-sprint, iterate ]
    bubbles.sprint:
      modes: [ "*" ]
      excludedModes: [ iterate ]
    bubbles.iterate:
      modes: [ iterate, full-delivery, bugfix-fastlane, harden-to-doc, gaps-to-doc, harden-gaps-to-doc, stabilize-to-doc, chaos-hardening, improve-existing, test-to-doc, docs-only, retro-to-simplify, retro-to-harden, retro-quality-sweep, retro-to-review, release-planning-to-doc, product-to-delivery, idea-to-release-completion ]
    bubbles.bug:
      modes: [ bugfix-fastlane ]
    bubbles.releases:
      modes: [ release-planning-to-doc ]
    bubbles.train:
      modes: [ release-train-cut, release-train-promote, release-train-rollback, release-train-retire, release-train-status-all ]
    bubbles.upkeep:
      modes: [ upkeep-backup-verify, upkeep-restore-drill, upkeep-bcdr-drill, upkeep-patch-cycle, upkeep-secret-rotation, upkeep-flag-cleanup, upkeep-compliance-sweep ]
    bubbles.propagate:
      modes: [ propagate-forward, propagate-backport, propagate-audit ]
    bubbles.stabilize:
      modes: [ stabilize-to-doc, incident-fastlane ]
    bubbles.retro:
      modes: [ retro-to-simplify, retro-to-harden, retro-to-review, retro-quality-sweep, framework-health ]
    bubbles.journey:
      modes: [ journey-refinement ]

resultPolicy:
  allowedOutcomes:
  - completed_owned
  - completed_diagnostic
  - route_required
  - blocked

agents:
  bubbles.super:
    class: utility
    canAskUserDirectly: true
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: []
  bubbles.workflow:
    class: orchestrator
    canExecuteWorkflowModes: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ finalize ]
  bubbles.iterate:
    class: orchestrator
    canExecuteWorkflowModes: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ select ]
  bubbles.goal:
    class: orchestrator
    canExecuteWorkflowModes: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ autonomous-goal ]
  bubbles.sprint:
    class: orchestrator
    canExecuteWorkflowModes: true
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: []
    ownsPhases: [ autonomous-sprint ]
  bubbles.analyst:
    class: planning-owner
    canAskUserDirectly: false
    delegatesRequired: true
    ownsArtifacts: [ spec.md ]
    ownsPhases: [ analyze ]
  bubbles.ux:
