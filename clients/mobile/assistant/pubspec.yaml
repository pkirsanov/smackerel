name: smackerel_assistant
description: Smackerel assistant shared-core skeleton (spec 073 Scope 1d). Pure-Dart shared core plus iOS and Android platform adapter stubs.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  dart_style: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  yaml: ^3.1.2
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SmackerelAssistantPlugin
      android:
        package: dev.smackerel.assistant
        pluginClass: SmackerelAssistantPlugin
