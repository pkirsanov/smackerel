project:
  name: smackerel

# Workspace host-port allocation (cross-project registry):
# - GuestHost:           10000-19999
# - WanderAide:          20000-26999
# - QuantitativeFinance: 30000-39999
# - Smackerel:           40000-48999  (49000-49999 reserved buffer — IANA ephemeral zone starts at 49152)
#
# Smackerel host forwarding sub-blocks:
# - Dev app:    40001-40099
# - Dev infra:  42001-42099
# - Test app:   45001-45099
# - Test infra: 47001-47099
# - Reserved:   49000-49999  (do not allocate — ephemeral port buffer)

runtime:
  log_level: info
  auth_token: "" # REQUIRED: set a secure random token (min 16 chars). Run: openssl rand -hex 24
  host_bind_address: "127.0.0.1"
  digest_cron: "0 7 * * *"
  embedding_model: all-MiniLM-L6-v2

cors:
  # Allowed origins for cross-origin requests (empty = same-origin only).
  # Set when the API is accessed from a different domain/port (e.g., a separate frontend).
  # Example: ["https://smackerel.example.com", "http://localhost:3000"]
  allowed_origins: []

llm:
  provider: "ollama" # REQUIRED: set to ollama, openai, or anthropic
  model: llama3.2
  api_key: "dev-not-needed-for-ollama"
  ollama_url: http://ollama:11434
  ollama_model: llama3.2
  ollama_vision_model: llava # Vision model used for OCR fallback on Keep image notes

telegram:
  bot_token: ""
  chat_ids: ""
  assembly_window_seconds: 10
  assembly_max_messages: 100
  media_group_window_seconds: 3
  disambiguation_timeout_seconds: 120
  cook_session_timeout_minutes: 120 # Inactivity timeout before cook session auto-expires [5, 480]
  cook_session_max_per_chat: 1 # Max concurrent cook sessions per chat (always 1 in v1)

expenses:
  enabled: true

  # Default currency for manual entries and when extraction cannot determine currency.
  # Must be ISO 4217.
  default_currency: "USD"

  # Expense categories available for classification.
  categories:
  - slug: "food-and-drink"
    display: "Food & Drink"
    tax_category: "Meals"
  - slug: "transportation"
    display: "Transportation"
    tax_category: "Car and Truck Expenses"
  - slug: "office-supplies"
    display: "Office Supplies"
    tax_category: "Office Expenses"
  - slug: "technology"
    display: "Technology"
    tax_category: "Other Expenses"
  - slug: "travel"
    display: "Travel"
    tax_category: "Travel"
  - slug: "utilities"
    display: "Utilities"
    tax_category: "Utilities"
  - slug: "home-improvement"
    display: "Home Improvement"
    tax_category: "Repairs and Maintenance"
  - slug: "auto-and-transport"
    display: "Auto & Transport"
    tax_category: "Car and Truck Expenses"
  - slug: "subscriptions"
    display: "Subscriptions"
    tax_category: "Other Expenses"
  - slug: "professional-services"
    display: "Professional Services"
    tax_category: "Legal and Professional Services"
  - slug: "insurance"
    display: "Insurance"
    tax_category: "Insurance"
  - slug: "advertising"
    display: "Advertising"
    tax_category: "Advertising"
  - slug: "education"
    display: "Education"
    tax_category: "Other Expenses"
  - slug: "health"
    display: "Health"
    tax_category: "Other Expenses"
  - slug: "entertainment"
    display: "Entertainment"
    tax_category: "Other Expenses"
  - slug: "other"
    display: "Other"
    tax_category: "Other Expenses"

  # Vendors that are always classified as business.
  business_vendors: []

  # Export settings
  export:
    max_rows: 10000
    quickbooks_date_format: "01/02/2006"
    standard_date_format: "2006-01-02"

  # Suggestion engine settings
  suggestions:
    min_confidence: 0.6
    min_past_business_count: 2
    max_per_digest: 3
    reclassify_batch_limit: 100

  # Vendor normalization cache
  vendor_cache_size: 500

  # Digest section settings
  digest:
    max_words: 100
    needs_review_limit: 5
    missing_receipt_lookback_days: 35

annotations:
  matview_refresh_timeout_seconds: 10
  history_default_limit: 50
  history_max_limit: 100
  relevance_boost:
    rating_max: 0.05 # max boost for rating 5
    usage_max: 0.03 # max boost capped at 10 uses
    usage_cap: 10 # number of uses for full usage boost

connectors:
  imap:
    sync_schedule: "*/15 * * * *" # Every 15 minutes (spec R-202)
    expense_labels: {}
    # Map Gmail labels to expense classifications:
    # Business-Receipts: business
    # Tax-Deductible: business
    # Personal-Purchases: personal

  caldav:
    sync_schedule: "*/15 * * * *" # Every 15 minutes

  youtube:
    sync_schedule: "0 */4 * * *" # Every 4 hours (spec R-203)

  google-keep:
    enabled: false
    sync_mode: takeout # takeout, gkeepapi, or hybrid
    import_dir: "" # path to Google Takeout Keep export directory
    include_archived: false
    min_content_length: 0
    gkeep_enabled: false
    gkeep_poll_interval: 60m
    gkeep_warning_acknowledged: false

  bookmarks:
    enabled: false
    sync_schedule: "*/30 * * * *"
    import_dir: "" # path to directory where browser bookmark exports are placed
    watch_interval: 5m
    archive_processed: false # Docker mounts import dir as :ro; enable only for non-Docker deployments
    processing_tier: full
    min_url_length: 10
    exclude_domains: []

  browser-history:
    enabled: false # Opt-in — disabled by default
    sync_schedule: "0 */4 * * *" # Every 4 hours

    chrome:
      history_path: ""
        # REQUIRED when enabled: path to Chrome History SQLite file
        # Linux:  ~/.config/google-chrome/Default/History
        # macOS:  ~/Library/Application Support/Google/Chrome/Default/History
      access_strategy: "copy" # "copy" (safe default) or "wal-read" (fresher, advanced)

    processing:
      initial_lookback_days: 30
      dwell_full_min: "5m"
      dwell_standard_min: "2m"
      dwell_light_min: "30s"
      repeat_visit_window: "7d"
      repeat_visit_threshold: 3
      content_fetch_timeout: "15s"
      content_fetch_concurrency: 5
      content_fetch_domain_delay: "1s"

    skip:
      custom_domains: []
      social_media_individual_threshold: "5m"

  google-maps-timeline:
    enabled: false
    sync_schedule: "0 */6 * * *"
    import_dir: "" # path to directory containing Google Takeout Semantic Location History JSON files
    watch_interval: 5m
    archive_processed: false
    min_distance_m: 100
    min_duration_min: 2
    default_tier: standard

    clustering:
      location_radius_m: 500
      home_detection: frequency

    commute:
      min_occurrences: 3
      window_days: 14
      weekdays_only: true

    trip:
      min_distance_km: 50
      min_overnight_hours: 18

    linking:
      time_extend_min: 30
      proximity_radius_m: 1000

    privacy:
      store_full_urls_above_tier: "light"
      aggregate_only_below_tier: "metadata"

  rss:
    enabled: false
    sync_schedule: "*/30 * * * *" # Every 30 minutes
    source_config:
      feed_urls: [] # Add RSS/Atom feed URLs here

  hospitable:
    enabled: false
    sync_schedule: "0 */2 * * *" # Every 2 hours
    access_token: "" # REQUIRED when enabled: Hospitable Personal Access Token
    base_url: "https://api.hospitable.com"
    initial_lookback_days: 90 # How far back to sync on first run
    page_size: 100
    sync_properties: true
    sync_reservations: true
    sync_messages: true
    sync_reviews: true
    processing_tier_messages: full
    processing_tier_reviews: full
    processing_tier_reservations: standard
    processing_tier_properties: light

  guesthost:
    enabled: false
    base_url: "" # REQUIRED when enabled: GuestHost instance base URL (e.g. https://myhost.example.com)
    api_key: "" # REQUIRED when enabled: GuestHost API key
    sync_schedule: "*/5 * * * *"
    event_types: "booking.created,booking.updated,booking.cancelled,guest.created,guest.updated,review.received,message.received,task.created,task.completed,expense.created,property.updated"

  discord:
    enabled: false
    bot_token: "" # REQUIRED when enabled: Discord bot token from Developer Portal
    sync_schedule: "*/15 * * * *"
    enable_gateway: true
    backfill_limit: 1000
    include_threads: true
    include_pins: true
    capture_commands: [ "!save", "!capture" ]
    monitored_channels:
    - server_id: ""
      channel_ids: []
      processing_tier: standard

  twitter:
    enabled: false
    sync_mode: archive # archive, api, or hybrid
    archive_dir: "" # REQUIRED for archive/hybrid mode: path to Twitter data export
    bearer_token: "" # REQUIRED for api/hybrid mode: Twitter API v2 bearer token
    sync_schedule: "0 */6 * * *"

  weather:
    enabled: false
    sync_schedule: "0 */3 * * *"
    enable_alerts: false
    forecast_days: 7
    precision: 2
    locations:
    - name: ""
      latitude: 0.0
      longitude: 0.0

  gov-alerts:
    enabled: false
    sync_schedule: "*/30 * * * *"
    min_earthquake_magnitude: 2.5
    source_earthquake: true
    source_weather: true
    source_tsunami: false
    source_volcano: false
    source_wildfire: false
    source_airnow: false
    source_gdacs: false
    airnow_api_key: "" # REQUIRED when source_airnow enabled: free key from airnow.gov
    locations:
    - name: ""
      latitude: 0.0
      longitude: 0.0
      radius_km: 200
    travel_locations: [] # Auto-derived from calendar events (future); manually configured for now
    # - name: "Trip Destination"
    #   latitude: 0.0
    #   longitude: 0.0
    #   radius_km: 200  # Will be doubled at query time for travel safety margin

  financial-markets:
    enabled: false
    sync_schedule: "*/15 * * * *"
    finnhub_api_key: "" # REQUIRED when enabled: free tier at finnhub.io
    fred_api_key: "" # Optional: FRED economic data
    fred_enabled: true # Enable FRED economic indicators (requires fred_api_key)
    # FRED series IDs to track (default: major economic indicators)
    fred_series: [ "GDP", "UNRATE", "CPIAUCSL", "DFF", "FEDFUNDS" ]
    coingecko_enabled: true
    alert_threshold: 5.0
    watchlist:
      stocks: []
      etfs: []
      crypto: []
      forex_pairs: []

knowledge:
  enabled: true
  synthesis_timeout_seconds: 30
  lint_cron: "0 3 * * *"
  lint_stale_days: 90
  concept_max_tokens: 4000
  concept_search_threshold: 0.4
  cross_source_confidence_threshold: 0.7
  max_synthesis_retries: 3
  prompt_contracts_dir: "config/prompt_contracts"
  prompt_contracts:
    ingest_synthesis: "ingest-synthesis-v1"
    cross_source_connection: "cross-source-connection-v1"
    lint_audit: "lint-audit-v1"
    query_augment: "query-augment-v1"
    digest_assembly: "digest-assembly-v1"

meal_planning:
  enabled: true
  default_servings: 2
  meal_types: [ "breakfast", "lunch", "dinner", "snack" ]
  meal_times:
    breakfast: "08:00"
    lunch: "12:00"
    dinner: "18:00"
    snack: "15:00"
  calendar_sync: false
  auto_complete_past_plans: true
  auto_complete_cron: "0 1 * * *"

observability:
  otel_enabled: false # Opt-in OpenTelemetry trace propagation (zero overhead when disabled)
  otel_exporter_endpoint: "" # OTLP gRPC endpoint (e.g. http://localhost:4317)

services:
  core:
    container_port: 8080
    shutdown_timeout_s: 25
  ml:
    container_port: 8081
    health_cache_ttl_s: 30
    readiness_timeout_s: 60

infrastructure:
  postgres:
    user: smackerel
    password: smackerel
    database: smackerel
    container_port: 5432
    max_conns: 10
    min_conns: 2
  nats:
    client_port: 4222
    monitor_port: 8222
  ollama:
    enabled: false
    container_port: 11434

environments:
  dev:
    compose_project: smackerel
    postgres_host_port: 42001
    nats_client_host_port: 42002
    nats_monitor_host_port: 42003
    core_host_port: 40001
    ml_host_port: 40002
    ollama_host_port: 42004
    postgres_volume_name: smackerel-postgres-data
    nats_volume_name: smackerel-nats-data
    ollama_volume_name: smackerel-ollama-data
  test:
    compose_project: smackerel-test
    postgres_host_port: 47001
    nats_client_host_port: 47002
    nats_monitor_host_port: 47003
    core_host_port: 45001
    ml_host_port: 45002
    ollama_host_port: 47004
    postgres_volume_name: smackerel-test-postgres-data
    nats_volume_name: smackerel-test-nats-data
    ollama_volume_name: smackerel-test-ollama-data
