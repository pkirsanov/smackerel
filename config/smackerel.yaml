project:
  name: smackerel

# Workspace host-port allocation (cross-project registry):
# - GuestHost:           10000-19999
# - WanderAide:          20000-26999
# - QuantitativeFinance: 30000-39999
# - Smackerel:           40000-48999  (49000-49999 reserved buffer — IANA ephemeral zone starts at 49152)
#
# Smackerel host forwarding sub-blocks:
# - Dev app:    40001-40099
# - Dev infra:  42001-42099
# - Test app:   45001-45099
# - Test infra: 47001-47099
# - Reserved:   49000-49999  (do not allocate — ephemeral port buffer)

runtime:
  log_level: info
  auth_token: "" # REQUIRED before runtime start. Test config generation creates a disposable token.
  # Deployment environment (allowed values: development | test | production).
  # MIT-040-S-004 — when set to "production", services fail-loud on startup if
  # auth_token is empty (Go core wiring + Python ML sidecar lifespan + bearer
  # middleware defense-in-depth). When set to "development" or "test", an empty
  # auth_token logs a warning and continues (single-tenant dev ergonomics).
  # Test config generation overrides to "test" automatically.
  environment: development
  # host_bind_address — explicit SST value for the host interface that backend
  # services (smackerel-core, smackerel-ml) bind on the host. "127.0.0.1" is an
  # auditable configured value here, not a Compose fallback. Deploy Compose uses
  # ${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}; the
  # ${HOST_BIND_ADDRESS:-127.0.0.1} fallback form is forbidden by Gate G028.
  # A deploy adapter may write a different explicit HOST_BIND_ADDRESS into the
  # bundled app.env when host-level reverse-proxy fronting requires it.
  # Cross-references:
  #   - bubbles/skills/bubbles-tailnet-edge-pattern/SKILL.md (canonical pattern)
  #   - specs/042-tailnet-edge-bind-pattern/ (compose contract enforcement)
  # Infra services (postgres, nats) ignore this value because they have no host
  # port mapping in deploy/compose.deploy.yml; DevOps reaches them via
  # `tailscale ssh <host> -- docker exec ...` (Pattern P1).
  host_bind_address: "127.0.0.1"
  compose_wait_timeout_s: 180
  digest_cron: "0 7 * * *"
  embedding_model: nomic-embed-text

cors:
  # Allowed origins for cross-origin requests (empty = same-origin only).
  # Set when the API is accessed from a different domain/port (e.g., a separate frontend).
  # Example: ["https://smackerel.example.com", "http://localhost:3000"]
  allowed_origins: []

llm:
  provider: "ollama" # REQUIRED: set to ollama, openai, or anthropic
  model: gemma4:26b
  api_key: "dev-not-needed-for-ollama"
  ollama_url: http://ollama:11434
  ollama_model: gemma4:26b # Primary: MoE 26B, 52tok/s, vision+tools+256K context
  ollama_vision_model: gemma4:26b # Built-in vision — no separate model needed
  ollama_ocr_model: deepseek-ocr:3b # Fast OCR specialist for receipts/documents
  ollama_reasoning_model: deepseek-r1:32b # Deep reasoning fallback for complex analysis
  ollama_fast_model: gpt-oss:20b # Fast general tasks when MoE is loaded with another model

telegram:
  bot_token: ""
  chat_ids: ""
  # Spec 044 Scope 03 — chat_id → user_id mapping for the Telegram
  # bridge. Format: "<chat_id>:<user_id>" pairs, comma-separated
  # (mirrors chat_ids).
  #   Examples:
  #     ""                              # dev/test default — empty mapping is OK
  #     "12345:alice"                   # single chat → single user (production)
  #     "12345:alice,67890:bob"         # multi-user production deployment
  # In production an unmapped chat is REFUSED (the bot drops the
  # message with a slog.Warn) so the shared bot token cannot be used
  # to attribute captures to the wrong user. In development/test the
  # empty mapping is acceptable and existing single-user dev flows
  # keep working.
  user_mapping: ""
  assembly_window_seconds: 10
  assembly_max_messages: 100
  media_group_window_seconds: 3
  disambiguation_timeout_seconds: 120
  cook_session_timeout_minutes: 120 # Inactivity timeout before cook session auto-expires [5, 480]
  cook_session_max_per_chat: 1 # Max concurrent cook sessions per chat (always 1 in v1)

expenses:
  enabled: true

  # Default currency for manual entries and when extraction cannot determine currency.
  # Must be ISO 4217.
  default_currency: "USD"

  # Expense categories available for classification.
  categories:
  - slug: "food-and-drink"
    display: "Food & Drink"
    tax_category: "Meals"
  - slug: "transportation"
    display: "Transportation"
    tax_category: "Car and Truck Expenses"
  - slug: "office-supplies"
    display: "Office Supplies"
    tax_category: "Office Expenses"
  - slug: "technology"
    display: "Technology"
    tax_category: "Other Expenses"
  - slug: "travel"
    display: "Travel"
    tax_category: "Travel"
  - slug: "utilities"
    display: "Utilities"
    tax_category: "Utilities"
  - slug: "home-improvement"
    display: "Home Improvement"
    tax_category: "Repairs and Maintenance"
  - slug: "auto-and-transport"
    display: "Auto & Transport"
    tax_category: "Car and Truck Expenses"
  - slug: "subscriptions"
    display: "Subscriptions"
    tax_category: "Other Expenses"
  - slug: "professional-services"
    display: "Professional Services"
    tax_category: "Legal and Professional Services"
  - slug: "insurance"
    display: "Insurance"
    tax_category: "Insurance"
  - slug: "advertising"
    display: "Advertising"
    tax_category: "Advertising"
  - slug: "education"
    display: "Education"
    tax_category: "Other Expenses"
  - slug: "health"
    display: "Health"
    tax_category: "Other Expenses"
  - slug: "entertainment"
    display: "Entertainment"
    tax_category: "Other Expenses"
  - slug: "other"
    display: "Other"
    tax_category: "Other Expenses"
  # Vendors that are always classified as business.
  business_vendors: []

  # Export settings
  export:
    max_rows: 10000
    quickbooks_date_format: "01/02/2006"
    standard_date_format: "2006-01-02"

  # Suggestion engine settings
  suggestions:
    min_confidence: 0.6
    min_past_business_count: 2
    max_per_digest: 3
    reclassify_batch_limit: 100

  # Vendor normalization cache
  vendor_cache_size: 500

  # Digest section settings
  digest:
    max_words: 100
    needs_review_limit: 5
    missing_receipt_lookback_days: 35

annotations:
  matview_refresh_timeout_seconds: 10
  history_default_limit: 50
  history_max_limit: 100
  relevance_boost:
    rating_max: 0.05 # max boost for rating 5
    usage_max: 0.03 # max boost capped at 10 uses
    usage_cap: 10 # number of uses for full usage boost

connectors:
  imap:
    sync_schedule: "*/15 * * * *" # Every 15 minutes (spec R-202)
    expense_labels: {}
    # Map Gmail labels to expense classifications:
    # Business-Receipts: business
    # Tax-Deductible: business
    # Personal-Purchases: personal

  caldav:
    sync_schedule: "*/15 * * * *" # Every 15 minutes

  youtube:
    sync_schedule: "0 */4 * * *" # Every 4 hours (spec R-203)

  google-keep:
    enabled: false
    sync_mode: takeout # takeout, gkeepapi, or hybrid
    import_dir: "" # path to Google Takeout Keep export directory
    include_archived: false
    min_content_length: 0
    gkeep_enabled: false
    gkeep_poll_interval: 60m
    gkeep_warning_acknowledged: false

  bookmarks:
    enabled: false
    sync_schedule: "*/30 * * * *"
    import_dir: "" # path to directory where browser bookmark exports are placed
    watch_interval: 5m
    archive_processed: false # Docker mounts import dir as :ro; enable only for non-Docker deployments
    processing_tier: full
    min_url_length: 10
    exclude_domains: []

  browser-history:
    enabled: false # Opt-in — disabled by default
    sync_schedule: "0 */4 * * *" # Every 4 hours

    chrome:
      history_path: ""
        # REQUIRED when enabled: path to Chrome History SQLite file
        # Linux:  ~/.config/google-chrome/Default/History
        # macOS:  ~/Library/Application Support/Google/Chrome/Default/History
      access_strategy: "copy" # "copy" (safe default) or "wal-read" (fresher, advanced)

    processing:
      initial_lookback_days: 30
      dwell_full_min: "5m"
      dwell_standard_min: "2m"
      dwell_light_min: "30s"
      repeat_visit_window: "7d"
      repeat_visit_threshold: 3
      content_fetch_timeout: "15s"
      content_fetch_concurrency: 5
      content_fetch_domain_delay: "1s"

    skip:
      custom_domains: []
      social_media_individual_threshold: "5m"

  google-maps-timeline:
    enabled: false
    sync_schedule: "0 */6 * * *"
    import_dir: "" # path to directory containing Google Takeout Semantic Location History JSON files
    watch_interval: 5m
    archive_processed: false
    min_distance_m: 100
    min_duration_min: 2
    default_tier: standard

    clustering:
      location_radius_m: 500
      home_detection: frequency

    commute:
      min_occurrences: 3
      window_days: 14
      weekdays_only: true

    trip:
      min_distance_km: 50
      min_overnight_hours: 18

    linking:
      time_extend_min: 30
      proximity_radius_m: 1000

    privacy:
      store_full_urls_above_tier: "light"
      aggregate_only_below_tier: "metadata"

  rss:
    enabled: false
    sync_schedule: "*/30 * * * *" # Every 30 minutes
    source_config:
      feed_urls: [] # Add RSS/Atom feed URLs here

  hospitable:
    enabled: false
    sync_schedule: "0 */2 * * *" # Every 2 hours
    access_token: "" # REQUIRED when enabled: Hospitable Personal Access Token
    base_url: "https://api.hospitable.com"
    initial_lookback_days: 90 # How far back to sync on first run
    page_size: 100
    sync_properties: true
    sync_reservations: true
    sync_messages: true
    sync_reviews: true
    processing_tier_messages: full
    processing_tier_reviews: full
    processing_tier_reservations: standard
    processing_tier_properties: light

  guesthost:
    enabled: false
    base_url: "" # REQUIRED when enabled: GuestHost instance base URL (e.g. https://myhost.example.com)
    api_key: "" # REQUIRED when enabled: GuestHost API key
    sync_schedule: "*/5 * * * *"
    event_types: "booking.created,booking.updated,booking.cancelled,guest.created,guest.updated,review.received,message.received,task.created,task.completed,expense.created,property.updated"

  qf-decisions:
    enabled: false
    base_url: ""
    credential_ref: ""
    sync_schedule: "*/5 * * * *"
    packet_version: 1
    page_size: 25

  discord:
    enabled: false
    bot_token: "" # REQUIRED when enabled: Discord bot token from Developer Portal
    sync_schedule: "*/15 * * * *"
    enable_gateway: true
    backfill_limit: 1000
    include_threads: true
    include_pins: true
    capture_commands: [ "!save", "!capture" ]
    monitored_channels:
    - server_id: ""
      channel_ids: []
      processing_tier: standard

  twitter:
    enabled: false
    sync_mode: archive # archive, api, or hybrid
    archive_dir: "" # REQUIRED for archive/hybrid mode: path to Twitter data export
    bearer_token: "" # REQUIRED for api/hybrid mode: Twitter API v2 bearer token
    sync_schedule: "0 */6 * * *"

  weather:
    enabled: false
    sync_schedule: "0 */3 * * *"
    enable_alerts: false
    forecast_days: 7
    precision: 2
    locations:
    - name: ""
      latitude: 0.0
      longitude: 0.0

  gov-alerts:
    enabled: false
    sync_schedule: "*/30 * * * *"
    min_earthquake_magnitude: 2.5
    source_earthquake: true
    source_weather: true
    source_tsunami: false
    source_volcano: false
    source_wildfire: false
    source_airnow: false
    source_gdacs: false
    airnow_api_key: "" # REQUIRED when source_airnow enabled: free key from airnow.gov
    locations:
    - name: ""
      latitude: 0.0
      longitude: 0.0
      radius_km: 200
    travel_locations: [] # Auto-derived from calendar events (future); manually configured for now
    # - name: "Trip Destination"
    #   latitude: 0.0
    #   longitude: 0.0
    #   radius_km: 200  # Will be doubled at query time for travel safety margin

  financial-markets:
    enabled: false
    sync_schedule: "*/15 * * * *"
    finnhub_api_key: "" # REQUIRED when enabled: free tier at finnhub.io
    fred_api_key: "" # Optional: FRED economic data
    fred_enabled: true # Enable FRED economic indicators (requires fred_api_key)
    # FRED series IDs to track (default: major economic indicators)
    fred_series: [ "GDP", "UNRATE", "CPIAUCSL", "DFF", "FEDFUNDS" ]
    coingecko_enabled: true
    alert_threshold: 5.0
    watchlist:
      stocks: []
      etfs: []
      crypto: []
      forex_pairs: []

knowledge:
  enabled: true
  synthesis_timeout_seconds: 30
  lint_cron: "0 3 * * *"
  lint_stale_days: 90
  concept_max_tokens: 4000
  concept_search_threshold: 0.4
  cross_source_confidence_threshold: 0.7
  max_synthesis_retries: 3
  prompt_contracts_dir: "config/prompt_contracts"
  prompt_contracts:
    ingest_synthesis: "ingest-synthesis-v1"
    cross_source_connection: "cross-source-connection-v1"
    lint_audit: "lint-audit-v1"
    query_augment: "query-augment-v1"
    digest_assembly: "digest-assembly-v1"

meal_planning:
  enabled: true
  default_servings: 2
  meal_types: [ "breakfast", "lunch", "dinner", "snack" ]
  meal_times:
    breakfast: "08:00"
    lunch: "12:00"
    dinner: "18:00"
    snack: "15:00"
  calendar_sync: false
  auto_complete_past_plans: true
  auto_complete_cron: "0 1 * * *"

recommendations:
  enabled: true
  providers:
    google_places:
      enabled: false
      categories: [ "place", "event" ]
      api_key: ""
      quota_window_seconds: 60
      max_requests_per_window: 30
      attribution_label: "Google Places"
    yelp:
      enabled: false
      categories: [ "place" ]
      api_key: ""
      quota_window_seconds: 60
      max_requests_per_window: 30
      attribution_label: "Yelp"
  location_precision:
    user_standard: "city"
    mobile_standard: "neighborhood"
    watch_standard: "neighborhood"
    neighborhood_cell_system: "geohash"
    neighborhood_cell_level: 6
  watches:
    max_alerts_per_window: 3
    alert_window_seconds: 86400
    cooldown_seconds_by_kind:
      place: 86400
      product: 604800
      deal: 86400
      event: 86400
      content: 86400
    quiet_hours_policy:
      enabled: true
      start: "22:00"
      end: "07:00"
    poll_cron: "*/5 * * * *"
  retention:
    raw_provider_payload_seconds: 604800
    trace_retention_seconds: 2592000
  ranking:
    max_candidates_per_provider: 25
    max_final_results: 10
    standard_result_count: 5
    standard_style: "balanced"
    low_confidence_threshold: 0.55
  policy:
    sponsored_promotions_enabled: false
    restricted_categories: [ "adult", "gambling", "weapons" ]
    safety_sources: [ "local-policy", "provider-rating" ]
  delivery:
    telegram_enabled: true
    digest_enabled: true
    trip_dossier_enabled: true

observability:
  otel_enabled: false # Opt-in OpenTelemetry trace propagation (zero overhead when disabled)
  otel_exporter_endpoint: "" # OTLP gRPC endpoint (e.g. http://localhost:4317)

# Spec 044 — Per-User Bearer Auth Foundation. SST zero-defaults: every key is
# REQUIRED at the generator boundary. Secret-bearing fields are empty-string
# placeholders here (dev/test fall back to runtime.auth_token shared-token
# semantics); production deployments MUST populate signing material, the
# at-rest hashing key, and (on a fresh install with zero enrolled users) the
# bootstrap token before the runtime starts. The Go core fails loud on
# startup if any required production-mode value is missing or invalid (see
# `internal/config/config.go` Validate + `cmd/core/wiring.go` startup
# validation). Per-env enable flag lives at environments.<env>.auth_enabled.
auth:
  # OQ-1 RESOLVED — PASETO v4.public (Ed25519). No algorithm-confusion
  # surface, compact wire size, no JWKS server requirement.
  token_format: paseto-v4-public

  # Disabled by default; per-env overrides flip this on for production-class
  # environments. environments.<env>.auth_enabled wins via env_override_value.
  enabled: false

  signing:
    # OQ-2 RESOLVED — overlap rotation: active key signs new tokens; prior
    # public key validates in-flight tokens for rotation_grace_window_hours.
    # Empty in dev/test (falls back to shared-token mode); REQUIRED in
    # production with auth.enabled=true (fail-loud at startup if empty).
    active_private_key: ""
    active_key_id: ""
    prior_public_key: ""
    prior_key_id: ""

  # Bounded TTL — no infinite tokens in production. NFR-AUTH-003 sets the
  # rotation_grace_window_hours floor at 24h; design default is 7 days.
  token_ttl_hours: 720
  rotation_grace_window_hours: 168

  # NFR-AUTH-005 — clock-skew tolerance ≤ 60 s.
  clock_skew_tolerance_seconds: 30

  # NFR-AUTH-006 — revocation propagation ≤ 60 s. NATS pub/sub is the primary
  # propagation channel; the periodic DB refresh is the failure-mode backstop.
  revocation_cache_refresh_interval_seconds: 30
  revocation_nats_subject: "auth.revocations"

  # OQ-8 RESOLVED — at-rest token hashing key (HMAC-SHA-256). MUST differ
  # from auth.signing.active_private_key. REQUIRED in production with
  # auth.enabled=true (fail-loud at startup if empty).
  at_rest_hashing_key: ""

  # OQ-5 RESOLVED — production rejects shared SMACKEREL_AUTH_TOKEN by
  # default once any per-user token is enrolled. Operators may opt-in via
  # this flag during the migration window; each use logs a deprecation
  # warning. Spec 044 Scope 04 flips production defaults; Scope 01 lands
  # the SST surface only.
  production_shared_token_fallback_enabled: false

  # OQ-9 RESOLVED — telemetry surface for spec 030 dashboards.
  telemetry_enabled: true
  telemetry_metric_prefix: "smackerel_auth"

  # OQ-10 RESOLVED — bootstrap token for first-user enrollment on a fresh
  # production deployment. Consumed exactly once via
  # `./smackerel.sh auth bootstrap` and then cleared by the operator.
  #
  # Spec 051 FR-051-004 / SCN-051-S01: REQUIRED at config-load time when
  # SMACKEREL_ENV=production AND auth.enabled=true. The Go config loader
  # fails loud (`internal/config/config.go::loadAuthConfig`) and refuses
  # to even produce a Config object that names AUTH_BOOTSTRAP_TOKEN as
  # missing. The wiring-time check in `internal/auth/startup.go` remains
  # as defense-in-depth. Dev/test environments retain the empty-string
  # default so local workflows do not require a bootstrap token.
  bootstrap_token: ""

agent:
  # Spec 037 — LLM Scenario Agent & Tool Registry. SST zero-defaults: every key
  # is REQUIRED. The Go core and Python ML sidecar both refuse to start if any
  # value is missing. There are no Go fallbacks. Empty-string values are
  # explicitly allowed only where noted (fallback_scenario_id, embedding_model).
  scenario_dir: "config/prompt_contracts" # REQUIRED: directory containing scenario YAMLs
  scenario_glob: "*.yaml" # REQUIRED: glob applied beneath scenario_dir
  hot_reload: true # REQUIRED: SIGHUP triggers a rescan
  routing:
    confidence_floor: 0.65 # REQUIRED: minimum cosine similarity to select a scenario
    consider_top_n: 5 # REQUIRED: number of candidates retained for trace
    fallback_scenario_id: "" # REQUIRED ("" = no fallback; below-floor → unknown-intent)
    embedding_model: "" # REQUIRED ("" = inherit runtime.embedding_model)
  trace:
    retention_days: 30 # REQUIRED: days to retain agent_traces rows
    record_llm_messages: false # REQUIRED: capture full LLM transcript (true in dev/test only)
    redact_marker: "***" # REQUIRED: replacement token for x-redact fields
  defaults:
    # Failsafe ceilings — NOT Go fallbacks. A scenario MUST declare its own
    # limits; these caps clamp scenario values that exceed them at load time.
    max_loop_iterations_ceiling: 32 # REQUIRED
    timeout_ms_ceiling: 120000 # REQUIRED
    schema_retry_budget_ceiling: 5 # REQUIRED
    per_tool_timeout_ms_ceiling: 30000 # REQUIRED
  provider_routing:
    # Maps scenario.model_preference → ml/app/agent.py provider/model. SST.
    default:
      provider: "ollama"
      model: "gemma4:26b"
    reasoning:
      provider: "ollama"
      model: "deepseek-r1:32b"
    fast:
      provider: "ollama"
      model: "gpt-oss:20b"
    vision:
      provider: "ollama"
      model: "gemma4:26b"
    ocr:
      provider: "ollama"
      model: "deepseek-ocr:3b"

drive:
  enabled: false
  classification:
    enabled: true
    confidence_threshold: 0.7 # min confidence to apply classification automatically
    low_confidence_action: "pause"
    # Spec 038 Scope 6 — Policy And Confirmation.
    # confirm_threshold is the policy floor: when classifier confidence is
    # below this value the Save Service MUST persist a drive_confirmation
    # row and refuse to commit until /api/v1/drive/confirmations/{id}
    # resolves. Distinct from confidence_threshold so operators can set
    # auto-classify higher than the absolute confirmation floor.
    confirm_threshold: 0.6
    # confirmation_ttl_seconds bounds how long a pending confirmation
    # stays actionable before the resolver marks it 'expired'.
    confirmation_ttl_seconds: 86400
  scan:
    parallelism: 4
    batch_size: 100
  monitor:
    poll_interval_seconds: 300
    cursor_invalidation_rescan_max_files: 5000
  policy:
    sensitivity_default: "internal"
    sensitivity_thresholds:
      public: 0.95
      internal: 0.80
      sensitive: 0.60
      secret: 0.50
  telegram:
    max_inline_size_bytes: 5242880
    max_link_files_per_reply: 10
  limits:
    max_file_size_bytes: 104857600
  io_limits:
    # MIT-038-S-004 — defense-in-depth byte caps wrapping io.ReadAll on
    # provider HTTP boundaries in internal/drive/google. Provider URLs are
    # SST-trusted (drive.providers.google.api_base_url / oauth_base_url),
    # but absent caps leave a defense-in-depth gap if a fixture or
    # compromised upstream returned a multi-GB body. The bytes-processing
    # path in internal/drive/extract/service.go:255 separately enforces
    # max_file_size_bytes; these caps wrap the remaining JSON metadata,
    # binary download, and OAuth token-exchange reads.
    #
    #   provider_response_max_bytes — JSON metadata responses (Drive list,
    #     about, changes, file-metadata error bodies, EnsureFolder, PutFile
    #     response). 10 MiB is well above the largest expected JSON page.
    #   provider_binary_max_bytes   — binary file content read in PutFile
    #     (body.Reader is the uploaded content). Set to 500 MiB so it sits
    #     comfortably above drive.limits.max_file_size_bytes (100 MiB),
    #     which is the primary upstream enforcement; this cap is a backstop.
    #   oauth_response_max_bytes    — OAuth token-exchange response. Token
    #     responses are tiny JSON; 64 KiB is generous defense-in-depth.
    provider_response_max_bytes: 10485760 # 10 MiB
    provider_binary_max_bytes: 524288000 # 500 MiB
    oauth_response_max_bytes: 65536 # 64 KiB
  rate_limits:
    requests_per_minute: 600
  save:
    # Spec 038 Scope 5 — Save Rules and Write-Back.
    # provider_url_prefix is prepended to every drive_save_requests.provider_url
    # generated by the Save Service. Operators MUST point this at the public
    # base URL of the destination Drive provider so users in the digest /
    # Telegram reply / PWA Screen 7 can click straight to the file. Empty
    # values are accepted in dev (the Service composes a relative path) but
    # the framework-validate gate flags empty values for production exports.
    provider_url_prefix: "https://drive.google.com/file/d"
  providers:
    google:
      oauth_client_id: ""
      oauth_client_secret: ""
      oauth_redirect_url: "http://127.0.0.1:40001/v1/connectors/drive/oauth/callback"
      oauth_base_url: "https://accounts.google.com"
      api_base_url: "https://www.googleapis.com"
      scope_defaults: [ "https://www.googleapis.com/auth/drive.file", "https://www.googleapis.com/auth/drive.readonly" ]

photos:
  enabled: true
  scan:
    parallelism: 2
    batch_size: 50
    max_file_size_bytes: 52428800
  monitor:
    cursor_invalidation_rescan_max_items: 2500
  io_limits:
    # Defense-in-depth byte caps wrapping io.ReadAll on HTTP boundaries
    # (MIT-040-S-006). Provider metadata = JSON responses; photo binary =
    # uploaded image bytes; telegram response = bytes downloaded via the
    # Telegram bot file API.
    provider_metadata_max_bytes: 10485760 # 10 MiB
    photo_binary_max_bytes: 104857600 # 100 MiB
    telegram_response_max_bytes: 26214400 # 25 MiB
  policy:
    lifecycle_confirmation_threshold: 0.8
    duplicate_confirmation_threshold: 0.92
    routing_confidence_threshold: 0.75
    sensitivity_reveal_ttl_seconds: 600
    archive_action_token_ttl_seconds: 86400
    delete_action_token_ttl_seconds: 86400
    telegram_max_inline_size_bytes: 8388608
    # Spec 040 chaos C-006 — bound action plan scope size at mint time
    # to prevent very-large-token resource amplification (token payload
    # grows linearly with scope, and confirm-time loops scale with
    # count). Applies to scope.photo_ids; removal_ids share the same cap.
    actions_max_scope_size: 50
  intelligence:
    classify_model: gemma4:26b
    embed_model: nomic-embed-text
    sensitivity_model: gemma4:26b
    aesthetic_model: gemma4:26b
    ocr_model: deepseek-ocr:3b
    max_inflight_per_connector: 2
  providers:
    immich:
      enabled: false
      base_url: ""
      api_key: ""
      poll_interval_seconds: 300
      supported_api_versions: [ "v1" ]
    photoprism:
      enabled: false
      base_url: ""
      api_token: ""
      poll_interval_seconds: 600
      supported_api_versions: [ "v1" ]

services:
  core:
    container_port: 8080
    shutdown_timeout_s: 25
  ml:
    container_port: 8081
    health_cache_ttl_s: 30
    readiness_timeout_s: 60
    processing_degraded_fallback_enabled: false
    # Spec 050 FR-050-001/002/003/005 — ML sidecar health/worker isolation.
    # All three values are required (fail-loud SST). The Python ML sidecar
    # reads them via os.environ[...] in ml/app/main.py::_check_required_config
    # and configures the dedicated embedding ThreadPoolExecutor in
    # ml/app/embedder.py. Health request handling (FastAPI /health) is on
    # the async event loop and never enters the embedding executor, so a
    # saturated worker pool cannot starve health probes (FR-050-001).
    #
    #   embedding_workers — max concurrent CPU-bound embed workers. This is
    #     the size of the dedicated ThreadPoolExecutor that runs
    #     sentence-transformer encode() calls. MUST be a positive integer
    #     and SHOULD be ≤ deploy_resources.smackerel_ml.cpus to avoid
    #     CPU oversubscription. Typical value: 2 (matches default 2-vCPU
    #     envelope for smackerel_ml). Bounded concurrency satisfies
    #     FR-050-002.
    #   embedding_queue_max — max in-flight embedding requests (active +
    #     queued) before the sidecar starts rejecting with a 4xx-shaped
    #     backpressure error. Provides the upstream signal the search
    #     fallback (internal/api/search.go textSearch fallback) consumes
    #     when ML is degraded. MUST be ≥ embedding_workers.
    #   health_latency_sla_ms — documented SLA budget for /health response
    #     latency under embedding load. Used by docs/Operations.md and the
    #     adversarial regression in ml/tests/test_embedder.py to assert
    #     /health stays responsive (FR-050-003). MUST be a positive
    #     integer (milliseconds).
    embedding_workers: 2
    embedding_queue_max: 3
    health_latency_sla_ms: 500
    # Spec 045 FR-045-002 — model memory envelope. Each entry maps an Ollama
    # model name to its RUN-TIME memory requirement in MiB (matching what
    # `ollama ps` reports as resident size when the model is loaded). The Go
    # core Validate() chain rejects any configured model whose profile
    # exceeds ML_MEMORY_LIMIT (deploy_resources.smackerel_ml.memory).
    #
    # Operator MUST add an entry here for every model name referenced by
    # llm.ollama_model, llm.ollama_vision_model, llm.ollama_ocr_model,
    # llm.ollama_reasoning_model, llm.ollama_fast_model,
    # runtime.embedding_model, agent.provider_routing.*.model,
    # photos.intelligence.*_model, and infrastructure.ollama.test.model.
    # A missing entry for any used model fails Validate() loudly so the
    # operator can size the envelope before runtime start.
    #
    # Memory figures derived from ollama public model card resident-size
    # measurements at default quantization (q4_K_M for gemma/gpt-oss,
    # q4_K_S for deepseek). They are CEILINGS for envelope sizing — actual
    # resident size depends on context length and concurrent requests.
    #
    # Format: list of {model, memory_mib} objects. List form (not a map) is
    # required because the SST flatten/JSON pipeline cannot parse YAML map
    # keys that contain ":" (e.g. "gemma4:26b") — they would be split on
    # the first ":" and corrupt both key and value. The list-of-objects
    # form is the same shape used by expenses.categories elsewhere in this
    # file.
    model_memory_profiles:
    - model: "gemma4:26b"
      memory_mib: 18432 # 18 GiB MoE 26B at q4 + 256K context buffer
    - model: "deepseek-ocr:3b"
      memory_mib: 2560 # 2.5 GiB
    - model: "deepseek-r1:32b"
      memory_mib: 22528 # 22 GiB at q4
    - model: "gpt-oss:20b"
      memory_mib: 14336 # 14 GiB at q4
    - model: "nomic-embed-text"
      memory_mib: 768 # 0.75 GiB embedding model
    - model: "qwen2.5:0.5b-instruct"
      memory_mib: 1024 # 1 GiB tiny test model

# Spec 045 FR-045-001 — deploy resource envelopes (CPU + memory) per service.
# Every value is required (fail-loud SST). The deploy adapter consumes these
# via env vars (SERVICE_CPU_LIMIT, SERVICE_MEMORY_LIMIT) substituted into
# deploy/compose.deploy.yml ${VAR:?...} placeholders. Hand-edited literals
# in compose are forbidden — see internal/deploy/compose_contract_test.go
# assertResourceContract().
#
# Memory string format follows compose conventions (e.g. "1G", "512M", "8G").
# CPU string format is decimal cores (e.g. "1.0", "0.5", "2.0").
deploy_resources:
  postgres:
    cpus: "1.0"
    memory: "1G"
  nats:
    cpus: "0.5"
    memory: "512M"
  smackerel_core:
    cpus: "2.0"
    memory: "1G"
  smackerel_ml:
    cpus: "2.0"
    memory: "3G"
  ollama:
    cpus: "4.0"
    memory: "8G"
  # Spec 049 FR-049-005(c) — Prometheus runs hardened with explicit CPU
  # and memory envelopes. Profile-gated (monitoring); when the operator
  # enables `--profile monitoring`, the deploy adapter MUST emit
  # PROMETHEUS_CPU_LIMIT and PROMETHEUS_MEMORY_LIMIT into app.env or
  # compose aborts at substitution time (Gate G028).
  prometheus:
    cpus: "1.0"
    memory: "512M"

# Spec 049 — Monitoring Stack SST (FR-049-001 / FR-049-003 / FR-049-005).
#
# All keys are required (fail-loud SST). The deploy adapter consumes them
# via PROMETHEUS_* env vars substituted into deploy/compose.deploy.yml
# ${VAR:?...} placeholders and into config/prometheus/prometheus.yml.tmpl
# at config-generate time. Hand-edited literals in either are forbidden —
# see internal/deploy/monitoring_*_contract_test.go.
#
# Prometheus runs behind a `monitoring` Compose profile (off by default).
# Enable in dev with `docker compose --profile monitoring up -d`. In
# production, the deploy adapter overlay sets the profile in its compose
# invocation.
monitoring:
  prometheus:
    # Pinned image tag (no `latest`, no fallback). Bumping requires a
    # design discussion + adversarial regression test re-run.
    image: "prom/prometheus:v2.55.1"
    # Internal container port for the Prometheus web UI / API. Matches
    # the upstream default.
    container_port: 9090
    # Scrape and evaluation intervals (seconds). 15s is the Prometheus
    # default and the common observability baseline.
    scrape_interval_seconds: 15
    evaluation_interval_seconds: 15
    # On-disk TSDB retention. 15 days is enough for daily-trend dashboards
    # plus weekly post-mortem queries without runaway disk usage on a
    # home-lab-class machine. Tune via SST without code changes.
    retention_days: 15


infrastructure:
  postgres:
    user: smackerel
    password: smackerel
    database: smackerel
    container_port: 5432
    max_conns: 10
    min_conns: 2
  nats:
    client_port: 4222
    monitor_port: 8222
    # Spec 046 FR-046-002 — NATS server payload and storage ceilings flow
    # from SST. scripts/commands/config.sh renders these into
    # config/generated/nats.conf so the broker enforces them at runtime.
    # Bytes-typed; tune for the deployment target's disk envelope.
    #   max_payload_bytes — single-message size cap (image/OCR payloads).
    #   max_file_store_bytes — JetStream file store ceiling on disk.
    #   max_mem_store_bytes — JetStream in-memory ceiling.
    # Missing or empty values fail loud via required_value at generate time.
    max_payload_bytes: 8388608          # 8 MiB
    max_file_store_bytes: 10737418240   # 10 GiB
    max_mem_store_bytes: 1073741824     # 1 GiB
    # Spec 046 FR-046-001 — ML sidecar reconnect contract. The Python
    # client reads these via NATS_MAX_RECONNECT_ATTEMPTS and
    # NATS_RECONNECT_TIME_WAIT_SECONDS in ml/app/nats_client.py. -1 means
    # reconnect forever; the contract is non-negotiable for always-on
    # deployment operation.
    client:
      reconnect_time_wait_seconds: 2
      max_reconnect_attempts: -1
    # Spec 046 FR-046-003 — per-stream MaxBytes caps. Every JetStream
    # stream Smackerel creates MUST have a bounded MaxBytes; unbounded
    # streams are an explicit failure condition. The Go core reads this
    # JSON-shaped map via NATS_STREAM_MAX_BYTES_JSON and passes it into
    # internal/nats.Client.EnsureStreams which fails loud if a stream is
    # missing from the map. Totals must remain comfortably below
    # max_file_store_bytes above.
    stream_max_bytes:
      - stream: ARTIFACTS
        bytes: 1073741824    # 1 GiB — primary capture queue
      - stream: SEARCH
        bytes: 536870912     # 512 MiB — embedding/rerank
      - stream: DIGEST
        bytes: 268435456     # 256 MiB — daily digest
      - stream: KEEP
        bytes: 268435456     # 256 MiB — Keep sync
      - stream: INTELLIGENCE
        bytes: 536870912     # 512 MiB — multi-domain analysis
      - stream: ALERTS
        bytes: 134217728     # 128 MiB — notifications
      - stream: SYNTHESIS
        bytes: 536870912     # 512 MiB — cross-source synthesis
      - stream: DOMAIN
        bytes: 268435456     # 256 MiB — domain extraction
      - stream: DRIVE
        bytes: 536870912     # 512 MiB — cloud-drive events
      - stream: PHOTOS
        bytes: 1073741824    # 1 GiB — photo classification batches
      - stream: ANNOTATIONS
        bytes: 134217728     # 128 MiB — user annotations
      - stream: LISTS
        bytes: 134217728     # 128 MiB — actionable lists
      - stream: AGENT
        bytes: 268435456     # 256 MiB — agent traces
      - stream: WEATHER
        bytes: 67108864      # 64 MiB — weather enrich
      - stream: DEADLETTER
        bytes: 67108864      # 64 MiB — forensic DLQ
  ollama:
    # Default fallback (legacy spec 037 — superseded by per-env ollama_enabled
    # override added by spec 043). Kept so existing readers that ignore the
    # per-env override do not break. Per-env value (if present) wins via
    # env_override_value() in scripts/commands/config.sh.
    enabled: false
    container_port: 11434
    # Spec 043 — Ollama image identifier hoisted out of docker-compose.yml.
    # `image` is the default for non-test environments. `test.image` is the
    # pinned-digest test runtime (OQ-D1 — initial pin matches dev image; a
    # digest pin is deferred to a future hardening spec per OQ-D2).
    #
    # spec 043 / BUG-001 (2026-05-10) — re-pinned from `0.6` (yanked from
    # Docker Hub; pull manifest now returns 404) to `0.23.2` (verified live
    # 200 against hub.docker.com tags API). Adversarial regression test
    # `tests/integration/ollama_image_availability_test.go` HEADs the Docker
    # Hub tags API on every integration run so a future yanked tag fails
    # loudly before the test stack tries to start.
    image: ollama/ollama:0.23.2
    test:
      image: ollama/ollama:0.23.2
      model: qwen2.5:0.5b-instruct
      pull_timeout_seconds: 300
      # Determinism knobs — same input + same seed + same image → same output
      # (FR-OLLAMA-006, design.md OQ-3 resolution D4).
      request_temperature: 0.0
      request_top_p: 1.0
      request_top_k: 1
      request_seed: 42
      request_num_predict: 256

environments:
  dev:
    compose_project: smackerel
    postgres_host_port: 42001
    nats_client_host_port: 42002
    nats_monitor_host_port: 42003
    core_host_port: 40001
    ml_host_port: 40002
    ollama_host_port: 42004
    # Spec 049 — Prometheus host port lives in the dev infra block
    # (42001-42099). Used only when the `monitoring` Compose profile is
    # enabled; the service is off by default.
    prometheus_host_port: 42005
    postgres_volume_name: smackerel-postgres-data
    nats_volume_name: smackerel-nats-data
    ollama_volume_name: smackerel-ollama-data
    prometheus_volume_name: smackerel-prometheus-data
    # Spec 043 — per-env opt-in. Dev preserves manual --profile ollama
    # ergonomic (FR-OLLAMA-007); operator flips to true to auto-start.
    ollama_enabled: false
    # Spec 044 — per-user bearer auth disabled in dev (preserves
    # SMACKEREL_AUTH_TOKEN dev/test ergonomic; SCN-AUTH-005/011).
    auth_enabled: false
  test:
    compose_project: smackerel-test
    postgres_host_port: 47001
    nats_client_host_port: 47002
    nats_monitor_host_port: 47003
    core_host_port: 45001
    ml_host_port: 45002
    ollama_host_port: 47004
    # Spec 049 — Prometheus host port in the test infra block
    # (47001-47099). Disposable test stack runs the monitoring profile
    # opt-in via the integration test fixture.
    prometheus_host_port: 47005
    postgres_volume_name: smackerel-test-postgres-data
    nats_volume_name: smackerel-test-nats-data
    ollama_volume_name: smackerel-test-ollama-data
    prometheus_volume_name: smackerel-test-prometheus-data
    # Spec 043 — test stack auto-starts Ollama (FR-OLLAMA-001). Final
    # SMACKEREL_TEST_OLLAMA=1 enforcement is wired in scope 03.
    ollama_enabled: true
    # Spec 044 — per-user bearer auth disabled in test (test stack uses
    # the disposable shared SMACKEREL_AUTH_TOKEN; SCN-AUTH-005/011).
    auth_enabled: false
    # Spec 043 — pin the fast-route model to the smallest tool-calling
    # Ollama model so the agent E2E happy-path test runs on the CI /
    # no-GPU lane within pull_timeout_seconds. Dev / home-lab keep the
    # default agent.provider_routing.fast.model (gpt-oss:20b).
    agent_provider_fast_model: "qwen2.5:0.5b-instruct"
    ml_processing_degraded_fallback_enabled: true
    qf_decisions_enabled: true
    qf_decisions_base_url: "http://host.docker.internal:45003"
    qf_decisions_credential_ref: "qf-e2e-credential-ref"
    qf_decisions_packet_version: 99
  home-lab:
    # Self-hosted target on the operator's home-lab machine. Builds are produced
    # by .github/workflows/build.yml and applied via deploy/home-lab/apply.sh.
    # Port assignments live inside the Smackerel block (40000-49999) and do not
    # collide with `dev` or `test` so the same machine could host all three.
    compose_project: smackerel-home-lab
    postgres_host_port: 43001
    nats_client_host_port: 43002
    nats_monitor_host_port: 43003
    core_host_port: 41001
    ml_host_port: 41002
    ollama_host_port: 43004
    # Spec 049 — Prometheus host port for home-lab. Operator enables
    # the `monitoring` Compose profile via the deploy-adapter overlay;
    # actual host exposure (reverse proxy, Tailscale ACLs) stays in
    # the overlay too.
    prometheus_host_port: 43005
    postgres_volume_name: smackerel-home-lab-postgres-data
    nats_volume_name: smackerel-home-lab-nats-data
    ollama_volume_name: smackerel-home-lab-ollama-data
    prometheus_volume_name: smackerel-home-lab-prometheus-data
    # Spec 043 — home-lab preserves opt-in. Operator flips to true after
    # provisioning the GPU host and pulling the production model.
    ollama_enabled: false
    # Spec 044 — per-user bearer auth enabled by default on home-lab
    # (production-class environment per FR-AUTH-016). Operator MUST
    # populate auth.signing.* and auth.at_rest_hashing_key (and
    # auth.bootstrap_token on a fresh deploy) before the runtime starts.
    auth_enabled: true
