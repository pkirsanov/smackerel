project:
  name: smackerel

# Workspace host-port allocation (cross-project registry):
# - GuestHost:           10000-19999
# - WanderAide:          20000-26999
# - QuantitativeFinance: 30000-39999
# - Smackerel:           40000-48999  (49000-49999 reserved buffer — IANA ephemeral zone starts at 49152)
#
# Smackerel host forwarding sub-blocks:
# - Dev app:    40001-40099
# - Dev infra:  42001-42099
# - Test app:   45001-45099
# - Test infra: 47001-47099
# - Reserved:   49000-49999  (do not allocate — ephemeral port buffer)

runtime:
  log_level: info
  auth_token: "" # REQUIRED before runtime start. Test config generation creates a disposable token.
  # Deployment environment (allowed values: development | test | production).
  # MIT-040-S-004 — when set to "production", services fail-loud on startup if
  # auth_token is empty (Go core wiring + Python ML sidecar lifespan + bearer
  # middleware defense-in-depth). When set to "development" or "test", an empty
  # auth_token logs a warning and continues (single-tenant dev ergonomics).
  # Test config generation overrides to "test" automatically.
  environment: development
  # host_bind_address — explicit SST value for the host interface that backend
  # services (smackerel-core, smackerel-ml) bind on the host. "127.0.0.1" is an
  # auditable configured value here, not a Compose fallback. Deploy Compose uses
  # ${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}; the
  # ${HOST_BIND_ADDRESS:-127.0.0.1} fallback form is forbidden by Gate G028.
  # A deploy adapter may write a different explicit HOST_BIND_ADDRESS into the
  # bundled app.env when host-level reverse-proxy fronting requires it.
  # Cross-references:
  #   - bubbles/skills/bubbles-tailnet-edge-pattern/SKILL.md (canonical pattern)
  #   - specs/042-tailnet-edge-bind-pattern/ (compose contract enforcement)
  # Infra services (postgres, nats) ignore this value because they have no host
  # port mapping in deploy/compose.deploy.yml; DevOps reaches them via
  # `tailscale ssh <host> -- docker exec ...` (Pattern P1).
  host_bind_address: "127.0.0.1"
  # F-077-1c-001: raised from 180s → 300s. On fresh-build runs (no image
  # cache) under the disposable e2e-ui project, smackerel-core's start
  # window stacks the ML readiness gate (up to assistant.readiness_timeout_s=60s)
  # on top of DB/NATS wiring + first-request cold start. 180s was too
  # tight; 300s gives margin without changing the steady-state wait
  # (compose returns as soon as healthchecks pass).
  compose_wait_timeout_s: 300
  digest_cron: "0 7 * * *"
  embedding_model: nomic-embed-text
  # Trusted reverse-proxy CIDR allowlist (BUG-020-005, F-SEC-R30-001).
  # When the connecting TCP peer is in one of these CIDRs, the API trusts
  # the X-Forwarded-For / X-Real-IP / True-Client-IP headers and rewrites
  # r.RemoteAddr accordingly (so httprate.LimitByIP and slog see the real
  # client). When the connecting peer is NOT in any of these CIDRs, or
  # when this list is empty (the SST default), forwarded headers are
  # ignored and the raw TCP peer is used as the rate-limit key.
  # Empty default = secure-by-default: any caller that can send headers
  # cannot bypass per-IP rate limits or forge slog `remote_addr` fields.
  # Deploy adapters that DO front the stack with a known reverse proxy
  # (e.g., host Caddy on a tailnet bind) populate this list in their
  # operator-private overlay (e.g., ["127.0.0.0/8"] when the proxy is
  # co-located on the same host, or the specific peer CIDR otherwise).
  # See specs/020-security-hardening/bugs/BUG-020-005-... for the bypass
  # finding and the trusted-proxy gate design.
  trusted_proxies: []

  # Spec 099 — Local resource pre-flight guard thresholds (SST source of truth).
  # Before each heavy ./smackerel.sh operation (build, up, and the live-stack
  # test categories integration/e2e/e2e-ui/stress), the resource guard
  # (cmd/preflight -> internal/preflight) checks host available RAM
  # (MemAvailable from /proc/meminfo) and available disk (repo filesystem)
  # against these minimums and fails fast with an actionable message instead of
  # letting a doomed run OOM-die (exit 137) or fill the disk minutes in.
  # These are CONCRETE SST values (allowed); a MISSING/empty key fails loud
  # naming the key (Gate G028 / NO-DEFAULTS) — there is no hidden code default.
  # These guard LOCAL dev CLI ops only; the home-lab apply pre-flight is
  # knb-deploy-adapter-owned and out of this repo's scope. Override with
  # SMACKEREL_PREFLIGHT_OVERRIDE=1 (proceeds with a loud WARNING).
  # See specs/099-preflight-resource-guard/.
  preflight:
    # Minimum host MemAvailable (MB) required to start a heavy op. ~6 GB floor:
    # a heavy build/integration compile + container bring-up peaks at 6-10 GB.
    min_available_ram_mb: 6000
    # Minimum available disk (GB) on the repo filesystem required to start a
    # heavy op. Ollama models (several GB each) + Docker image layers make 15 GB
    # a sensible floor.
    min_available_disk_gb: 15

cors:
  # Allowed origins for cross-origin requests (empty = same-origin only).
  # Set when the API is accessed from a different domain/port (e.g., a separate frontend).
  # Example: ["https://smackerel.example.com", "http://localhost:3000"]
  allowed_origins: []

# Spec 045 BUG-045-001 (resolved 2026-05-16) — Default model choices fit
# the default deploy_resources.ollama.memory = "8G" envelope. Home-lab and
# production operators with >= 16 GiB free for ollama may opt UP to
# gemma4:26b / deepseek-r1:32b / gpt-oss:20b by RAISING the envelope FIRST
# in deploy_resources.ollama.memory, THEN swapping the model fields here.
# See docs/Operations.md "Model Envelope Sizing" for the per-service
# envelope contract and the dev / home-lab / production trade-off matrix.
llm:
  provider: "ollama" # REQUIRED: set to ollama, openai, or anthropic
  model: gemma3:4b # Spec 045 BUG-045-001 default — fits 8G ollama envelope
  api_key: "dev-not-needed-for-ollama"
  ollama_url: http://ollama:11434
  ollama_model: gemma3:4b # Spec 045 BUG-045-001 default (4 GiB resident; fits 8G envelope)
  ollama_vision_model: gemma3:4b # Spec 045 BUG-045-001 default (gemma3:4b is multimodal: text+vision)
  ollama_ocr_model: deepseek-ocr:3b # Fast OCR specialist for receipts/documents
  ollama_reasoning_model: deepseek-r1:7b # Spec 045 BUG-045-001 default (4.75 GiB resident; fits 8G envelope)
  ollama_fast_model: gemma3:4b # Spec 045 BUG-045-001 default (4 GiB resident; fits 8G envelope)

  # ───────────────────────────────────────────────────────────────────
  # Spec 096 SCOPE-01 — Multi-Provider AI Model Connections (registry).
  #
  # The existing single-provider `llm.provider` block above is RETAINED
  # untouched (it still feeds synthesis.py / drive_classify.py / the
  # healthchecks). The registry below is ADDITIVE: it declares the closed,
  # operator-global set of provider connections this deployment MAY use.
  # An Ollama-only dev box keeps working byte-for-byte — only `local-ollama`
  # is enabled; every hosted slot ships `enabled: false` with NO secret.
  #
  # SST source of truth → generated env (scripts/commands/config.sh) →
  # internal/config/model_connections.go (closed-set fail-loud loader). NO
  # defaults (Gate G028, smackerel-no-defaults): an unknown kind, a missing
  # required per-kind param, a non-positive discovery bound, an env-mode
  # secret absent from infrastructure.secret_keys, or an ENABLED non-ollama
  # model with no model_costs entry aborts config-generation / startup with
  # a NAMED error — never a silent default and never an Ollama fallback.
  #
  # Secret material is NEVER an inline plaintext value here. A db-mode secret
  # is entered via the web admin surface and rides the encrypted vault
  # (SCOPE-02); an env-mode secret rides the managed-secret
  # infrastructure.secret_keys path. The registry carries only a
  # secret_ref (mode + optional env_key), never a credential.
  #
  # WIRE SHAPE NOTE: `params` and `models` are compact inline-JSON STRINGS
  # (single-quoted). The config generator's list-of-flat-objects YAML→JSON
  # step carries them verbatim into LLM_CONNECTIONS_JSON; the Go loader
  # re-parses them into the typed Params map / Models struct. Keep them on
  # one line and single-quoted.
  #
  # Closed-set kinds: ollama | anthropic | openai | azure-foundry | google | bedrock
  # Per-kind required non-secret params (design §4):
  #   ollama:        base_url
  #   anthropic:     (none)
  #   openai:        org? base_url?  (both OPTIONAL)
  #   azure-foundry: endpoint + api_version + deployment  (all REQUIRED)
  #   google:        Vertex project + location (together) OR Gemini (none)
  #   bedrock:       region
  provider_secret_master_key: "" # SECRET (LLM_PROVIDER_SECRET_MASTER_KEY). AES-256-GCM master key for the SCOPE-02 connvault. Empty for dev/test (no db-mode hosted connection is enabled, so no secret is needed); production-class targets receive a placeholder the deploy adapter substitutes. NEVER commit a real key.
  connections:
  # local Ollama — the only ENABLED connection by default; preserves the
  # existing Ollama-only path. No secret (local).
  - id: "local-ollama"
    kind: "ollama"
    enabled: true
    params: '{"base_url":"http://ollama:11434"}' # ollama: base_url REQUIRED
    secret_ref_mode: "" # ollama is local: no credential
    secret_ref_env_key: ""
    models: '{"strategy":"live"}' # discovered live via GET /api/tags (SCOPE-04)
  # Anthropic — declared-but-disabled example. Operator enters the api_key
  # via the web admin surface (db-mode → encrypted vault, SCOPE-02), then
  # tests + enables it. No secret value is ever committed here.
  - id: "anthropic-primary"
    kind: "anthropic"
    enabled: false
    params: '{}' # anthropic: no non-secret params
    secret_ref_mode: "db" # api_key entered via web UI → vault
    secret_ref_env_key: ""
    models: '{"strategy":"curated","list":[{"id":"claude-3-5-sonnet","tool_capable":true,"vision":true,"context_window":200000}]}'
  # OpenAI — declared-but-disabled. org / base_url are OPTIONAL; shown for
  # documentation. api_key rides the vault (db-mode).
  - id: "openai-primary"
    kind: "openai"
    enabled: false
    params: '{}' # openai: org? / base_url? both optional — omitted here
    secret_ref_mode: "db"
    secret_ref_env_key: ""
    models: '{"strategy":"curated","list":[{"id":"gpt-4o","tool_capable":true,"vision":true,"context_window":128000}]}'
  # Microsoft Foundry / Azure OpenAI — the richest per-kind param set
  # (endpoint + api_version + deployment all REQUIRED). Placeholder
  # endpoint shown; replace with the real Azure resource at deploy time.
  - id: "azure-foundry-primary"
    kind: "azure-foundry"
    enabled: false
    params: '{"endpoint":"https://example-resource.openai.azure.com","api_version":"2024-06-01","deployment":"gpt-4o"}'
    secret_ref_mode: "db"
    secret_ref_env_key: ""
    models: '{"strategy":"curated","list":[{"id":"gpt-4o","tool_capable":true,"vision":true,"context_window":128000}]}'
  # Google — Vertex example (project + location travel together). For
  # Gemini instead, omit both params (gemini needs no non-secret param).
  - id: "google-primary"
    kind: "google"
    enabled: false
    params: '{"project":"example-project","location":"us-central1"}'
    secret_ref_mode: "db" # Vertex service_account JSON (or Gemini api_key) via vault
    secret_ref_env_key: ""
    models: '{"strategy":"curated","list":[{"id":"gemini-1.5-pro","tool_capable":true,"vision":true,"context_window":2000000}]}'
  # Amazon Bedrock — region REQUIRED; AWS credentials ride the vault.
  - id: "bedrock-primary"
    kind: "bedrock"
    enabled: false
    params: '{"region":"us-east-1"}'
    secret_ref_mode: "db"
    secret_ref_env_key: ""
    models: '{"strategy":"curated","list":[{"id":"anthropic.claude-3-5-sonnet-20241022-v2:0","tool_capable":true,"vision":true,"context_window":200000}]}'
  # Discovery aggregation bounds (design §6.3). BOTH REQUIRED > 0 whenever
  # ≥1 connection is declared — NO default (G028). Consumed by the SCOPE-04
  # CatalogAggregator (stale-while-revalidate cache + per-provider timeout).
  discovery:
    cache_ttl_ms: 60000 # last-good catalog reuse window; > 0
    per_provider_timeout_ms: 4000 # per-connection discovery probe budget; > 0
  # Provider-qualified (<kind>/<backend-id>) USD rate table. REQUIRED for
  # every ENABLED non-ollama (billable) model — a billable model with no
  # entry is a fail-loud refusal at dispatch (SCOPE-05), NEVER a silent $0.
  # Ollama models are $0 and need no entry. The hosted examples below ship
  # disabled, so these rates are documentation today; flipping a slot
  # `enabled: true` requires its models to be priced here.
  model_costs:
  - model: "anthropic/claude-3-5-sonnet"
    input_usd_per_1k: 0.003
    output_usd_per_1k: 0.015
  - model: "openai/gpt-4o"
    input_usd_per_1k: 0.0025
    output_usd_per_1k: 0.010
  - model: "azure-foundry/gpt-4o"
    input_usd_per_1k: 0.0025
    output_usd_per_1k: 0.010
  - model: "google/gemini-1.5-pro"
    input_usd_per_1k: 0.00125
    output_usd_per_1k: 0.005
  - model: "bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0"
    input_usd_per_1k: 0.003
    output_usd_per_1k: 0.015

telegram:
  bot_token: ""
  # Spec 082 SCOPE-082-01 — empty by default. A fresh operator MUST set their
  # own chat_ids; an empty value is treated by the runtime as "no Telegram
  # recipient configured" (internal/config/config.go guards `chatIDs != ""`,
  # leaving Config.TelegramChatIDs nil) and does NOT break startup. Never ship
  # a real personal chat-id as the committed default.
  chat_ids: ""
  # Spec 044 Scope 03 — chat_id → user_id mapping for the Telegram
  # bridge. Format: "<chat_id>:<user_id>" pairs, comma-separated
  # (mirrors chat_ids).
  #   Examples:
  #     ""                              # dev/test default — empty mapping is OK
  #     "12345:alice"                   # single chat → single user (production)
  #     "12345:alice,67890:bob"         # multi-user production deployment
  # In production an unmapped chat is REFUSED (the bot drops the
  # message with a slog.Warn) so the shared bot token cannot be used
  # to attribute captures to the wrong user. In development/test the
  # empty mapping is acceptable and existing single-user dev flows
  # keep working.
  # Spec 082 SCOPE-082-01 — empty by default (was a real personal mapping).
  user_mapping: ""
  assembly_window_seconds: 10
  assembly_max_messages: 100
  media_group_window_seconds: 3
  disambiguation_timeout_seconds: 120
  cook_session_timeout_minutes: 120 # Inactivity timeout before cook session auto-expires [5, 480]
  cook_session_max_per_chat: 1 # Max concurrent cook sessions per chat (always 1 in v1)

expenses:
  enabled: true

  # Default currency for manual entries and when extraction cannot determine currency.
  # Must be ISO 4217.
  default_currency: "USD"

  # Expense categories available for classification.
  categories:
  - slug: "food-and-drink"
    display: "Food & Drink"
    tax_category: "Meals"
  - slug: "transportation"
    display: "Transportation"
    tax_category: "Car and Truck Expenses"
  - slug: "office-supplies"
    display: "Office Supplies"
    tax_category: "Office Expenses"
  - slug: "technology"
    display: "Technology"
    tax_category: "Other Expenses"
  - slug: "travel"
    display: "Travel"
    tax_category: "Travel"
  - slug: "utilities"
    display: "Utilities"
    tax_category: "Utilities"
  - slug: "home-improvement"
    display: "Home Improvement"
    tax_category: "Repairs and Maintenance"
  - slug: "auto-and-transport"
    display: "Auto & Transport"
    tax_category: "Car and Truck Expenses"
  - slug: "subscriptions"
    display: "Subscriptions"
    tax_category: "Other Expenses"
  - slug: "professional-services"
    display: "Professional Services"
    tax_category: "Legal and Professional Services"
  - slug: "insurance"
    display: "Insurance"
    tax_category: "Insurance"
  - slug: "advertising"
    display: "Advertising"
    tax_category: "Advertising"
  - slug: "education"
    display: "Education"
    tax_category: "Other Expenses"
  - slug: "health"
    display: "Health"
    tax_category: "Other Expenses"
  - slug: "entertainment"
    display: "Entertainment"
    tax_category: "Other Expenses"
  - slug: "other"
    display: "Other"
    tax_category: "Other Expenses"
  # Vendors that are always classified as business.
  business_vendors: []

  # Export settings
  export:
    max_rows: 10000
    quickbooks_date_format: "01/02/2006"
    standard_date_format: "2006-01-02"

  # Suggestion engine settings
  suggestions:
    min_confidence: 0.6
    min_past_business_count: 2
    max_per_digest: 3
    reclassify_batch_limit: 100

  # Vendor normalization cache
  vendor_cache_size: 500

  # Digest section settings
  digest:
    max_words: 100
    needs_review_limit: 5
    missing_receipt_lookback_days: 35

annotations:
  matview_refresh_timeout_seconds: 10
  history_default_limit: 50
  history_max_limit: 100
  relevance_boost:
    rating_max: 0.05 # max boost for rating 5
    usage_max: 0.03 # max boost capped at 10 uses
    usage_cap: 10 # number of uses for full usage boost
  # Spec 027 scope 9 PLAN-9-04 — source_channel header allowlist for
  # browser/PWA annotation writes. Closed-set; missing or unknown
  # header value → 400. Go-side allowlist
  # (internal/api/annotation_source.go: allowedAnnotationSources)
  # must stay in lockstep with this list.
  source_header_name: "X-Smackerel-Source"
  source_allowlist: [ "web", "extension", "telegram", "api" ]
  # Spec 027 scope 9 PLAN-9-05 — upper bound on the
  # GET /api/annotations?actor=me limit query param.
  list_my_max_limit: 200

# Spec 080 SCOPE-080-01 — Knowledge Graph Public API SST envelope.
# Every value flows through scripts/commands/config.sh into the
# generated env file as KNOWLEDGE_GRAPH_API_*; no in-source defaults
# (smackerel-no-defaults policy). Startup fails loud if any field is
# missing or non-positive. Consumers: internal/api/graphapi/config.go
# (the package-local fail-loud loader) and internal/config/
# knowledge_graph_api.go (the boot-time validator wired into Load()).
knowledge_graph_api:
  list_default_limit: 50
  list_max_limit: 200
  time_window_max_days: 365
  edges_default_limit: 100
  edges_max_limit: 500
  # cursor_secret_env names the env var that holds the HMAC signing
  # key used by the opaque cursor codec (graphapi.CursorCodec). The
  # secret value itself is operator-injected via the spec 052 secret
  # path; this YAML carries only the env-var NAME, never the secret.
  cursor_secret_env: "KNOWLEDGE_GRAPH_API_CURSOR_SECRET"

# Spec 021 Scope 4 — Unified Surfacing Controller (Next Smackerel
# prioritizer). Every value flows through scripts/commands/config.sh
# into the generated env file as SURFACING_*; no in-source defaults
# (smackerel-no-defaults policy). Startup fails loud if any field is
# missing or non-positive.
surfacing:
  # Interruption-budget taxonomy — THREE distinct tiers, frequently mistaken for
  # one self-contradictory number. They are NOT in conflict; each governs a
  # different thing:
  #   Tier 1 — daily cross-channel NUDGE budget = daily_nudge_budget below. HARD
  #     ceiling enforced by the spec-078 surfacing controller
  #     (internal/intelligence/surfacing/controller.go, BudgetTracker.TryConsume in
  #     Propose()). Non-urgent candidates beyond it are DEFERRED; only priority-1 +
  #     time-critical candidates escalate past it (urgent_escalation_enabled).
  #   Tier 2 — contextual-ALERT cap ~2/day. HARD, but enforced UPSTREAM in the
  #     alert producers (e.g. the Telegram cap in alerts.GetPendingAlerts), NOT in
  #     this controller — the controller only owns the global cross-channel ceiling.
  #   Tier 3 — system-initiated PROMPTS < 3/week (non-urgent). A MEASURED
  #     SUCCESS-METRIC / SLO TARGET (docs/smackerel.md §1.4 success-metrics table),
  #     NOT a hard cap. The Tier-1 daily caps + dedupe + suppression keep the rate
  #     low but do not structurally guarantee <3/week; it is observed/tuned, not
  #     enforced.
  daily_nudge_budget: 5 # max user-visible nudges per day across all surfaces
  suppression_window_hours: 4 # acked items suppress follow-ups for this window
  dedupe_window_hours: 6 # same content_key collapses within this window
  urgent_escalation_enabled: true # priority-1 + time_critical may bypass exhausted budget

# Spec 021 R-021-005 / BUG-021-005 — relationship-cooling intelligence.
# The "is this relationship cooling?" JUDGMENT is LLM-driven (the
# relationship_cooling_evaluate scenario), NOT a hardcoded threshold. These
# are OPERATIONAL bounds only — fail-loud, operator-tunable:
#   - max_candidates: how many of the most-dormant contacts to evaluate per
#     weekly run (throughput cap; the LLM judges each).
#   - confidence_floor: decision-confidence safety gate; below this the nudge
#     is withheld (Product Principle 6 — invisible by default).
#   - dedup_window_days: do not re-alert a contact whose cooling nudge is still
#     pending/delivered within this many days (anti-spam).
intelligence:
  relationship_cooling:
    max_candidates: 25 # REQUIRED: positive int; per-run evaluation cap
    confidence_floor: 0.7 # REQUIRED: float in [0,1]; below this the nudge is withheld
    dedup_window_days: 30 # REQUIRED: positive int; re-alert suppression window
  # Spec 021 R-021-002/003/004 / BUG-021-006 — alert-timing intelligence.
  # The "should I alert about this upcoming event NOW?" JUDGMENT is LLM-driven
  # (the alert_timing_evaluate scenario), NOT a hardcoded N-day window. These
  # are OPERATIONAL bounds only — fail-loud, operator-tunable:
  #   - lookahead_days: how far ahead to retrieve candidate events (bill / trip
  #     / return deadline) for the LLM to judge (candidate-retrieval horizon).
  #   - max_candidates: per-run evaluation cap per producer (throughput).
  #   - confidence_floor: decision-confidence safety gate; below this the
  #     reminder is withheld (Product Principle 6 — invisible by default).
  alert_timing:
    lookahead_days: 30 # REQUIRED: positive int; candidate-retrieval horizon
    max_candidates: 25 # REQUIRED: positive int; per-run evaluation cap
    confidence_floor: 0.7 # REQUIRED: float in [0,1]; below this the reminder is withheld
  # Spec 021 R-505 / BUG-021-007 — resurfacing-worthiness intelligence.
  # The "is this dormant artifact worth resurfacing?" JUDGMENT is LLM-driven
  # (the resurface_evaluate scenario), NOT a hardcoded dormancy/relevance
  # threshold. These are OPERATIONAL bounds only — fail-loud, operator-tunable:
  #   - min_dormancy_days: candidate-retrieval floor; exclude artifacts accessed
  #     more recently than this (so the LLM judges genuinely dormant items).
  #   - max_candidates: per-run evaluation cap (throughput).
  #   - confidence_floor: decision-confidence safety gate; below this the
  #     resurfacing is withheld (Product Principle 6 — invisible by default).
  # Serendipity (random rediscovery) is a separate strategy, unaffected.
  resurface:
    min_dormancy_days: 7 # REQUIRED: positive int; candidate-retrieval dormancy floor
    max_candidates: 25 # REQUIRED: positive int; per-run evaluation cap
    confidence_floor: 0.7 # REQUIRED: float in [0,1]; below this the resurfacing is withheld

  # Spec 021 BUG-021-008 — expertise-map OPERATIONAL bounds.
  # The "how expert is the user in this topic, and is it growing?" JUDGMENT is
  # LLM-driven (the expertise_classify scenario), NOT a hardcoded weighted score
  # or tier/velocity threshold. These are OPERATIONAL bounds only — fail-loud,
  # operator-tunable:
  #   - max_topics: per-request cap on topics retrieved and classified.
  #   - maturity_days: data-sufficiency floor; the map is "mature" only past it.
  #   - blind_spot_min_mentions / blind_spot_max_captures / blind_spot_limit:
  #     gap-detection bounds for the "mentioned but under-captured" blind spots.
  expertise:
    max_topics: 100 # REQUIRED: positive int; per-request topic cap
    maturity_days: 90 # REQUIRED: positive int; data-sufficiency floor
    blind_spot_min_mentions: 5 # REQUIRED: positive int; min mentions to flag a blind spot
    blind_spot_max_captures: 5 # REQUIRED: positive int; capture ceiling for under-captured
    blind_spot_limit: 10 # REQUIRED: positive int; max blind spots returned

  # Spec 021 BUG-021-009 — seasonal-detection OPERATIONAL bounds.
  # The "is this YoY volume change a meaningful seasonal pattern?" JUDGMENT is
  # LLM-driven (the seasonal.analyze ML scenario), NOT a hardcoded volume-ratio
  # threshold. These are OPERATIONAL bounds only — fail-loud, operator-tunable:
  #   - min_data_days: data-sufficiency floor (R-508 needs 6+ months).
  #   - topic_min_captures: min same-month captures for a topic to be a candidate.
  #   - topic_candidate_limit: cap on topic candidates sent to the LLM.
  #   - max_observations: cap on returned seasonal observations.
  seasonal:
    min_data_days: 180 # REQUIRED: positive int; data-sufficiency floor (6+ months)
    topic_min_captures: 5 # REQUIRED: positive int; min same-month captures for a candidate
    topic_candidate_limit: 5 # REQUIRED: positive int; cap on topic candidates sent to LLM
    max_observations: 2 # REQUIRED: positive int; cap on returned seasonal observations

# Spec 013 / 021 BUG-021-010 — digest OPERATIONAL bounds.
# The "is this guest/property a concern worth flagging?" JUDGMENT is LLM-driven
# (the hospitality_concern_evaluate scenario), NOT a hardcoded sentiment/rating/
# issue-count threshold. These are OPERATIONAL candidate-retrieval caps only —
# fail-loud, operator-tunable:
#   - guest_candidate_limit: max guests gathered + sent to the LLM per digest.
#   - property_candidate_limit: max properties gathered + sent per digest.
digest:
  hospitality:
    guest_candidate_limit: 50 # REQUIRED: positive int; per-digest guest candidate cap
    property_candidate_limit: 50 # REQUIRED: positive int; per-digest property candidate cap

# Spec 058 Scope 1 — Chrome Extension Bridge ingest endpoint SST.
