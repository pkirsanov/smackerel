# Spec 083 Card Rewards Companion (absorbs the standalone CCManager app).
# Light-touch credit-card cashback companion (docs/smackerel.md §16.8).
# SST / fail-loud (Gate G028, smackerel-no-defaults): when `enabled: true`,
# every REQUIRED key below MUST be present and valid or the Go config loader
# (internal/config/cardrewards.go) fails loud at startup naming the offending
# key — there are NO in-source defaults. The empty-string / empty-list values
# here are DEV-ONLY placeholders that the loader rejects when enabled; the
# operator supplies real values (host Ollama model/endpoint, source URLs,
# tracked categories) on home-lab and flips `enabled: true`. The feature is
# additionally gated by the `card_rewards` release-train flag (default-ON only
# in the mvp train bundle; owned by bubbles.train).
card_rewards:
  enabled: false
  scrape_cron: "0 6 * * *" # REQUIRED when enabled — daily refresh
  monthly_recommend_cron: "0 7 1 * *" # REQUIRED when enabled — 1st of month
  calendar_sync: false # opt-in; true on home-lab
  calendar_uid_prefix: "smackerel-cardrec" # REQUIRED when calendar_sync
  calendar_id: "" # REQUIRED when calendar_sync (spec 097) — target Google Calendar id; non-secret operator config, emitted by the knb deploy adapter from params.yaml (empty here per No Env-Specific Content)
  gcal_credentials: "" # REQUIRED when calendar_sync (spec 097) — Google OAuth credential JSON {client_id,client_secret,refresh_token,token_uri}; MANAGED SECRET (infrastructure.secret_keys), shipped via knb <target>.enc.env; empty here, never a committed value
  fetch_timeout_seconds: 20 # REQUIRED when enabled — per-source fetch bound
  extraction:
    model: "" # REQUIRED when enabled — host Ollama model (e.g. gpt-oss:20b)
    endpoint: "" # REQUIRED when enabled — host Ollama URL (e.g. <home-lab-host>)
    confidence_threshold: 0.0 # REQUIRED when enabled — below → needs_verification (0..1)
    max_sources_per_card: 0 # REQUIRED when enabled — reconciliation fan-out cap (> 0)
  sources: [] # REQUIRED non-empty when enabled — [{name,url,issuer_hint}]
  tracked_categories: [] # REQUIRED non-empty when enabled — spend categories to recommend for
  import_data_dir: "" # OPTIONAL (Scope 03) — CCManager data/ dir for the one-time JSON→PG import; operator-supplied per environment, or pass --data-dir at invocation (empty here per No Env-Specific Content)

recommendations:
  enabled: true
  providers:
    google_places:
      enabled: false
      categories: [ "place", "event" ]
      api_key: ""
      quota_window_seconds: 60
      max_requests_per_window: 30
      attribution_label: "Google Places"
    yelp:
      enabled: false
      categories: [ "place" ]
      api_key: ""
      quota_window_seconds: 60
      max_requests_per_window: 30
      attribution_label: "Yelp"
  location_precision:
    user_standard: "city"
    mobile_standard: "neighborhood"
    watch_standard: "neighborhood"
    neighborhood_cell_system: "geohash"
    neighborhood_cell_level: 6
  watches:
    max_alerts_per_window: 3
    alert_window_seconds: 86400
    cooldown_seconds_by_kind:
      place: 86400
      product: 604800
      deal: 86400
      event: 86400
      content: 86400
    quiet_hours_policy:
      enabled: true
      start: "22:00"
      end: "07:00"
    poll_cron: "*/5 * * * *"
    # OPERATIONAL fallback price-drop threshold (fraction in (0,1]) used ONLY
    # when neither the trigger context nor the user's watch filter supplies
    # threshold_pct. Fail-loud SST — no hardcoded in-source default. The user's
    # per-watch threshold_pct and the trigger payload still take precedence.
    default_price_drop_threshold_pct: 0.10
  retention:
    raw_provider_payload_seconds: 604800
    trace_retention_seconds: 2592000
  ranking:
    max_candidates_per_provider: 25
    max_final_results: 10
    standard_result_count: 5
    standard_style: "balanced"
    low_confidence_threshold: 0.55
  policy:
    sponsored_promotions_enabled: false
    restricted_categories: [ "adult", "gambling", "weapons" ]
    safety_sources: [ "local-policy", "provider-rating" ]
  delivery:
    telegram_enabled: true
    digest_enabled: true
    trip_dossier_enabled: true

observability:
  otel_enabled: false # Opt-in OpenTelemetry trace propagation (zero overhead when disabled)
  otel_exporter_endpoint: "" # OTLP gRPC endpoint (e.g. http://localhost:4317)

# Spec 067 — Intent-Driven Policy Enforcement (CI guards). SST zero-defaults:
# every key is REQUIRED at the generator boundary. Missing values fail loud at
# config validate / guard bootstrap with the named missing key (G067-A08).
# The baseline file path is repo-relative. The exception max age is an upper
# bound on `expires_on` distance from now; expired entries are violations.
# intent_bypass_guard_enabled is the strict on/off switch for the spec 068
# compiler-bypass guard wired through this policy surface.
policy:
  scenario_prompt_max_lines: 120
  policy_exception_baseline_path: policy-exception-baseline.json
  policy_exception_max_age_days: 90
  intent_bypass_guard_enabled: true

# Spec 044 — Per-User Bearer Auth Foundation. SST zero-defaults: every key is
# REQUIRED at the generator boundary. Secret-bearing fields are empty-string
# placeholders here (dev/test fall back to runtime.auth_token shared-token
# semantics); production deployments MUST populate signing material, the
# at-rest hashing key, and (on a fresh install with zero enrolled users) the
# bootstrap token before the runtime starts. The Go core fails loud on
# startup if any required production-mode value is missing or invalid (see
# `internal/config/config.go` Validate + `cmd/core/wiring.go` startup
# validation). Per-env enable flag lives at environments.<env>.auth_enabled.
auth:
  # OQ-1 RESOLVED — PASETO v4.public (Ed25519). No algorithm-confusion
  # surface, compact wire size, no JWKS server requirement.
  token_format: paseto-v4-public

  # BUG-020-009 — Generic OAuth2 token-endpoint HTTP client timeout
  # (seconds). SST zero-defaults: value MUST be > 0; fail-loud in
  # Validate() when missing/unparseable/<=0. Replaces the hardcoded
  # `client := &http.Client{Timeout: 15 * time.Second}` previously at
  # internal/auth/oauth.go:117.
  oauth:
    http_timeout_seconds: 15

  # Disabled by default; per-env overrides flip this on for production-class
  # environments. environments.<env>.auth_enabled wins via env_override_value.
  enabled: false

  signing:
    # OQ-2 RESOLVED — overlap rotation: active key signs new tokens; prior
    # public key validates in-flight tokens for rotation_grace_window_hours.
    # Empty in dev/test (falls back to shared-token mode); REQUIRED in
    # production with auth.enabled=true (fail-loud at startup if empty).
    active_private_key: ""
    active_key_id: ""
    prior_public_key: ""
    prior_key_id: ""

  # Bounded TTL — no infinite tokens in production. NFR-AUTH-003 sets the
  # rotation_grace_window_hours floor at 24h; design default is 7 days.
  token_ttl_hours: 720
  rotation_grace_window_hours: 168

  # NFR-AUTH-005 — clock-skew tolerance ≤ 60 s.
  clock_skew_tolerance_seconds: 30

  # NFR-AUTH-006 — revocation propagation ≤ 60 s. NATS pub/sub is the primary
  # propagation channel; the periodic DB refresh is the failure-mode backstop.
  revocation_cache_refresh_interval_seconds: 30
  revocation_nats_subject: "auth.revocations"

  # OQ-8 RESOLVED — at-rest token hashing key (HMAC-SHA-256). MUST differ
  # from auth.signing.active_private_key. REQUIRED in production with
  # auth.enabled=true (fail-loud at startup if empty).
  at_rest_hashing_key: ""

  # OQ-5 RESOLVED — production rejects shared SMACKEREL_AUTH_TOKEN by
  # default once any per-user token is enrolled. Operators may opt-in via
  # this flag during the migration window; each use logs a deprecation
  # warning. Spec 044 Scope 04 flips production defaults; Scope 01 lands
  # the SST surface only.
  production_shared_token_fallback_enabled: false

  # OQ-9 RESOLVED — telemetry surface for spec 030 dashboards.
  telemetry_enabled: true
  telemetry_metric_prefix: "smackerel_auth"

  # OQ-10 RESOLVED — bootstrap token for first-user enrollment on a fresh
  # production deployment. Consumed exactly once via
  # `./smackerel.sh auth bootstrap` and then cleared by the operator.
  #
  # Spec 051 FR-051-004 / SCN-051-S01: REQUIRED at config-load time when
  # SMACKEREL_ENV=production AND auth.enabled=true. The Go config loader
  # fails loud (`internal/config/config.go::loadAuthConfig`) and refuses
  # to even produce a Config object that names AUTH_BOOTSTRAP_TOKEN as
  # missing. The wiring-time check in `internal/auth/startup.go` remains
  # as defense-in-depth. Dev/test environments retain the empty-string
  # default so local workflows do not require a bootstrap token.
  bootstrap_token: ""

  # Spec 091 — web self-registration invite token (OPTIONAL). Empty ⇒
  # registration disabled at POST (fail-loud, never open signup); a
  # non-empty value enables POST /v1/web/register. Dev/test default empty
  # so local workflows do not enable self-registration. Read by core's
  # HandleWebRegister; compared in constant time; never logged.
  web_registration_invite_token: ""

# Spec 061 SCOPE-06c (Round 71d) — Hardware-tier × model-role matrix.
# Switch key: SMACKEREL_HARDWARE_TIER={cpu,accel}. REQUIRED at
# `./smackerel.sh config generate` time, fail-loud per smackerel-no-defaults
# (no `${VAR:-default}` form anywhere). Sourced from the gitignored
# `.smackerel.local.env` overlay at repo root; operator copies
# `.smackerel.local.env.example` and sets the tier per machine
# (cpu = WSL Cloud PC; accel = <home-lab-host> ROCm/NPU host). The 6 model env vars
# (LLM_MODEL, OLLAMA_MODEL, OLLAMA_VISION_MODEL, AGENT_PROVIDER_DEFAULT_MODEL,
# AGENT_PROVIDER_FAST_MODEL, AGENT_PROVIDER_VISION_MODEL) resolve to the
# `<tier>.interactive.model` value at config-generate time. The 2 timeout env
# vars (RETRIEVAL_QA_TIMEOUT_MS, RETRIEVAL_QA_PER_TOOL_TIMEOUT_MS) resolve to
# the `<tier>.interactive.retrieval_qa_*` values. Background-role values are
# slot-only today (no env var consumes them yet); the slots are kept honest
# for the synthesis pipeline. See design.md §5.1 operator-directive table.
models:
  tiers:
    cpu:
      interactive:
        model: qwen2.5:0.5b-instruct
        retrieval_qa_timeout_ms: 15000
        retrieval_qa_per_tool_timeout_ms: 7500
        # BUG-061-003 — recipe_search shares the retrieval substrate so
        # its budgets mirror retrieval_qa per tier. REQUIRED literals.
        recipe_search_timeout_ms: 15000
        recipe_search_per_tool_timeout_ms: 7500
      background:
        model: gemma3:4b
        retrieval_qa_timeout_ms: 300000
        retrieval_qa_per_tool_timeout_ms: 150000
        recipe_search_timeout_ms: 300000
        recipe_search_per_tool_timeout_ms: 150000
    accel:
      interactive:
        model: gemma3:4b
        retrieval_qa_timeout_ms: 120000
        retrieval_qa_per_tool_timeout_ms: 60000
        recipe_search_timeout_ms: 120000
        recipe_search_per_tool_timeout_ms: 60000
      background:
        model: deepseek-r1:7b
        retrieval_qa_timeout_ms: 300000
        retrieval_qa_per_tool_timeout_ms: 150000
        recipe_search_timeout_ms: 300000
        recipe_search_per_tool_timeout_ms: 150000

# Spec 095 — Retrieval-Strategy Routing + Freshness-Aware Retrieval. SST
# zero-defaults: every key below is REQUIRED. The Go core refuses to start if
# any value is missing or invalid (fail-loud [F095-SST-MISSING] in
# internal/config/retrieval.go::LoadRetrieval — Gate G028 / smackerel-no-defaults).
# Literal values only — no ${VAR:?...} substitution here (that form is for
# deploy/compose.deploy.yml only). All routing + evergreen behaviour operates
# over the SINGLE existing pgvector + knowledge-graph + structured store
# (Principle 5 — no parallel index); these keys only select a read-path strategy
# and a lifecycle weighting, they never create a new store.
retrieval:
  routing:
    enabled: true # REQUIRED bool; master switch for retrieval-strategy routing
    intent_confidence_threshold: 0.65 # REQUIRED float in (0,1]; below this CompiledIntent confidence the router falls back to vague_recall (R5)
    strategies:
      whole_document_enabled: true # REQUIRED bool; enable the whole_document strategy (Idea 1a)
      structured_aggregate_enabled: true # REQUIRED bool; enable the structured_aggregate strategy (Idea 1b)
      vague_recall_enabled: true # REQUIRED bool; MUST be true — the router's safe fallback cannot be disabled (validator rejects false)
    # Idea 3 (R7/R8) — per-artifact-type admissible query shapes. A single-line
    # compact JSON object (artifact type -> ordered shape list), mirroring the
    # ML_MODEL_MEMORY_PROFILES_JSON SST-JSON precedent. Parsed into the typed
    # RetrievalContract registry at startup. Closed shape vocabulary:
    # whole_document_summary | aggregate_spend | dossier | vague_recall. Any
    # type absent here resolves to ["vague_recall"] (R9 fail-safe). Operator-
    # overridable; adding a type is an additive edit with no router change.
    contracts: { "transcript": [ "whole_document_summary", "vague_recall" ], "meeting": [ "whole_document_summary", "vague_recall" ], "subscription": [ "aggregate_spend", "vague_recall" ], "expense": [ "aggregate_spend", "vague_recall" ], "bill": [ "aggregate_spend", "vague_recall" ], "place": [ "dossier", "vague_recall" ], "trip": [ "dossier", "vague_recall" ] }
  evergreen:
    enabled: true # REQUIRED bool; master switch for the evergreen ingestion-front-door signal (Idea 2)
    judgment_source: scenario # REQUIRED enum: scenario (canonical LLM judgment) | tier_signals (deterministic fallback)
    confidence_floor: 0.60 # REQUIRED float in [0,1]; operational decision-confidence safety gate (NOT a business cutoff — docs §3.6)
    per_tick_budget: 50 # REQUIRED positive int; per-ingestion-tick evergreen-judgment cap (NFR-2 throughput bound)
    dedup_window_days: 7 # REQUIRED positive int; re-judge dedup window
    pools:
      synthesis_excludes_low_evergreen: false # REQUIRED bool; exclude low-evergreen items from the §10 synthesis candidate pool (R12). Default false = safe additive activation (spec 095 SCOPE-08): the synthesis candidate set is byte-for-byte unchanged until the operator opts in. NULL/not-yet-scored is never excluded (Principle 9); excluded items stay fully searchable (R13).
      digest_excludes_low_evergreen: false # REQUIRED bool; exclude low-evergreen items from the §12 digest candidate pool (R12). Default false = safe additive activation (spec 095 SCOPE-08): the digest candidate set is byte-for-byte unchanged until the operator opts in. NULL/not-yet-scored is never excluded (Principle 9); excluded items stay fully searchable (R13).

assistant:
  # Spec 061 — Conversational Assistant (Transport-Agnostic). SST zero-defaults:
  # every key is REQUIRED. The Go core refuses to start if any value is missing
  # (fail-loud per smackerel-no-defaults). Literal values only — no ${VAR:?...}
  # substitution here (that form is for deploy/compose.deploy.yml only per Gate
  # G028). The 4 startup validation rules implemented in
  # internal/config/assistant.go::validateAssistantConfig enforce:
  #   1. Every key resolves to a non-empty value.
  #   2. borderline_floor > agent.routing.confidence_floor (preserves the
  #      borderline band; refuse equal-or-less).
  #   3. enabled=true requires at least one transports.*.enabled=true.
  #   4. context.state_key="user" (non-recommended) emits a startup WARN log.
  enabled: true
  # Three-band routing post-processor floor on agent.RoutingDecision.TopScore.
  # Recommended 0.75; MUST be > agent.routing.confidence_floor (0.65).
  borderline_floor: 0.75
  context:
    window_turns: 8 # REQUIRED: conversation window in turns
    idle_timeout: "30m" # REQUIRED: idle-sweep TTL (Go time.Duration)
    idle_sweep_interval: "5m" # REQUIRED: ticker cadence for idle sweep
    state_key: "transport_user" # REQUIRED: "transport_user" recommended; "user" emits WARN
  sources_max: 5 # REQUIRED: max Source entries returned per response
  body_max_chars: 4000 # REQUIRED: max body characters (transport-agnostic cap)
  status_max_duration: "60s" # REQUIRED: max time a status token may be displayed
  disambiguate_timeout: "2m" # REQUIRED: ttl for disambiguation prompts
  error:
    capture_timeout: "10s" # REQUIRED: ttl for offer-to-capture on error
  rate_limit:
    retrieval:
      requests_per_minute: 30 # REQUIRED
    weather:
      requests_per_minute: 20 # REQUIRED
    notifications:
      requests_per_minute: 10 # REQUIRED
    # BUG-061-003 — recipe_search rate limit. REQUIRED literal.
    recipe_search:
      requests_per_minute: 20 # REQUIRED
  skills:
    retrieval:
      enabled: true # REQUIRED
      top_k: 8 # REQUIRED: cap on retrieval_search tool result count
    # BUG-061-003 — recipe_search skill. Ships ON; the bug is a
    # regression of an expected v1 capability. REQUIRED literals.
    recipe_search:
      enabled: true # REQUIRED
      top_k: 8 # REQUIRED: cap on recipe_search tool result count
    weather:
      enabled: true # REQUIRED (open-meteo needs no key; flipped on to serve /weather)
      provider: "open-meteo" # REQUIRED: provider identifier
      api_key_ref: "" # REQUIRED ("" = no API key required for chosen provider)
      cache_ttl: "10m" # REQUIRED: weather LRU TTL
      # Spec 061 design §18.3 — per-URL SST keys for external-provider
      # URL injection seam. Production points at the real open-meteo
      # endpoints; the TARGET_ENV=test override in scripts/commands/config.sh
      # redirects these to http://stub-providers:8080/v1/{search,forecast}
      # served by the smackerel-test-stub-providers nginx container under
      # the `test` compose profile. Empty value is fail-loud at startup.
      geocode_url: "https://geocoding-api.open-meteo.com/v1/search" # REQUIRED
      forecast_url: "https://api.open-meteo.com/v1/forecast" # REQUIRED
      # Spec 094 — rich-conditions + N-day forecast knobs. All REQUIRED
      # (smackerel-no-defaults: no fallback). forecast_days is the daily-grid
      # length (1..16, open-meteo's max). Units are closed-vocabulary open-meteo
      # params. A missing/blank/out-of-range value fails config generate /
      # startup loudly (no default substituted; Gate G028).
      forecast_days: 10 # REQUIRED: integer 1..16
      temperature_unit: "celsius" # REQUIRED: celsius|fahrenheit
      wind_speed_unit: "kmh" # REQUIRED: kmh|ms|mph|kn
      precipitation_unit: "mm" # REQUIRED: mm|inch
    notifications:
      enabled: false # REQUIRED (off by default until SCOPE-08 wires spec 054 packet)
      confirm_timeout: "5m" # REQUIRED: confirm-card timeout before discarded_timeout
  transports:
    telegram:
      enabled: true # REQUIRED: at least one transport MUST be enabled when assistant.enabled=true
      markdown_mode: "MarkdownV2" # REQUIRED: "MarkdownV2" | "plain" | "HTML"
      max_message_chars: 4096 # REQUIRED: Telegram per-message hard cap
      # Spec 061 SCOPE-05 design §17 — Telegram transport ingress mode.
      # REQUIRED. "long_poll" preserves the original tgbotapi.GetUpdatesChan
      # goroutine (production until a public HTTPS URL deployment story
      # exists); "webhook" registers an HTTP POST endpoint on the existing
      # chi router OUTSIDE bearer-auth and authenticates each delivery via
      # constant-time X-Telegram-Bot-Api-Secret-Token compare against the
      # resolved value of webhook_secret_ref. Modes are exclusive at startup.
      mode: "long_poll" # REQUIRED: "long_poll" | "webhook"
      # When mode=long_poll these two values are still REQUIRED to resolve
      # (smackerel SST convention: every key in the literal yaml is read by
      # the generator). The Go validator only enforces non-empty resolution
      # of webhook_secret_ref when mode=webhook; webhook_path MUST always
      # start with "/" and MUST NOT collide with an existing API route.
      webhook_secret_ref: "" # REQUIRED ("" permitted when mode=long_poll); when mode=webhook MUST resolve to a non-empty secret
      webhook_path: "/v1/telegram/webhook" # REQUIRED: path starting with "/"; recommended /v1/telegram/webhook
    # Spec 072 SCOPE-1 — WhatsApp Business Cloud API transport.
    # Independent of Telegram (spec 072 SCN-072-A07): toggling
    # whatsapp.enabled MUST NOT affect Telegram registration. Every key
    # below is REQUIRED at the generator boundary (smackerel-no-defaults
    # Gate G028). The Go validator (internal/config/assistant.go) enforces
    # non-empty resolution of every secret-bearing field when enabled=true;
    # when enabled=false the values are loaded but no ingress is mounted.
    whatsapp:
      enabled: false # REQUIRED: strict bool ("true"|"false")
      webhook_path: "/v1/assistant/transports/whatsapp/webhook" # REQUIRED: chi route path; MUST start with "/" and not collide with reserved API routes
      phone_number_id: "test-phone-id" # REQUIRED non-empty placeholder for dev/test; operators MUST override with real Meta WhatsApp Cloud API sender phone-number id before enabling
      business_account_id: "test-business-id" # REQUIRED non-empty placeholder for dev/test; operators MUST override before enabling
      webhook_verify_token_ref: "WHATSAPP_WEBHOOK_VERIFY_TOKEN" # REQUIRED non-empty env-var name holding the GET verify-token shared secret
      app_secret_ref: "WHATSAPP_APP_SECRET" # REQUIRED non-empty env-var name holding Meta app secret used for X-Hub-Signature-256 HMAC
      access_token_ref: "WHATSAPP_ACCESS_TOKEN" # REQUIRED non-empty env-var name holding the Cloud API bearer access token
      identity_hash_key_ref: "WHATSAPP_IDENTITY_HASH_KEY" # REQUIRED non-empty env-var name holding the HMAC key used to hash inbound E.164 phone numbers
      api_base_url: "https://graph.facebook.com" # REQUIRED: Cloud API base URL; MUST be HTTPS when enabled
      api_version: "v20.0" # REQUIRED: closed-vocabulary Cloud API version token
      rate_limit_per_user_per_minute: 30 # REQUIRED: integer >= 1
      max_text_chars: 4096 # REQUIRED: integer >= 1; outbound text body cap
    # Spec 069 SCOPE-1a — HTTP transport adapter SST. Every key is
    # REQUIRED at the generator boundary (Gate G028 / smackerel-no-defaults).
    # SCOPE-1a lands the keys; SCOPE-2 consumes body/rate/CORS/scope.
    # When enabled=false the route stays mounted but returns 503
    # "assistant_http_disabled" before facade invocation.
    http:
      enabled: true # REQUIRED: strict bool ("true"|"false")
      schema_version: "v1" # REQUIRED: pinned wire schema version
      body_size_max_bytes: 65536 # REQUIRED: integer >= 1
      rate_limit_per_user_per_minute: 60 # REQUIRED: integer >= 1
      cors_allowed_origins: [] # REQUIRED: explicit origin list (empty = same-origin only)
      conversation_ttl_seconds: 86400 # REQUIRED: integer >= 1
      transport_hint_allowlist: [ "web", "mobile", "bridge" ] # REQUIRED: non-empty closed-vocabulary list
      required_scope: "assistant:turn" # REQUIRED: spec 060 scope-claim label (<surface>:<capabilities> grammar)
      shared_user_id: "shared" # REQUIRED: synthetic user id substituted by the HTTP adapter when the bearer middleware produced a shared-token session (empty Session.UserID); per-user PASETO sessions use the sub claim and ignore this value (spec 069 SCOPE-2 / F-069-USERID-BINDING)
  # Spec 061 SCOPE-10 — acceptance-gate thresholds for the offline
  # evaluation harness (tests/eval/assistant). The harness reads these
  # via ASSISTANT_EVAL_* environment variables (resolved by
  # internal/config/assistant.go). Lowering either value below the
  # spec 061 §17 contract is a NON-NEGOTIABLE acceptance regression.
  eval:
    routing_accuracy_min: 0.85 # REQUIRED: min fraction of corpus rows whose ground_truth_intent matches the facade's selected scenario
    capture_fallback_min: 1.0 # REQUIRED: min fraction of capture-expected rows that took a capture path (1.0 = MUST capture every time)
  # Spec 061 SCOPE-09a (design §8.3.1 + §8.3.2 Step 1) — OTel SDK
  # substrate SST keys. All three are REQUIRED at the generator
  # boundary per smackerel-no-defaults; the Go validator enforces:
  #   * otel_enabled is a strict bool ("true"|"false")
  #   * otel_endpoint MUST be non-empty when otel_enabled=true,
  #     MAY be empty when otel_enabled=false (no-op TracerProvider)
  #   * otel_service_name MUST always be non-empty (recorded as the
  #     OTel resource service.name attribute on every span)
  # Production stack ships with otel_enabled=false (no-op fallback).
  # The dev-otel + test compose profiles flip the value via env
  # override and the in-tree jaegertracing/all-in-one sidecar accepts
  # OTLP/gRPC on :4317.
  observability:
    otel_enabled: false # REQUIRED: enable OTLP/gRPC exporter
    otel_endpoint: "" # REQUIRED ("" permitted when otel_enabled=false)
    otel_service_name: "smackerel-core" # REQUIRED: OTel resource service.name
  # Spec 064 SCOPE-03 — open-ended knowledge agent SST. Ships disabled
  # by default so empty api_key and empty allowlist resolve without
  # tripping the fail-loud Validate() chain; operator opts in by
  # flipping `enabled: true` and populating provider/budgets/allowlist.
  # NO defaults (Gate G028, smackerel-no-defaults): every key is
  # REQUIRED at the generator boundary even when disabled.
  open_knowledge:
    enabled: true # REQUIRED: strict bool ("true"|"false"); reject "1"/"0"
    provider: "searxng" # REQUIRED: "searxng" | "brave" | "tavily"
    provider_endpoint: "http://searxng:8080" # REQUIRED ("" permitted when enabled=false)
    provider_api_key: "" # REQUIRED ("" allowed for searxng; brave/tavily must be non-empty when enabled)
    llm_model_id: "gemma3:4b" # REQUIRED ("" permitted when enabled=false). Spec 064 SCOPE-17 — quality-first dev default. ~4GB resident, sound JSON-schema following + tool-use behavior. First call cold-loads ~30-60s; subsequent calls are fast. Used for the GATHER (tool-calling) turns; the forced-final SYNTHESIS turn uses synthesis_model_id below.
    synthesis_model_id: "gemma3:4b" # REQUIRED ("" permitted when enabled=false). Spec 087 — model for the tools-stripped forced-final SYNTHESIS turn (and its retries). Dev default == llm_model_id (no effective split; dev has no Ollama daemon and gemma3:4b cannot synthesize the comparison class either, so dev is not the proof environment). Home-lab override (params.yaml model_selection.assistant_open_knowledge_synthesis_model_id, the effective last-wins value) = qwen3:30b-a3b (the operator-optimized standing synthesis default per 2026-06-21, superseding the interim gpt-oss:20b and spec 089's deepseek-r1:32b; 20480 MiB, co-resident with gemma4:26b gather (18432) = 38912 MiB inside the 49152 MiB / 48G home-lab envelope; the standing-default co-residence guard in validateModelEnvelopes enforces this fail-loud).
    switchable_models: [ "gemma3:4b" ] # REQUIRED non-empty when enabled. Spec 088 — the allowlist of models /ask may be runtime-switched TO on the SYNTHESIS turn (per-request --model= / API model). Dev = [gemma3:4b] (== baseline synthesis; switching to it is a no-op but keeps the path testable; dev has no Ollama daemon). Each entry MUST have a model_memory_profiles entry AND co-resident-fit the env ollama envelope when loaded alongside llm_model_id (gather) — validated fail-loud in internal/config/config.go::validateModelEnvelopes (G028 / FR-10). Home-lab override (params.yaml model_selection.assistant_open_knowledge_switchable_models) sets the real operator-selected synthesis-switch set; the standing synthesis default is qwen3:30b-a3b (per 2026-06-21), consistent with synthesis_model_id above (gpt-oss:20b was the superseded interim). NEVER a silent default.
    tool_capable_gather_models: [ "gemma3:4b" ] # REQUIRED non-empty when enabled. Spec 089 — the allowlist of models the GATHER (tool-calling) turn may be runtime-switched TO (--gather-model= / API gather_model). Each MUST be tool-calling-capable on Ollama (gemma3:4b errors "does not support tools" under tools=[], but it IS the dev baseline gather and dev has no daemon, so dev = [gemma3:4b] == llm_model_id is a testable no-op; the home-lab override sets the real tool-capable set [gemma4:26b]). The baseline llm_model_id MUST be a member (the no-override gather path always passes). Each entry MUST have a model_memory_profiles entry — validated fail-loud in internal/config/config.go::validateModelEnvelopes (G028 / FR-8). NEVER a silent default.
    max_iterations: 6 # REQUIRED: > 0 when enabled. Spec 084 — raised 4->6 = 5 tool-calling turns + 1 forced-synthesis turn for multi-hop reasoning (comparison/why/recommend questions need evidence on every side before answering; the agent strips tools on the last iteration to force a text answer). Model matrix unchanged (gemma4:26b home-lab / gemma3:4b dev).
    synthesis_retry_budget: 1 # REQUIRED: >= 0 when enabled. Spec 087 — number of stronger-prompt SYNTHESIS retries when the forced-final synthesis turn comes back empty/ungrounded, BEFORE the honest snippet salvage fires. 1 = one escalated "you already analyzed this; WRITE the verdict now, no <think>, no preamble" retry (rescues deepseek-r1's "thinks but does not conclude" failure mode). 0 = no retry (the exact spec-084 salvage timing). NOT a hidden default: 0 is an explicit, documented operator choice. Raising this raises the WriteTimeout worst case (cmd/core/main.go: (max_iterations + synthesis_retry_budget) * llm_timeout_ms).
    per_query_token_budget: 128000 # REQUIRED: > 0 when enabled. Spec 084 — raised 64000->128000: web_search snippets are re-added to context each iteration so cumulative tokens grow ~quadratically with iteration count; 4->6 iterations is ~2.25x, so the 6th synthesis turn needs headroom to avoid a premature cap_tokens refusal. 128000 = 50% of gemma4:26b ctx (262144); the production CostFn is zero-cost (local Ollama + searxng) so this budget is a pure safety guardrail.
    per_query_usd_budget: 0.05 # REQUIRED: > 0 when enabled
    # BUG-064-001 — these MUST be > 0 when enabled. The open-knowledge agent's
    # per-user-monthly USD pre-flight gate
    # (internal/assistant/openknowledge/agent/agent.go: PerUserMonthlyUSDRemaining
    # <= 0) refuses EVERY query before any LLM/tool call when the per-user budget
    # is 0. The production CostFn is zero-cost (local Ollama + local searxng;
    # cmd/core/wiring_assistant_openknowledge.go), so these ceilings never bind
    # for the default self-hosted deployment — they are real guardrails only if a
    # paid provider + a real CostFn is later wired. To DISABLE the capability use
    # `enabled: false`, NOT a 0 budget.
    monthly_budget_usd: 100 # REQUIRED: > 0 when enabled (global monthly USD ceiling)
    per_user_monthly_budget_usd: 25 # REQUIRED: > 0 when enabled (per-user monthly USD ceiling)
    tool_allowlist: [ "internal_retrieval", "web_search", "unit_convert", "calculator" ] # REQUIRED: non-empty when enabled (deny-by-default per SCOPE-02); v1 set per spec 064 policySnapshot
    web_snippet_cache_enabled: false # REQUIRED: strict bool
    # Spec 064 SCOPE-12 — per-LLM-roundtrip timeout (ms) for the
    # open-knowledge agent's calls to the ML sidecar /llm/chat
    # endpoint. The agent makes up to max_iterations roundtrips; this
    # caps each one independently. NO default (Gate G028): must be > 0
    # when enabled.
    llm_timeout_ms: 600000 # REQUIRED: > 0 when enabled. Spec 064 SCOPE-17 — gemma3:4b on CPU takes 2-4 min per turn; 10min cap accommodates worst-case cold load.
    # Spec 064 SCOPE-15 — additional outbound hosts the open-knowledge
    # subsystem may reach beyond `provider_endpoint` (which is always
    # implicitly allowed). Each entry MUST be a bare host (no scheme,
    # path, port, or userinfo). Empty list = provider endpoint only
    # (deny-by-default per G028). Wildcards NOT supported in v1 —
    # PKT-020-A asks spec 020 to layer wildcard support + a
    # network-layer egress firewall on top of this application-layer
    # gate.
    allowed_egress_hosts: [] # REQUIRED: explicit empty list
    # Spec 064 SCOPE-16 — web-provider circuit breaker. Wraps the
    # configured WebSearchProvider; once `failure_threshold`
    # consecutive countable provider failures (transport unreach or
    # quota exceeded) occur, the breaker trips Open and
    # short-circuits subsequent calls with ErrCircuitOpen until
    # `half_open_after_seconds` elapses. Then ONE probe is allowed;
    # success returns to Closed, failure rearms Open. NO defaults
    # (Gate G028): all three keys REQUIRED at the generator
    # boundary; > 0 when enabled. PKT-022-A requests spec 022 to
    # review whether these thresholds match the operational
    # resilience playbook.
    circuit_breaker:
      failure_threshold: 5 # REQUIRED: consecutive failures that trip breaker; > 0 when enabled
      open_window_seconds: 60 # REQUIRED: documented Open window; > 0 when enabled
      half_open_after_seconds: 30 # REQUIRED: elapsed time before HalfOpen probe; > 0 when enabled
    # Spec 076 SCOPE-1 — cite-back verifier enforcement gate
    # (SCN-076-F02 foundation key). "shadow" records mismatches
    # without flipping the answer; "enforce" flips to refusal-with-
    # capture on any mismatch. REQUIRED regardless of enabled state
    # (no defaults — Gate G028).
    citeback:
      enforcement_mode: "shadow" # REQUIRED: "shadow"|"enforce"
    # Spec 064 SCOPE-07 — self-hosted SearxNG container shape. Off by default;
    # per-env `environments.<env>.searxng_enabled` flips the `searxng` compose
    # profile. The test env auto-enables this so the integration leg runs
    # `TestSearxNGIntegration_Smoke` against a real container. No defaults
    # (Gate G028 / smackerel-no-defaults); the container_port/image/secret_key
    # are REQUIRED even when no environment enables the profile.
    searxng:
      image: "searxng/searxng:2026.5.30-bd863f16b" # REQUIRED: pinned upstream tag (bump deliberately)
      container_port: 8080 # REQUIRED: SearxNG default listen port inside the container
      secret_key: "smackerel-searxng-dev-test-only-not-a-real-secret" # REQUIRED: non-empty; entrypoint substitutes into settings.yml. Dev/test only — operators MUST override before any real deployment
      base_url: "http://localhost/" # REQUIRED: SearxNG base_url; placeholder fine for in-cluster JSON API use
  # Spec 068 SCOPE-1 — Structured Intent Compiler. SST zero-defaults
  # (Gate G028 / smackerel-no-defaults): EVERY key REQUIRED at the
  # generator boundary; missing values fail loud at startup. Ships
  # `enabled: false` in this scope because the facade does not yet
  # invoke the compiler in the routing path — Scope 2 wires that.
  # When enabled=true the compiler calls the ML sidecar
  # POST /assistant/intent/compile and refuses to route raw text on
  # schema failure (spec.md Hard Constraints 2, 4, 5).
  intent_compiler:
    enabled: false # REQUIRED: strict bool; Scope 2 flips this to true alongside facade insertion
    model_role: "assistant_intent_compiler" # REQUIRED: ML bridge model role used for compilation
    prompt_contract_version: "intent-compiler-v1" # REQUIRED: prompt contract version the sidecar must honor
    schema_version: "v1" # REQUIRED: CompiledIntent schema version the Go side accepts
    timeout_ms: 5000 # REQUIRED: per-compile request deadline (Go duration in ms)
    confidence_floor: 0.6 # REQUIRED: scenario-hint confidence floor; below this, similarity ranking is allowed
    max_context_turns: 8 # REQUIRED: bounded conversation window passed to the compiler
    max_output_bytes: 16384 # REQUIRED: cap on sidecar response body (defense against runaway LLM output)
    retry_budget: 1 # REQUIRED: schema-validation retries before declaring schema_invalid
  # Spec 071 SCOPE-01 — IntentTrace observability surface. SST
  # zero-defaults (Gate G028 / smackerel-no-defaults). Every key
  # REQUIRED at the generator boundary; missing values fail loud at
  # startup. Scope 1 ships the contract + recorder seam; Scope 2 wires
  # deterministic sampling, redaction, and the retention sweep against
  # these values.
  intent_trace:
    sampling_ratio: 1.0 # REQUIRED: float in [0,1]; 1.0 = every compiled turn writes a full trace
    retention_days: 14 # REQUIRED: TTL in days for trace rows; >= 1
    export_targets: "structured_log,otel,prometheus" # REQUIRED: non-empty comma list; vocabulary = structured_log|otel|prometheus
    replay_enabled: true # REQUIRED: strict bool; gates Scope 3 replay CLI
    retention_sweep_interval: 1h # REQUIRED: Go duration > 0; Scope 2 cadence for TTL sweep
  # Spec 076 SCOPE-1 — assistant.annotation.classifier.* foundation
  # SST keys (SCN-076-F02). Consumed by the spec 076 SCOPE-4
  # annotation cut-over. NO defaults (Gate G028); every key REQUIRED
  # at the generator boundary and fail-loud at startup.
  annotation:
    classifier:
      confidence_floor: 0.6 # REQUIRED: float in [0,1]; below this routes to spec 061 disambiguation
      warm_cache_enabled: true # REQUIRED: strict bool ("true"|"false")
  # Spec 074 SCOPE-1 — Capture-as-Fallback cross-cutting policy SST.
  # NO defaults (Gate G028, smackerel-no-defaults): every key REQUIRED
  # at the generator boundary and fail-loud at startup. There is no
  # `disable_capture_as_fallback` key by design — capture-as-fallback
  # is inviolable for eligible turns (spec 074 Hard Constraint #2).
  capture_as_fallback:
    dedup_window: 24h # REQUIRED: positive Go duration; per-user same-normalized-text dedup bucket
    clarify_abandon_timeout: 10m # REQUIRED: positive Go duration; clarification turn abandonment TTL (Scope 4 consumes)
    normalization_policy: "nfkc_casefold_ws_v1" # REQUIRED: closed vocabulary; v1 = NFKC + casefold + whitespace collapse
    dedup_hash_key: "smackerel-capture-fallback-dev-hmac-not-for-prod" # REQUIRED: non-empty secret; operators MUST override before any real deployment
    retention_audit_days: 90 # REQUIRED: integer >= 1; metadata audit retention horizon for artifact_capture_policy rows
  # Spec 065 SCOPE-1 — Generic micro-tools (capability foundation).
  # SST zero-defaults (Gate G028 / smackerel-no-defaults): EVERY key
  # REQUIRED at the generator boundary; missing values fail loud at
  # startup. The four tools (location_normalize, unit_convert,
  # calculator, entity_resolve) share the spec 037 agent.RegisterTool
  # registry — there is NO second registry. SCOPE-1 lands only the
  # foundation (envelope, schema validation, config block, fail-loud
  # loader); SCOPE-2..4 register concrete handlers and flip
  # enabled=true. Provider selectors are REQUIRED string values even
  # when enabled=false (every key must resolve explicitly).
  tools:
    location_normalize:
      enabled: false # REQUIRED: strict bool ("true"|"false"); SCOPE-2 flips this to true
      provider: "open-meteo" # REQUIRED: canonical-location backend selector ("open-meteo" supported in v1)
      timeout_ms: 2000 # REQUIRED: per-call provider deadline; > 0
      cache_ttl_seconds: 600 # REQUIRED: tool-local LRU TTL; > 0
      cache_max_entries: 512 # REQUIRED: tool-local LRU upper bound; > 0
    unit_convert:
      enabled: false # REQUIRED: strict bool; SCOPE-3 flips this to true
      catalog_version: "v1" # REQUIRED: deterministic conversion catalog version stamped into source attribution
    calculator:
      enabled: false # REQUIRED: strict bool; SCOPE-3 flips this to true
      max_expression_chars: 256 # REQUIRED: parser input cap; > 0
    entity_resolve:
      enabled: false # REQUIRED: strict bool; SCOPE-4 flips this to true
      confidence_floor: 0.7 # REQUIRED: ambiguity floor in [0,1]
      timeout_ms: 1500 # REQUIRED: per-call graph/vector deadline; > 0

# Spec 073 SCOPE-1b — Web assistant frontend SST. Every key REQUIRED at
# the generator boundary (Gate G028 / smackerel-no-defaults). Missing
# or empty values fail loud at startup with [F073-SST-MISSING].
#   - enabled: gates the web /assistant route.
#   - backend_base_url: explicit literal "same-origin" (the canonical
#     same-origin marker; the web client posts to /api/assistant/turn
#     on the same origin it was served from) OR an explicit absolute
#     http(s) URL. There is no implicit default.
#   - schema_version: pinned to spec 069 "v1"; any other value is
#     rejected by WebAssistantConfig.Validate() at startup.
web:
  assistant:
    enabled: true
    backend_base_url: "same-origin"
    schema_version: "v1"

# Spec 073 SCOPE-1b — Shared mobile assistant frontend SST. Every key
# REQUIRED. Missing/empty values fail loud at startup with
# [F073-SST-MISSING]; cross-field violations with [F073-SST-INVALID].
#   - enabled: gates the shared Flutter mobile build.
#   - backend_base_url: explicit absolute https URL (no http, no
#     same-origin — mobile clients always cross origins). Operators
#     override with their deploy adapter's public ingress URL.
#   - schema_version: pinned to spec 069 "v1".
#   - platforms: comma-separated set. MUST contain both "ios" and
#     "android"; any other vocabulary is rejected.
#   - auth_mode: explicit auth-owner-approved mode identifier (closed
#     string; the auth surface owns the vocabulary).
mobile:
  assistant:
    enabled: true
    backend_base_url: "https://assistant.invalid.example/"
    schema_version: "v1"
    platforms: "ios,android"
    auth_mode: "bearer_token_per_user"

# Spec 075 SCOPE-1 — Legacy-Surface Deprecation Telemetry & User Comms.
# SST zero-defaults (Gate G028 / smackerel-no-defaults): every key REQUIRED
# at the generator boundary; missing values fail loud at startup. The
# spec 066 retired-command catalog owns the actual command list; this
# block governs window state, dedup ledger keying, residual-usage
# thresholds, post-window observation gate, and notice/closed-response
# copy.
legacy_retirement:
  window_id: "2026-05-retirement" # REQUIRED: stable non-empty id keying the dedup ledger and runtime pause state
  window_state: "open" # REQUIRED: "open" or "closed" ("paused" is runtime state, never SST)
  rollback_threshold_percent_active_users: 5.0 # REQUIRED: > 0 and <= 100; recommended explicit start 5%
  rollback_threshold_days_consecutive: 3 # REQUIRED: >= 1; recommended explicit start 3
  post_window_observation_days: 14 # REQUIRED: >= 1; recommended explicit start 14
  active_user_window_days: 7 # REQUIRED: >= 1; denominator window for active-user percent calculation
  user_bucket_hmac_key: "smackerel-legacy-retirement-dev-hmac-not-for-prod" # REQUIRED: non-empty secret; operators MUST override before any real deployment
  # Notice copy keyed by retired command token. Map MUST cover every entry
  # in the spec 066 retired-command catalog at startup; missing entries
  # fail-loud at validation time. Each value is the short addendum rendered
  # alongside the primary NL response during open window. Keys are unquoted
  # so the generator-side yaml_get_json emits them as plain JSON string
  # keys (quoting the YAML key would round-trip into literal-quote-in-key
  # because the simplistic yaml_get_json parser does not strip key quotes).
  notice_copy_per_command:
    /weather: "I now answer weather questions in plain English. For example: weather in Barcelona tomorrow."
    /remind: "I now create reminders from plain English. For example: remind me tomorrow at 9 to call the dentist."
  # Canonical unknown-command response after window_state=closed. Map keyed
  # by retired command token. Each value is the full body returned with no
  # legacy handler invocation. Keys unquoted for the same reason as above.
  post_window_unknown_response_copy:
    /weather: "I do not use /weather anymore. Ask in plain English instead, for example: weather in Barcelona tomorrow."
    /remind: "I do not use /remind anymore. Ask in plain English instead, for example: remind me tomorrow at 9 to call the dentist."
  # Spec 076 SCOPE-6a — runtime wiring SST keys.
  # threshold_evaluator_interval_seconds drives the periodic legacy-residual
  # breach evaluator; observation_cron_expr drives the post-window observation
  # cron that emits the zero-invocation gate evidence row;
  # rollback_threshold_daily_invocations is the per-day flat-count safety gate
  # consulted alongside the percent-of-active-users threshold (a day counts as
  # breaching when EITHER gate fires). All three are REQUIRED; missing values
  # abort startup via the canonical NO-DEFAULTS error.
  threshold_evaluator_interval_seconds: 300 # REQUIRED: >= 1; recommended 300s (5 min) in dev/test, tune for production.
  observation_cron_expr: "0 4 * * *" # REQUIRED: non-empty cron expression; default daily at 04:00 UTC.
  rollback_threshold_daily_invocations: 100 # REQUIRED: >= 1; per-day invocation count gate (additive to percent gate).

agent:
  # Spec 037 — LLM Scenario Agent & Tool Registry. SST zero-defaults: every key
  # is REQUIRED. The Go core and Python ML sidecar both refuse to start if any
  # value is missing. There are no Go fallbacks. Empty-string values are
  # explicitly allowed only where noted (fallback_scenario_id, embedding_model).
  scenario_dir: "config/prompt_contracts" # REQUIRED: directory containing scenario YAMLs
  scenario_glob: "*.yaml" # REQUIRED: glob applied beneath scenario_dir
  hot_reload: true # REQUIRED: SIGHUP triggers a rescan
  routing:
    confidence_floor: 0.65 # REQUIRED: minimum cosine similarity to select a scenario
    consider_top_n: 5 # REQUIRED: number of candidates retained for trace
    # Spec 064 SCOPE-12 — flipped from "" to "open_knowledge" so below-
    # floor decisions land on the open-ended knowledge agent (which owns
    # its own iteration cap, budget enforcement, and cite-back
    # verification) instead of capture-as-fallback. Setting back to ""
    # disables the open-knowledge fallback (below-floor → unknown-intent).
    fallback_scenario_id: "open_knowledge" # REQUIRED ("" = no fallback; below-floor → unknown-intent)
    embedding_model: "" # REQUIRED ("" = inherit runtime.embedding_model)
    # BUG-061-004 — assistant NL routing embedder. "sidecar" uses HTTP
    # POST /embed on the ML sidecar (production); "noop" returns a fixed
    # unit vector for every input (test/dev only — guarantees alphabetical
    # tie-break and is rejected by the validator outside dev/test envs).
    embedder_mode: "sidecar" # REQUIRED: "sidecar" | "noop"
    embed_timeout_ms: 30000 # REQUIRED: per-call timeout for the sidecar /embed roundtrip. Spec 064 SCOPE-17 raised from 500ms to accommodate cold sentence-transformer load on first startup; subsequent calls return in <50ms.
  trace:
    retention_days: 30 # REQUIRED: days to retain agent_traces rows
    record_llm_messages: false # REQUIRED: capture full LLM transcript (true in dev/test only)
    redact_marker: "***" # REQUIRED: replacement token for x-redact fields
  defaults:
    # Failsafe ceilings — NOT Go fallbacks. A scenario MUST declare its own
    # limits; these caps clamp scenario values that exceed them at load time.
    max_loop_iterations_ceiling: 32 # REQUIRED
    timeout_ms_ceiling: 120000 # REQUIRED
    schema_retry_budget_ceiling: 5 # REQUIRED
    per_tool_timeout_ms_ceiling: 30000 # REQUIRED
  provider_routing:
    # Maps scenario.model_preference → ml/app/agent.py provider/model. SST.
    # Spec 045 BUG-045-001 (resolved 2026-05-16) — defaults below fit the
    # 8G ollama envelope; operators with larger envelopes may opt up.
    default:
      provider: "ollama"
      model: "gemma3:4b"
    reasoning:
      provider: "ollama"
      model: "deepseek-r1:7b"
    fast:
      provider: "ollama"
      model: "gemma3:4b"
    vision:
      provider: "ollama"
      model: "gemma3:4b"
    ocr:
      provider: "ollama"
      model: "deepseek-ocr:3b"

notification_intelligence:
  enabled: true
  persistence_threshold: 2
  escalation_severity: "high"
  low_confidence_threshold: 0.55
  max_retries: 2

notification_outputs:
  channels: [ "dashboard" ]

notification_sources:
  ntfy:
    instances:
    - source_instance_id: "ntfy-local-webhook"
      enabled: true
      source_form: "webhook"
      transport_mode: "webhook"
      endpoint_url: "http://smackerel-core:8080/api/notifications/sources/ntfy-local-webhook/ntfy/webhook"
      endpoint_ref_name: "NTFY_LOCAL_WEBHOOK_ENDPOINT_URL"
      topics: [ "home-lab-alerts" ]
      auth_mode: "none"
      secret_ref_names: []
      default_domain: "ops"
      retry_budget: 3
      initial_delay_seconds: 1
      max_delay_seconds: 5
      keepalive_timeout_seconds: 30
      lag_degraded_after_seconds: 60
      lag_disconnected_after_seconds: 300
      dead_letter_retry_budget: 2
      max_payload_bytes: 4096
      pressure_threshold_count: 2
      display_name: "ntfy local webhook"
      endpoint_label: "SST-managed ntfy webhook endpoint"
      config_hash: "sha256:ntfy-local-webhook-v1"

drive:
  enabled: false
  classification:
    enabled: true
    confidence_threshold: 0.7 # min confidence to apply classification automatically
    low_confidence_action: "pause"
    # Spec 038 Scope 6 — Policy And Confirmation.
    # confirm_threshold is the policy floor: when classifier confidence is
    # below this value the Save Service MUST persist a drive_confirmation
    # row and refuse to commit until /api/v1/drive/confirmations/{id}
    # resolves. Distinct from confidence_threshold so operators can set
    # auto-classify higher than the absolute confirmation floor.
    confirm_threshold: 0.6
    # confirmation_ttl_seconds bounds how long a pending confirmation
    # stays actionable before the resolver marks it 'expired'.
    confirmation_ttl_seconds: 86400
  scan:
    parallelism: 4
    batch_size: 100
  monitor:
    poll_interval_seconds: 300
    cursor_invalidation_rescan_max_files: 5000
  policy:
    sensitivity_default: "internal"
    sensitivity_thresholds:
      public: 0.95
      internal: 0.80
      sensitive: 0.60
      secret: 0.50
  telegram:
    max_inline_size_bytes: 5242880
    max_link_files_per_reply: 10
  limits:
    max_file_size_bytes: 104857600
  io_limits:
    # MIT-038-S-004 — defense-in-depth byte caps wrapping io.ReadAll on
    # provider HTTP boundaries in internal/drive/google. Provider URLs are
    # SST-trusted (drive.providers.google.api_base_url / oauth_base_url),
    # but absent caps leave a defense-in-depth gap if a fixture or
    # compromised upstream returned a multi-GB body. The bytes-processing
    # path in internal/drive/extract/service.go:255 separately enforces
    # max_file_size_bytes; these caps wrap the remaining JSON metadata,
    # binary download, and OAuth token-exchange reads.
    #
    #   provider_response_max_bytes — JSON metadata responses (Drive list,
    #     about, changes, file-metadata error bodies, EnsureFolder, PutFile
    #     response). 10 MiB is well above the largest expected JSON page.
    #   provider_binary_max_bytes   — binary file content read in PutFile
    #     (body.Reader is the uploaded content). Set to 500 MiB so it sits
    #     comfortably above drive.limits.max_file_size_bytes (100 MiB),
    #     which is the primary upstream enforcement; this cap is a backstop.
    #   oauth_response_max_bytes    — OAuth token-exchange response. Token
    #     responses are tiny JSON; 64 KiB is generous defense-in-depth.
    provider_response_max_bytes: 10485760 # 10 MiB
    provider_binary_max_bytes: 524288000 # 500 MiB
    oauth_response_max_bytes: 65536 # 64 KiB
  rate_limits:
    requests_per_minute: 600
  save:
    # Spec 038 Scope 5 — Save Rules and Write-Back.
    # provider_url_prefix is prepended to every drive_save_requests.provider_url
    # generated by the Save Service. Operators MUST point this at the public
    # base URL of the destination Drive provider so users in the digest /
    # Telegram reply / PWA Screen 7 can click straight to the file. Empty
    # values are accepted in dev (the Service composes a relative path) but
    # the framework-validate gate flags empty values for production exports.
    provider_url_prefix: "https://drive.google.com/file/d"
  providers:
    google:
      oauth_client_id: ""
      oauth_client_secret: ""
      oauth_redirect_url: "http://127.0.0.1:40001/v1/connectors/drive/oauth/callback"
      oauth_base_url: "https://accounts.google.com"
      api_base_url: "https://www.googleapis.com"
      scope_defaults: [ "https://www.googleapis.com/auth/drive.file", "https://www.googleapis.com/auth/drive.readonly" ]
      # REQUIRED (BUG-038-001): bounds the time the Google provider HTTP client
      # waits for response headers + connection establishment. Catches a
      # provider endpoint that accepts a connection but never responds (the
      # hang http.DefaultClient left unbounded). Does NOT cap whole-request
      # duration, so large-file downloads (up to limits.max_file_size_bytes)
      # are not aborted mid-body.
      http_response_header_timeout_seconds: 30

photos:
  enabled: true
  scan:
    parallelism: 2
    batch_size: 50
    max_file_size_bytes: 52428800
  monitor:
    cursor_invalidation_rescan_max_items: 2500
  io_limits:
    # Defense-in-depth byte caps wrapping io.ReadAll on HTTP boundaries
    # (MIT-040-S-006). Provider metadata = JSON responses; photo binary =
    # uploaded image bytes; telegram response = bytes downloaded via the
    # Telegram bot file API.
    provider_metadata_max_bytes: 10485760 # 10 MiB
    photo_binary_max_bytes: 104857600 # 100 MiB
    telegram_response_max_bytes: 26214400 # 25 MiB
  policy:
    lifecycle_confirmation_threshold: 0.8
    duplicate_confirmation_threshold: 0.92
    routing_confidence_threshold: 0.75
    sensitivity_reveal_ttl_seconds: 600
    archive_action_token_ttl_seconds: 86400
    delete_action_token_ttl_seconds: 86400
    telegram_max_inline_size_bytes: 8388608
    # Spec 040 chaos C-006 — bound action plan scope size at mint time
    # to prevent very-large-token resource amplification (token payload
    # grows linearly with scope, and confirm-time loops scale with
    # count). Applies to scope.photo_ids; removal_ids share the same cap.
    actions_max_scope_size: 50
  intelligence:
    # Spec 045 BUG-045-001 (resolved 2026-05-16) — defaults below fit the
    # 8G ollama envelope; operators with larger envelopes may opt up.
    classify_model: gemma3:4b
    embed_model: nomic-embed-text
    sensitivity_model: gemma3:4b
    aesthetic_model: gemma3:4b
    ocr_model: deepseek-ocr:3b
    max_inflight_per_connector: 2
  providers:
    immich:
      enabled: false
      base_url: ""
      api_key: ""
      poll_interval_seconds: 300
      supported_api_versions: [ "v1" ]
    photoprism:
      enabled: false
      base_url: ""
      api_token: ""
      poll_interval_seconds: 600
      supported_api_versions: [ "v1" ]

services:
  core:
    container_port: 8080
    shutdown_timeout_s: 25
  ml:
    container_port: 8081
    # Spec 067 BUG-067-001 — ML sidecar log level (ml-owned SST key; distinct
    # from the core runtime.log_level). Emitted as ML_LOG_LEVEL into every
    # generated env + the deploy bundle by scripts/commands/config.sh, and read
    # fail-loud by ml/app/main.py::_check_required_config (no literal default).
    # Allowed values: debug | info | warn | error.
    log_level: info
    health_cache_ttl_s: 30
    readiness_timeout_s: 60
    processing_degraded_fallback_enabled: false
    # Spec 050 FR-050-001/002/003/005 — ML sidecar health/worker isolation.
    # All three values are required (fail-loud SST). The Python ML sidecar
    # reads them via os.environ[...] in ml/app/main.py::_check_required_config
    # and configures the dedicated embedding ThreadPoolExecutor in
    # ml/app/embedder.py. Health request handling (FastAPI /health) is on
    # the async event loop and never enters the embedding executor, so a
    # saturated worker pool cannot starve health probes (FR-050-001).
    #
    #   embedding_workers — max concurrent CPU-bound embed workers. This is
    #     the size of the dedicated ThreadPoolExecutor that runs
    #     sentence-transformer encode() calls. MUST be a positive integer
    #     and SHOULD be ≤ deploy_resources.smackerel_ml.cpus to avoid
    #     CPU oversubscription. Typical value: 2 (matches default 2-vCPU
    #     envelope for smackerel_ml). Bounded concurrency satisfies
    #     FR-050-002.
    #   embedding_queue_max — max in-flight embedding requests (active +
    #     queued) before the sidecar starts rejecting with a 4xx-shaped
    #     backpressure error. Provides the upstream signal the search
    #     fallback (internal/api/search.go textSearch fallback) consumes
    #     when ML is degraded. MUST be ≥ embedding_workers.
    #   health_latency_sla_ms — documented SLA budget for /health response
    #     latency under embedding load. Used by docs/Operations.md and the
    #     adversarial regression in ml/tests/test_embedder.py to assert
    #     /health stays responsive (FR-050-003). MUST be a positive
    #     integer (milliseconds).
    embedding_workers: 2
    embedding_queue_max: 3
    health_latency_sla_ms: 500
    # Spec 045 FR-045-002 — model memory envelope. Each entry maps an Ollama
    # model name to its RUN-TIME memory requirement in MiB (matching what
    # `ollama ps` reports as resident size when the model is loaded). The Go
    # core Validate() chain rejects any configured model whose profile
    # exceeds ML_MEMORY_LIMIT (deploy_resources.smackerel_ml.memory).
    #
    # Operator MUST add an entry here for every model name referenced by
    # llm.ollama_model, llm.ollama_vision_model, llm.ollama_ocr_model,
    # llm.ollama_reasoning_model, llm.ollama_fast_model,
    # runtime.embedding_model, agent.provider_routing.*.model,
    # photos.intelligence.*_model, and infrastructure.ollama.test.model.
    # A missing entry for any used model fails Validate() loudly so the
    # operator can size the envelope before runtime start.
    #
    # Memory figures derived from ollama public model card resident-size
    # measurements at default quantization (q4_K_M for gemma/gpt-oss,
    # q4_K_S for deepseek). They are CEILINGS for envelope sizing — actual
    # resident size depends on context length and concurrent requests.
    #
    # Format: list of {model, memory_mib} objects. List form (not a map) is
    # required because the SST flatten/JSON pipeline cannot parse YAML map
    # keys that contain ":" (e.g. "gemma4:26b") — they would be split on
    # the first ":" and corrupt both key and value. The list-of-objects
    # form is the same shape used by expenses.categories elsewhere in this
    # file.
    model_memory_profiles:
    - model: "gemma4:26b"
      memory_mib: 18432 # 18 GiB MoE 26B at q4 + 256K context buffer (operator opt-up; requires raising deploy_resources.ollama.memory first)
    - model: "gemma3:4b"
      memory_mib: 4096 # 4.0 GiB multimodal (text+vision) at q4_K_M; 3.3 GiB download + ~25% context buffer at 4K context. Source: https://ollama.com/library/gemma3 (4b tag). Spec 045 BUG-045-001 default; ceiling is conservative published value; live `ollama ps` verification deferred to operator-host run (dev sandbox has no ollama daemon).
    - model: "llama3.1:8b"
      memory_mib: 6144 # 6 GiB at q4_K_M; 4.7 GiB download + context buffer. Tool-capable per Ollama tools support list. Used as substrate fast/default on home-lab — fastest tool-calling Ollama model that emits real OpenAI tool_calls (gemma3:4b errors with "does not support tools"; qwen2.5:7b returns no tool_calls).
    - model: "deepseek-ocr:3b"
      memory_mib: 2560 # 2.5 GiB
    - model: "deepseek-r1:32b"
      memory_mib: 22528 # 22 GiB at q4 (operator opt-up; requires raising deploy_resources.ollama.memory first)
    - model: "deepseek-r1:7b"
      memory_mib: 4864 # 4.75 GiB reasoning (distilled-from-Qwen-2.5) at q4_K_M; 4.7 GiB download + ~5% context buffer at 4K context. Source: https://ollama.com/library/deepseek-r1 (7b tag). Spec 045 BUG-045-001 default; ceiling is conservative published value; live `ollama ps` verification deferred to operator-host run (dev sandbox has no ollama daemon).
    - model: "gpt-oss:20b"
      memory_mib: 14336 # 14 GiB at q4 (operator opt-up; requires raising deploy_resources.ollama.memory first)
    - model: "nomic-embed-text"
      memory_mib: 768 # 0.75 GiB embedding model
    - model: "qwen2.5:0.5b-instruct"
      memory_mib: 1024 # 1 GiB tiny test model
    - model: "qwen3:30b-a3b"
      memory_mib: 20480 # 20 GiB ceiling: 18 GB q4 weights (host `ollama list` 2026-06-21) + ~2 GiB context buffer. 30.5B MoE (3B active). Open-knowledge SYNTHESIS standing default on home-lab (operator 2026-06-21, superseding the interim gpt-oss:20b / spec 089's deepseek-r1:32b); co-resident with gemma4:26b gather (18432) = 38912 MiB inside the 49152 MiB / 48G envelope.

# Spec 045 FR-045-001 — deploy resource envelopes (CPU + memory) per service.
# Every value is required (fail-loud SST). The deploy adapter consumes these
# via env vars (SERVICE_CPU_LIMIT, SERVICE_MEMORY_LIMIT) substituted into
# deploy/compose.deploy.yml ${VAR:?...} placeholders. Hand-edited literals
# in compose are forbidden — see internal/deploy/compose_contract_test.go
# assertResourceContract().
#
# Memory string format follows compose conventions (e.g. "1G", "512M", "8G").
# CPU string format is decimal cores (e.g. "1.0", "0.5", "2.0").
deploy_resources:
  postgres:
    cpus: "1.0"
    memory: "1G"
  nats:
    cpus: "0.5"
    memory: "512M"
  smackerel_core:
    cpus: "2.0"
    memory: "1G"
  smackerel_ml:
    cpus: "2.0"
    memory: "3G"
  # Spec 045 BUG-045-001 (resolved 2026-05-16) — `8G` is the default ollama
  # envelope chosen so the default model choices (gemma3:4b + deepseek-r1:7b
  # + deepseek-ocr:3b) all fit on commodity hardware. Operators who want
  # gemma4:26b / deepseek-r1:32b / gpt-oss:20b MUST RAISE this envelope
  # FIRST (e.g. "16G" or "24G") in their deploy-overlay, THEN swap the
  # llm.* / agent.provider_routing.* / photos.intelligence.* model fields
  # above. See docs/Operations.md "Model Envelope Sizing" for the per-
  # service envelope contract and the dev / home-lab / production matrix.
  #
  # Per-environment opt-up (preferred): set
  #   environments.<env>.ollama_memory_limit: "20G"
  #   environments.<env>.llm_model: "gemma4:26b"
  #   environments.<env>.ollama_model: "gemma4:26b"
  #   environments.<env>.ollama_vision_model: "gemma4:26b"
  # The home-lab environment (lines below) already uses this pattern.
  ollama:
    cpus: "4.0"
    memory: "8G"
  # Spec 049 FR-049-005(c) — Prometheus runs hardened with explicit CPU
  # and memory envelopes. Profile-gated (monitoring); when the operator
  # enables `--profile monitoring`, the deploy adapter MUST emit
  # PROMETHEUS_CPU_LIMIT and PROMETHEUS_MEMORY_LIMIT into app.env or
  # compose aborts at substitution time (Gate G028).
  prometheus:
    cpus: "1.0"
    memory: "512M"
  # Spec 082 SCOPE-082-05 — SearxNG resource envelope. Previously the
  # searxng service hardcoded `memory: 256M` with NO cpus cap, drifting
  # from the spec-045 SST resource contract every other service follows.
  # Now SST-sourced + fail-loud (Gate G028); profile-gated (searxng).
  # When the operator enables `--profile searxng`, the deploy adapter MUST
  # emit SEARXNG_CPU_LIMIT and SEARXNG_MEMORY_LIMIT into app.env or compose
  # aborts at substitution time. memory preserves the prior 256M; cpus is
  # the new explicit cap (was unbounded).
  searxng:
    cpus: "1.0"
    memory: "256M"

# Spec 049 — Monitoring Stack SST (FR-049-001 / FR-049-003 / FR-049-005).
#
# All keys are required (fail-loud SST). The deploy adapter consumes them
# via PROMETHEUS_* env vars substituted into deploy/compose.deploy.yml
# ${VAR:?...} placeholders and into config/prometheus/prometheus.yml.tmpl
# at config-generate time. Hand-edited literals in either are forbidden —
# see internal/deploy/monitoring_*_contract_test.go.
#
# Prometheus runs behind a `monitoring` Compose profile (off by default).
# Enable in dev with `docker compose --profile monitoring up -d`. In
# production, the deploy adapter overlay sets the profile in its compose
# invocation.
monitoring:
  prometheus:
    # Pinned image tag (no `latest`, no fallback). Bumping requires a
    # design discussion + adversarial regression test re-run.
    image: "prom/prometheus:v2.55.1"
    # Internal container port for the Prometheus web UI / API. Matches
    # the upstream default.
    container_port: 9090
    # Scrape and evaluation intervals (seconds). 15s is the Prometheus
    # default and the common observability baseline.
    scrape_interval_seconds: 15
    evaluation_interval_seconds: 15
    # On-disk TSDB retention. 15 days is enough for daily-trend dashboards
    # plus weekly post-mortem queries without runaway disk usage on a
    # home-lab-class machine. Tune via SST without code changes.
    retention_days: 15

# Spec 048 — Backup and Restore Automation (FR-048-001 / FR-048-002 /
# FR-048-003).
#
# Smackerel owns the PRODUCT contract: which artifacts are produced, what
# retention policy applies, and how restore is verified. The deploy
# adapter owns SCHEDULING (systemd timer / cron) and DESTINATION (S3 /
# rclone / NFS — set by the adapter via ${BACKUP_DESTINATION_URL} in
# its own overlay; this repo MUST NOT name a real bucket or hostname).
#
# All keys are required (fail-loud SST). Missing values fail at
# `./smackerel.sh config generate` and `config.Load()` per Gate G028.
backup:
  # Host-side staging directory the script writes pg_dump artifacts to
  # before the deploy adapter ships them off-host. Relative paths resolve
  # against the repo root; the deploy adapter overlay should set an
  # absolute path under its own data partition.
  local_dir: "./backups"
  # Status file the script updates after every run. The Go core's
  # internal/backup.Watcher polls this file and republishes
  # `smackerel_backup_last_success_unixtime`, `smackerel_backup_size_bytes`,
  # and `smackerel_backup_runs_total{status}` for spec 049 alerting.
  status_file: "./backups/.backup-status.json"
  # FR-048-001 retention contract. 7 daily + 4 weekly is the product
  # default. Operators can adjust via SST; the script prunes anything
  # outside the resolved window after each successful run.
  retention_daily: 7
  retention_weekly: 4
  # How often the metrics watcher re-reads the status file. 60s is the
  # recommended default; lower values reduce the stale-metric window at
  # the cost of more file IO. The SmackerelBackupStale alert fires on a
  # multi-hour window so 60s is well within the contract.
  watcher_poll_seconds: 60

infrastructure:
  # Spec 096 SCOPE-06 — operator allowlist for the credential-mutating web
  # admin surface (/v1/admin/model-connections*). Each entry is a per-user
  # bearer SUBJECT (auth.UserIDFromContext / the spec-044 actor_user_id)
  # permitted to wire/test/enable/disable model-provider connections. EMPTY by
  # default (No Env-Specific Content): real operator ids are injected by the
  # deploy overlay, never committed here. Fail-loud (G028): an empty allowlist
  # while the admin surface is reachable (≥1 db-mode connection declared)
  # aborts startup in production; in dev/test the surface runs FAIL-CLOSED
  # (every request 401/403). The gate derives the actor from the bearer
  # subject — NEVER a request-body field.
  operator_user_ids: []
  # Spec 052 FR-052-001 — SST-owned secret-key manifest.
  # Keys listed here are NEVER inlined into bundles for targets in
  # production_class_targets below. Instead, the SST loader emits
  # __SECRET_PLACEHOLDER__<KEY>__ in app.env and the deploy adapter
  # substitutes the real value at apply time from a sops-encrypted
  # secrets file (knb/smackerel/secrets/<target>.enc.env).
  #
  # Mirror locations (drift detected by contract test):
  #   - Go: internal/config/secret_keys.go::SecretKeys()
  #   - Shell: scripts/commands/config.sh placeholder-emit block
  #
  # To add a new managed secret: (1) add to this list, (2) add to Go
  # mirror, (3) add to shell mirror, (4) ship a real value in
  # knb/smackerel/secrets/<target>.enc.env. The contract test catches
  # the gap if any of (1)/(2)/(3) is forgotten.
  secret_keys:
  - POSTGRES_PASSWORD
  - AUTH_SIGNING_ACTIVE_PRIVATE_KEY
  - AUTH_AT_REST_HASHING_KEY
  - AUTH_BOOTSTRAP_TOKEN
  - TELEGRAM_BOT_TOKEN
  # Spec 059 Scope 1 — Google Keep live-sync App Password. Bucket-2
  # secret read ONLY by ml/app/keep_bridge.py; the Go core never reads it
  # (sidecar boundary enforced at the application layer, see
  # internal/config/secret_keys_test.go::TestKeepAppPasswordReadOnlyFromSidecarNotCore).
  - KEEP_GOOGLE_APP_PASSWORD
  # Spec 097 — card-rewards Google Calendar OAuth credential (JSON:
  # client_id, client_secret, refresh_token, token_uri). Read by core's
  # card-rewards calendar write client only when card_rewards.calendar_sync
  # is true; never logged. Real value shipped via the knb deploy adapter at
  # knb/smackerel/secrets/<target>.enc.env.
  - CARD_REWARDS_GCAL_CREDENTIALS
  # Spec 091 — web self-registration invite token. OPTIONAL: empty ⇒
  # registration disabled at POST (fail-loud, never open signup). Read by
  # core's HandleWebRegister (POST /v1/web/register) only; compared in
  # constant time; never logged. Real value shipped via the knb deploy
  # adapter at knb/smackerel/secrets/<target>.enc.env.
  - WEB_REGISTRATION_INVITE_TOKEN
  # Spec 096 SCOPE-01 — multi-provider model-connection vault master key.
  # AES-256-GCM master key for the SCOPE-02 connvault credential store
  # (reversible, encrypted-at-rest provider secrets). REQUIRED iff a db-mode
  # hosted connection is declared (an Ollama-only deployment adds no new
  # secret); the Go core loads it fail-loud and never lets it out.
  # Reversible-credential class (like CARD_REWARDS_GCAL_CREDENTIALS), NOT an
  # argon2id verifier key. SCOPE-01 declares the manifest entry; the vault
  # load + rotation land in SCOPE-02. Real value shipped via the knb deploy
  # adapter at knb/smackerel/secrets/<target>.enc.env.
  - LLM_PROVIDER_SECRET_MASTER_KEY
  # When TARGET_ENV ∈ this list, the SST loader emits placeholders for
  # every key in secret_keys above. dev/test environments are NEVER in
  # this list (they keep inline values for local-dev convenience per
  # FR-052-011). Adding a new production target = explicit one-line
  # change here AND adapter follow-up in the knb repo.
  production_class_targets:
  - home-lab

  postgres:
    user: smackerel
    password: smackerel
    database: smackerel
    container_port: 5432
    max_conns: 10
    min_conns: 2
  nats:
    client_port: 4222
    monitor_port: 8222
    # Spec 046 FR-046-002 — NATS server payload and storage ceilings flow
    # from SST. scripts/commands/config.sh renders these into
    # config/generated/nats.conf so the broker enforces them at runtime.
    # Bytes-typed; tune for the deployment target's disk envelope.
    #   max_payload_bytes — single-message size cap (image/OCR payloads).
    #   max_file_store_bytes — JetStream file store ceiling on disk.
    #   max_mem_store_bytes — JetStream in-memory ceiling.
    # Missing or empty values fail loud via required_value at generate time.
    max_payload_bytes: 8388608 # 8 MiB
    max_file_store_bytes: 10737418240 # 10 GiB
    max_mem_store_bytes: 1073741824 # 1 GiB
    # Spec 046 FR-046-001 — ML sidecar reconnect contract. The Python
    # client reads these via NATS_MAX_RECONNECT_ATTEMPTS and
    # NATS_RECONNECT_TIME_WAIT_SECONDS in ml/app/nats_client.py. -1 means
    # reconnect forever; the contract is non-negotiable for always-on
    # deployment operation.
    client:
      reconnect_time_wait_seconds: 2
      max_reconnect_attempts: -1
    # Spec 081 FR-081-001 / FR-081-002 — Python sidecar consumer
    # contract (parity with Go spec 022 Operational Resilience). The
    # ML sidecar reads these via NATS_CONSUMER_MAX_DELIVER and
    # NATS_CONSUMER_ACK_WAIT_SECONDS in ml/app/nats_client.py and
    # threads ConsumerConfig(max_deliver=..., ack_wait=...) into every
    # pull_subscribe call. Missing/empty values fail loud at startup.
    consumer:
      max_deliver: 5
      ack_wait_seconds: 120
    # Spec 046 FR-046-003 — per-stream MaxBytes caps. Every JetStream
    # stream Smackerel creates MUST have a bounded MaxBytes; unbounded
    # streams are an explicit failure condition. The Go core reads this
    # JSON-shaped map via NATS_STREAM_MAX_BYTES_JSON and passes it into
    # internal/nats.Client.EnsureStreams which fails loud if a stream is
    # missing from the map. Totals must remain comfortably below
    # max_file_store_bytes above.
    stream_max_bytes:
    - stream: ARTIFACTS
      bytes: 1073741824 # 1 GiB — primary capture queue
    - stream: SEARCH
      bytes: 536870912 # 512 MiB — embedding/rerank
    - stream: DIGEST
      bytes: 268435456 # 256 MiB — daily digest
    - stream: KEEP
      bytes: 268435456 # 256 MiB — Keep sync
    - stream: INTELLIGENCE
      bytes: 536870912 # 512 MiB — multi-domain analysis
    - stream: ALERTS
      bytes: 134217728 # 128 MiB — notifications
    - stream: SYNTHESIS
      bytes: 536870912 # 512 MiB — cross-source synthesis
    - stream: DOMAIN
      bytes: 268435456 # 256 MiB — domain extraction
    - stream: DRIVE
      bytes: 536870912 # 512 MiB — cloud-drive events
    - stream: PHOTOS
      bytes: 1073741824 # 1 GiB — photo classification batches
    - stream: ANNOTATIONS
      bytes: 134217728 # 128 MiB — user annotations
    - stream: LISTS
      bytes: 134217728 # 128 MiB — actionable lists
    - stream: AGENT
      bytes: 268435456 # 256 MiB — agent traces
    - stream: WEATHER
      bytes: 67108864 # 64 MiB — weather enrich
    - stream: DEADLETTER
      bytes: 67108864 # 64 MiB — forensic DLQ
  ollama:
    # Default fallback (legacy spec 037 — superseded by per-env ollama_enabled
    # override added by spec 043). Kept so existing readers that ignore the
    # per-env override do not break. Per-env value (if present) wins via
    # env_override_value() in scripts/commands/config.sh.
    enabled: false
    container_port: 11434
    # Spec 043 — Ollama image identifier hoisted out of docker-compose.yml.
    # `image` is the default for non-test environments. `test.image` is the
    # pinned-digest test runtime (OQ-D1 — initial pin matches dev image; a
    # digest pin is deferred to a future hardening spec per OQ-D2).
    #
    # spec 043 / BUG-001 (2026-05-10) — re-pinned from `0.6` (yanked from
    # Docker Hub; pull manifest now returns 404) to `0.23.2` (verified live
    # 200 against hub.docker.com tags API). Adversarial regression test
    # `tests/integration/ollama_image_availability_test.go` HEADs the Docker
    # Hub tags API on every integration run so a future yanked tag fails
    # loudly before the test stack tries to start.
    image: ollama/ollama:0.23.2
    # Spec 061 SCOPE-06a Round 65 (D4 hybrid fix) — Ollama OLLAMA_KEEP_ALIVE
    # controls how long the daemon retains a loaded model in memory after a
    # request completes. Upstream default is "5m"; "-1" means "never unload".
    # Home-lab/prod use "24h" (BUG-061-004): single-user sporadic /weather and
    # /ask traffic was hitting 80s+ cold-load on every call with the upstream
    # 5m default, blowing per-scenario budgets and rendering provider_unavailable.
    # 24h keeps loaded models resident across a typical user-active day.
    # The test env overrides to "-1" via infrastructure.ollama.test.keep_alive
    # so the prewarmed model stays resident for the full BS-002/BS-007
    # retrieval-qa-v1 budget window.
    keep_alive: "24h"
    test:
      image: ollama/ollama:0.23.2
      model: qwen2.5:0.5b-instruct
      pull_timeout_seconds: 300
      # Determinism knobs — same input + same seed + same image → same output
      # (FR-OLLAMA-006, design.md OQ-3 resolution D4).
      request_temperature: 0.0
      request_top_p: 1.0
      request_top_k: 1
      request_seed: 42
      request_num_predict: 256
      # Spec 061 SCOPE-06a Round 65 (D4 hybrid fix) — pin the loaded model in
      # Ollama memory for the entire test run so the cold-context cost paid
      # by the first /api/generate call is never re-paid by the live
      # retrieval-qa-v1 call (which has timeout_ms=5000).
      keep_alive: "-1"
      # Sustained warmup config (Option (a) of the D4 hybrid). The prewarm hook
      # in scripts/runtime/stack.sh issues TWO consecutive /api/generate calls
      # with num_predict=prewarm_warmup_num_predict so the second call exercises
      # real inference past the cold-context phase. The hook fails loud if the
      # second call's latency exceeds prewarm_warmup_second_call_max_ms — that
      # would mean warmup did not achieve sustained warmth and BS-002 against
      # the retrieval-qa-v1 budget would inevitably regress.
      #
      # Spec 061 SCOPE-06b Round 68 (2026-05-30) — threshold raised
      # 3000 → 55000 ms to match the Round 66 retrieval-qa-v1 budget raise
      # (timeout_ms: 60000, safety_margin 5000). gemma3:4b second-call CPU
      # inference on test hardware is ~20-30s; Path A smollm2:360m would
      # be ~5-10s. Either way fits well under 55000 ms. The gate still
      # catches truly broken warmth (e.g. model evicted, OLLAMA_KEEP_ALIVE
      # ignored, model unable to sustain inference under the budget).
      prewarm_warmup_num_predict: 64
      prewarm_warmup_second_call_max_ms: 55000

environments:
  dev:
    compose_project: smackerel
    postgres_host_port: 42001
    nats_client_host_port: 42002
    nats_monitor_host_port: 42003
    core_host_port: 40001
    ml_host_port: 40002
    ollama_host_port: 42004
    # Spec 049 — Prometheus host port lives in the dev infra block
    # (42001-42099). Used only when the `monitoring` Compose profile is
    # enabled; the service is off by default.
    prometheus_host_port: 42005
    postgres_volume_name: smackerel-postgres-data
    nats_volume_name: smackerel-nats-data
    ollama_volume_name: smackerel-ollama-data
    # Spec 082 SCOPE-082-03 — persistent embedding-model cache so the ML
    # sidecar does not re-download from HuggingFace on every restart.
    ml_model_cache_volume_name: smackerel-ml-model-cache
    prometheus_volume_name: smackerel-prometheus-data
    # Spec 043 — per-env opt-in. Spec 064 SCOPE-17 — dev defaults to true so
    # the open-knowledge agent works end-to-end without a separate profile.
    # Operator can flip to false to opt out.
    ollama_enabled: true
    # Spec 044 — per-user bearer auth disabled in dev (preserves
    # SMACKEREL_AUTH_TOKEN dev/test ergonomic; SCN-AUTH-005/011).
    auth_enabled: false
    # Spec 064 SCOPE-17 — SearxNG opt-in for dev. Spec 064 SCOPE-17 — flipped
    # to true so the open-knowledge agent has a working web provider in dev.
    searxng_enabled: true
    searxng_host_port: 42006
    searxng_bind_address: "127.0.0.1"
    # Spec 064 SCOPE-17 — quality-first dev. gemma3:4b for all agent
    # routing slots so tool-use + JSON-schema following is reliable.
    # First call cold-loads ~30-60s; subsequent calls are fast.
    agent_provider_default_model: "gemma3:4b"
    agent_provider_fast_model: "gemma3:4b"
    llm_model: "gemma3:4b"
    ollama_model: "gemma3:4b"
  test:
    compose_project: smackerel-test
    postgres_host_port: 47001
    nats_client_host_port: 47002
    nats_monitor_host_port: 47003
    core_host_port: 45001
    ml_host_port: 45002
    ollama_host_port: 47004
    # Spec 049 — Prometheus host port in the test infra block
    # (47001-47099). Disposable test stack runs the monitoring profile
    # opt-in via the integration test fixture.
    prometheus_host_port: 47005
    postgres_volume_name: smackerel-test-postgres-data
    nats_volume_name: smackerel-test-nats-data
    ollama_volume_name: smackerel-test-ollama-data
    # Spec 082 SCOPE-082-03 — persistent embedding-model cache (test env).
    ml_model_cache_volume_name: smackerel-test-ml-model-cache
    prometheus_volume_name: smackerel-test-prometheus-data
    # Spec 043 — test stack auto-starts Ollama (FR-OLLAMA-001). Final
    # SMACKEREL_TEST_OLLAMA=1 enforcement is wired in scope 03.
    ollama_enabled: true
    # Spec 044 — per-user bearer auth disabled in test (test stack uses
    # the disposable shared SMACKEREL_AUTH_TOKEN; SCN-AUTH-005/011).
    auth_enabled: false
    # Spec 064 SCOPE-07 — test stack auto-starts SearxNG so the integration
    # leg runs `TestSearxNGIntegration_Smoke` against a real container.
    # smackerel.sh integration injects OPEN_KNOWLEDGE_SEARXNG_URL=http://searxng:8080
    # into the Go runner container.
    searxng_enabled: true
    searxng_host_port: 47006
    searxng_bind_address: "127.0.0.1"
    # Spec 061 Round 66 (2026-05-30) — operator quality directive: quality >
    # speed. Reverses Round 58 Option 2 (which pinned every test-tier model
    # env to qwen2.5:0.5b-instruct to fit the original 5000ms retrieval-qa
    # budget) and Round 64 SCOPE-06a multi-path override. retrieval-qa-v1
    # timeout was raised to 60000ms (per_tool 30000ms) so test env can run
    # the higher-quality default `gemma3:4b` (inherited from base
    # `agent.provider_routing.{default,fast,vision}.model` / `llm.model` /
    # `ollama.{model,vision_model}`). Background latency is acceptable per
    # operator. The four agent_provider_* / llm_model / ollama_model
    # overrides previously declared here are intentionally absent — base
    # defaults flow through. SST policy preserved: base keys are still
    # required (no fallbacks), test env simply does not override them.
    ml_processing_degraded_fallback_enabled: true
    qf_decisions_enabled: true
    qf_decisions_base_url: "http://qf-e2e-runner:45003"
    qf_decisions_credential_ref: "qf-e2e-credential-ref"
    qf_decisions_packet_version: 99
  home-lab:
    # Self-hosted target on the operator's home-lab machine. Builds are produced
    # by .github/workflows/build.yml and applied via deploy/home-lab/apply.sh.
    # Port assignments live inside the Smackerel block (40000-49999) and do not
    # collide with `dev` or `test` so the same machine could host all three.
    compose_project: smackerel-home-lab
    postgres_host_port: 43001
    nats_client_host_port: 43002
    nats_monitor_host_port: 43003
    core_host_port: 41001
    ml_host_port: 41002
    ollama_host_port: 43004
    # Spec 049 — Prometheus host port for home-lab. Operator enables
    # the `monitoring` Compose profile via the deploy-adapter overlay;
    # actual host exposure (reverse proxy, Tailscale ACLs) stays in
    # the overlay too.
    prometheus_host_port: 43005
    postgres_volume_name: smackerel-home-lab-postgres-data
    nats_volume_name: smackerel-home-lab-nats-data
    ollama_volume_name: smackerel-home-lab-ollama-data
    # Spec 082 SCOPE-082-03 — persistent embedding-model cache (home-lab).
    ml_model_cache_volume_name: smackerel-home-lab-ml-model-cache
    prometheus_volume_name: smackerel-home-lab-prometheus-data
    # Spec 043 — home-lab preserves opt-in. Operator flips to true after
    # provisioning the GPU host and pulling the production model.
    ollama_enabled: false
    # Spec 044 — per-user bearer auth enabled by default on home-lab
    # (production-class environment per FR-AUTH-016). Operator MUST
    # populate auth.signing.* and auth.at_rest_hashing_key (and
    # auth.bootstrap_token on a fresh deploy) before the runtime starts.
    auth_enabled: true
    # Spec 064 SCOPE-17 — home-lab auto-starts SearxNG so the
    # open-knowledge agent has a working web_search backend.
    # deploy/compose.deploy.yml ships the searxng service under the
    # `searxng` profile; ENABLE_SEARXNG=true (from this flag) makes
    # the deploy adapter include the profile when running compose up.
    searxng_enabled: true
    searxng_host_port: 43006
    searxng_bind_address: "127.0.0.1"
    # Home-lab model selection + the Ollama memory envelope are intentionally
    # NOT pinned here. They are operator/hardware-specific and are owned by the
    # deploy adapter's per-target `params.yaml` `model_selection:` block. The
    # adapter's apply.sh injects those values into the bundle's `app.env` at
    # deploy time (appended after the generated values, last-occurrence-wins),
    # exactly like the HOST_BIND_ADDRESS injection contract.
    #
    # Consequently the in-repo home-lab bundle ships the GENERIC COMMODITY BASE,
    # identical to dev: the tier-matrix interactive model plus the base
    # agent.provider_routing.* / photos.intelligence.* / assistant.open_knowledge.*
    # model fields, and the 8G `deploy_resources.ollama.memory` envelope. Every
    # one of those base keys is fail-loud REQUIRED (no silent fallback per
    # smackerel-no-defaults), so the bundle never resolves a model from a hidden
    # default — it inherits the commodity base, and the deploy adapter supplies
    # the real selection at apply.
    #
    # The 17 model keys that USED to be pinned here now live ONLY in the deploy
    # adapter: llm_model, ollama_model, ollama_vision_model,
    # agent_provider_{default,fast,vision,reasoning,ocr}_model,
    # assistant_open_knowledge_{llm_model_id,synthesis_model_id,switchable_models,
    # tool_capable_gather_models}, photos_intelligence_{classify,sensitivity,
    # aesthetic,ocr}_model, and ollama_memory_limit. The top-level
    # `model_memory_profiles` block (above) still profiles the operator models
    # alongside the commodity ones, so the runtime validateModelEnvelopes check
    # (at container start) validates the adapter-injected selection against the
    # adapter-injected envelope. See docs/Operations.md "Model Envelope Sizing"
    # and docs/Deployment.md.
