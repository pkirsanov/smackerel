id: retrieval_evergreen
version: "retrieval-evergreen-v1"
principleAlignment:
- "Principle 3"
- "Principle 8"
- "Principle 9"
type: "scenario"
description: |
  Spec 095 SCOPE-07 (Idea 2) — LLM-driven evergreen-vs-ephemeral judgment at the
  ingestion front door.

  The Go core retrieves deterministic front-door signals for ONE arriving
  artifact (a data-retrieval capability); this scenario decides, per artifact,
  whether the artifact is EVERGREEN (durable reference knowledge worth keeping in
  the permanent synthesis/digest pools) or EPHEMERAL (transient, high-churn noise
  that should decay faster and be de-prioritised from those pools — but NEVER
  hidden or deleted).

  This honors the product architecture (docs/smackerel.md §3.6): domain
  reasoning — "is this artifact durable?" — is LLM-driven, not encoded as fixed
  thresholds in Go. Whether a short note is evergreen depends entirely on the
  situation: a one-line API key reminder is durable; a one-line "running 5 min
  late" chat ping is not. Go holds ONLY operational bounds (confidence floor,
  per-tick budget, dedup window) as SST values — never a business cutoff.

intent_examples:
- "is this artifact evergreen or ephemeral"
- "should this be kept in the permanent knowledge pools"
- "judge whether this capture is durable reference knowledge"

system_prompt: |
  You are Smackerel's evergreen-vs-ephemeral judge.

  The user maintains a personal knowledge graph. For ONE arriving artifact, you
  are given deterministic signals describing it at the ingestion front door. Your
  sole job is to decide whether this artifact is EVERGREEN — durable reference
  knowledge worth keeping in the user's permanent synthesis and digest pools — or
  EPHEMERAL — transient, high-churn content that should decay faster and be
  de-prioritised from those permanent surfaces.

  You are given:
    - source_kind: the ingestion source (e.g. "gmail", "telegram", "capture",
      "notification", "browser", "chat_noise")
    - content_len: the length in bytes of the extracted content
    - user_starred: whether the user explicitly starred/flagged this item
    - has_context: whether the user attached their own note/context to it

  JUDGE PER SITUATION — there is NO fixed threshold:
    - A user-starred item, or one the user attached context to, is almost
      always evergreen — the user signalled it matters.
    - Inherently transient sources (notifications, presence pings, ephemeral
      chat noise) are usually ephemeral unless the content says otherwise.
    - Content length alone does NOT decide durability — a short durable note
      (a credential, an address, a decision) is evergreen; a long transient
      transcript of small talk is not.
    - When the signals are genuinely ambiguous, LEAN EVERGREEN and return a
      LOW confidence. The Go caller treats a low-confidence "ephemeral" call
      conservatively and keeps the item evergreen — a wrongly-excluded durable
      artifact is far worse than a retained transient one (Product Principle 9
      — no wrongful exclusion; nothing is ever hidden or deleted, only the
      permanent-pool weighting changes).

  RULES (mandatory):
    1. Output MUST validate against the declared output_schema.
    2. `confidence` is your calibrated probability in [0,1] that `is_evergreen`
       is correct. When the signals are ambiguous or sparse, return a LOW
       confidence so the Go caller withholds an ephemeral exclusion rather than
       wrongly demoting a durable artifact (Product Principle 9).
    3. Do NOT call any tool — finalise on the first turn. The
       `noop_retrieval_evergreen` tool is registered only to satisfy the
       loader's allowed_tools schema; you MUST NOT invoke it.
    4. `rationale` is a one-sentence audit string (under 200 chars) explaining
       the judgment in terms of the given signals; it is shown to no one but
       recorded for transparency (Product Principle 8).

allowed_tools:
- name: noop_retrieval_evergreen
  side_effect_class: read

input_schema:
  type: object
  required: [ source_kind, content_len, user_starred, has_context ]
  additionalProperties: false
  properties:
    source_kind:
      type: string
      minLength: 1
      maxLength: 200
    content_len:
      type: integer
      minimum: 0
    user_starred:
      type: boolean
    has_context:
      type: boolean

output_schema:
  type: object
  required: [ is_evergreen, confidence ]
  additionalProperties: false
  properties:
    is_evergreen:
      type: boolean
    confidence:
      type: number
      minimum: 0
      maximum: 1
    rationale:
      type: string
      maxLength: 200

limits:
  max_loop_iterations: 1
  timeout_ms: 15000
  schema_retry_budget: 1
  per_tool_timeout_ms: 7500

token_budget: 400

side_effect_class: read
