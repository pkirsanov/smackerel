id: weather_query
version: "weather-query-v1"
type: "scenario"
description: "Answer a current/forecast weather question from an external provider with provider+timestamp attribution."

intent_examples:
- "weather in Seattle today"
- "is it going to rain in Reykjavík tomorrow?"
- "what's the forecast for Portland this weekend?"
- "temperature in London right now"

system_prompt: |
  You are Smackerel's weather assistant.

  Your job is to extract a clean, geocoder-friendly location from the
  user's natural-language request and call the weather_lookup tool.
  The downstream provider (Open-Meteo) accepts:
    - city names                        ("Paris", "Reykjavik")
    - "city, region"                    ("Palm Springs, California")
    - "city, country"                   ("Paris, France")
    - postal codes / ZIPs               ("98366", "10115")
  It does NOT understand 2-letter US state abbreviations as a trailing
  token. Normalize them BEFORE calling the tool:
    "palm springs ca"       -> "Palm Springs, California"
    "austin tx"             -> "Austin, Texas"
    "nyc"                   -> "New York"
  Strip filler words ("weather in", "what's the weather like in", etc.)
  and keep only the place phrase. ZIPs and postal codes pass through
  verbatim.

  Tool call protocol (follow exactly):
  - Call weather_lookup ONCE per turn.
  - Arguments object MUST use these EXACT JSON keys (no synonyms, no
    variants, no extra fields):
      {
        "location":        <string>,   # REQUIRED. Normalized place name
                                       # per the rules above.
        "forecast_window": <string>    # OPTIONAL. One of: "now", "today",
                                       # "tomorrow", "week". Default "now".
      }
  - Do NOT invent argument keys. The tool will reject any key other
    than "location" and "forecast_window" with an argument_schema_violation.

  After the tool returns successfully, the platform emits the result
  to the user directly. You do NOT need to re-shape, paraphrase, or
  re-render the tool output — stop generating after the tool call.

allowed_tools:
- name: weather_lookup
  side_effect_class: external

# Spec 061 SCOPE-07 — pass-through optimization: the weather_lookup
# tool already returns a JSON object that satisfies output_schema
# verbatim ({forecast_line, provider_name, retrieved_at}). With
# direct_output_from_tool wired, the executor emits the tool result
# as Final and skips the post-tool LLM turn, eliminating ~half the
# end-to-end latency and removing one source of schema-failure
# (model paraphrasing the tool result into invalid JSON).
direct_output_from_tool: weather_lookup

input_schema:
  type: object
  required: [ raw_query, user_id ]
  properties:
    raw_query: { type: string, minLength: 1 }
    user_id: { type: string, minLength: 1 }

output_schema:
  type: object
  required: [ forecast_line, provider_name, retrieved_at ]
  properties:
    forecast_line: { type: string }
    provider_name: { type: string }
    retrieved_at: { type: string, format: "date-time" }
    slot_missing:
      type: string
      enum: [ "location" ]

limits:
  max_loop_iterations: 3
  # Sized for the home-lab path: one route LLM call + external geocode +
  # external forecast + final-reply LLM call, all running against a 26B
  # GPU-accelerated model with 24h keep_alive. 120s caps at the loader
  # ceiling (agent.defaults.timeout_ms_ceiling) and gives ample margin
  # for the cold-load case on first call after a restart.
  timeout_ms: 120000
  schema_retry_budget: 1
  per_tool_timeout_ms: 60000

token_budget: 600
temperature: 0.1
model_preference: "default"
side_effect_class: external

# Spec-061 user-facing metadata lives in config/assistant/scenarios.yaml
# per SUBSTRATE-TOUCHPOINT-1 Option (b).
