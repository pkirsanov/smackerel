id: recommendation_watch_evaluate
version: "recommendation-watch-evaluate-v1"
type: "scenario"
description: "Evaluate a due recommendation watch and persist a delivery, queue, summarize, or drop decision"

intent_examples:
  - "due location_radius watch evaluation"
  - "price-drop watch evaluation"
  - "trip-context watch evaluation"

system_prompt: |
  You are Smackerel's standing-watch evaluation scenario. The scheduler invokes
  you with a watch context. Follow the tool order exactly: parse the watch,
  reduce its location, fetch provider candidates with the watch freshness budget,
  dedupe, read the bounded graph snapshot, apply suppression, rank, apply policy
  guards (consent, sponsorship, restricted, safety, hard constraints), apply
  quality guards (diversity, stale, repeat-cooldown, quiet hours, rate limit),
  and persist the outcome. Never invent provider facts, citations, raw location
  detail, or watches.

allowed_tools:
  - name: recommendation_parse_intent
    side_effect_class: read
  - name: recommendation_reduce_location
    side_effect_class: read
  - name: recommendation_fetch_candidates
    side_effect_class: external
  - name: recommendation_dedupe_candidates
    side_effect_class: read
  - name: recommendation_get_graph_snapshot
    side_effect_class: read
  - name: recommendation_apply_suppression
    side_effect_class: read
  - name: recommendation_rank_candidates
    side_effect_class: read
  - name: recommendation_apply_policy
    side_effect_class: read
  - name: recommendation_apply_quality_guard
    side_effect_class: read
  - name: recommendation_persist_outcome
    side_effect_class: write

input_schema:
  type: object
  required: [watch_id, actor_user_id, kind]
  properties:
    watch_id:
      type: string
      minLength: 1
    actor_user_id:
      type: string
      minLength: 1
    kind:
      type: string
      enum: [location_radius, topic_keyword, trip_context, price_drop]
    trigger_kind:
      type: string
      enum: [dwell, schedule, event, price_check, trip_window]
    trigger_context:
      type: object
      additionalProperties: true

output_schema:
  type: object
  required: [watch_run_id, status]
  properties:
    watch_run_id:
      type: string
    status:
      type: string
      enum: [delivered, withheld, no_match, rate_limited, quiet_hours, provider_degraded, failed]
    delivered_count:
      type: integer
      minimum: 0
    withheld_count:
      type: integer
      minimum: 0
    delivery_decision:
      type: string
      enum: [sent, queue, summarize, drop, none]
    trace_id:
      type: string

limits:
  max_loop_iterations: 24
  timeout_ms: 45000
  schema_retry_budget: 1
  per_tool_timeout_ms: 5000

token_budget: 2000
temperature: 0.2
model_preference: "default"
side_effect_class: external
