id: resurface_evaluate
version: "resurface-evaluate-v1"
principleAlignment:
- "Principle 3"
- "Principle 6"
type: "scenario"
description: |
  Spec 021 R-505 / BUG-021-007 — LLM-driven resurfacing-worthiness judgment.

  Replaces the hardcoded dormancy strategy in internal/intelligence/resurface.go
  (`last_accessed < NOW() - INTERVAL '30 days' AND relevance_score > 0.3`) with a
  per-situation LLM decision. The Go core retrieves dormant CANDIDATES and their
  signals (a deterministic data-retrieval capability); this scenario decides,
  per candidate, whether the artifact is genuinely worth resurfacing to the user
  now.

  This honors the product architecture (docs/smackerel.md §3.6): domain
  reasoning — "is this worth resurfacing?" — is LLM-driven, not encoded as fixed
  thresholds in Go. Whether 30 days dormant + 0.3 relevance is "worth
  resurfacing" depends on the artifact: a deep reference the user keeps coming
  back to deserves resurfacing after a lull; a transient note does not, no
  matter its score. Product Principle 3 (Knowledge Breathes) — the system
  decides what is worth bringing back, not a magic number.

  Serendipity (random rediscovery) is a separate, intentionally non-deterministic
  strategy and is NOT judged by this scenario.

intent_examples:
- "is this dormant artifact worth resurfacing"
- "should the user be reminded of this archived item"
- "evaluate resurfacing worthiness"

system_prompt: |
  You are Smackerel's resurfacing-worthiness judge.

  The user maintains a personal knowledge graph. For ONE dormant artifact, you
  decide whether it is worth gently resurfacing to the user now — bringing a
  valuable but forgotten item back into view — without resurfacing noise.

  You are given:
    - title: the artifact's title
    - days_dormant: days since the user last accessed it (or since it was created)
    - relevance_score: the system's relevance estimate in [0,1] (higher = more
      relevant to the user)
    - access_count: how many times the user has accessed it

  JUDGE PER SITUATION — there is NO fixed dormancy or relevance threshold:
    - A high-relevance artifact the user engaged with before (access_count > 0)
      that has gone quiet is a strong resurfacing candidate — the user found it
      valuable and may have forgotten it.
    - A long-dormant item with little relevance or that was never really engaged
      with (access_count 0, low relevance) is probably not worth resurfacing —
      bringing it back would be noise.
    - Recency matters relative to value: a deep, often-revisited reference is
      worth resurfacing after a moderate lull; a transient note needs a much
      longer dormancy (if ever) to be worth interrupting the user.
    - When the signals are weak or ambiguous, prefer worth_resurfacing=false with
      low confidence — silence is better than noise (Product Principle 6,
      invisible by default).

  RULES (mandatory):
    1. Output MUST validate against the declared output_schema.
    2. `confidence` is your calibrated probability in [0,1] that
       worth_resurfacing is correct. When unsure, return a LOW confidence so the
       Go caller withholds the resurfacing rather than pestering the user.
    3. Do NOT call any tool — finalise on the first turn. The
       `noop_resurface_evaluate` tool is registered only to satisfy the loader's
       allowed_tools schema; you MUST NOT invoke it.
    4. `reason` is a one-sentence audit string (under 200 chars) shown to the
       user as the resurfacing rationale, so phrase it as a brief, friendly
       prompt (e.g. "You saved this reference a while back and kept returning to
       it.").

allowed_tools:
- name: noop_resurface_evaluate
  side_effect_class: read

input_schema:
  type: object
  required: [ title, days_dormant, relevance_score, access_count ]
  additionalProperties: false
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 400
    days_dormant:
      type: integer
      minimum: 0
    relevance_score:
      type: number
      minimum: 0
      maximum: 1
    access_count:
      type: integer
      minimum: 0

output_schema:
  type: object
  required: [ worth_resurfacing, confidence ]
  additionalProperties: false
  properties:
    worth_resurfacing:
      type: boolean
    confidence:
      type: number
      minimum: 0
      maximum: 1
    reason:
      type: string
      maxLength: 200

limits:
  max_loop_iterations: 1
  timeout_ms: 15000
  schema_retry_budget: 1
  per_tool_timeout_ms: 7500

token_budget: 400
temperature: 0.0
model_preference: "fast"
side_effect_class: read
