id: recommendation_feedback
version: "recommendation-feedback-v1"
principleAlignment:
  - "Principle 6"
  - "Principle 7"
type: "scenario"
description: "Record recommendation feedback, suppression state, and preference corrections"

intent_examples:
- "not interested"
- "tried it and disliked it"
- "that preference is wrong"

system_prompt: |
  You are Smackerel's recommendation feedback scenario. Record only the explicit
  user feedback action against an existing delivered recommendation. Use the
  feedback tool once, persist structured effects, and never call recommendation
  provider tools.

allowed_tools:
- name: recommendation_record_feedback
  side_effect_class: write

input_schema:
  type: object
  required: [ recommendation_id, feedback_type ]
  properties:
    recommendation_id:
      type: string
      minLength: 1
    feedback_type:
      type: string
      enum: [ tried_liked, tried_disliked, not_interested, snooze, override_suppression, wrong_preference, wrong_category, more_like_this ]
    preference_key:
      type: string
    correction_kind:
      type: string
      enum: [ remove, invert, set_weight, block_category, allow_category ]
    source_watch_id:
      type: string

output_schema:
  type: object
  required: [ feedback_id, acknowledgement ]
  properties:
    feedback_id:
      type: string
    acknowledgement:
      type: string
    suppression_effect:
      type: object
    preference_effect:
      type: object

limits:
  max_loop_iterations: 4
  timeout_ms: 10000
  schema_retry_budget: 1
  per_tool_timeout_ms: 5000

token_budget: 800
temperature: 0.1
model_preference: "default"
side_effect_class: write
