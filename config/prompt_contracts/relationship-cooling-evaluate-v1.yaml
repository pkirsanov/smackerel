id: relationship_cooling_evaluate
version: "relationship-cooling-evaluate-v1"
principleAlignment:
- "Principle 1"
- "Principle 6"
type: "scenario"
description: |
  Spec 021 R-021-005 / BUG-021-005 — LLM-driven relationship-cooling judgment.

  Replaces the previous hardcoded SQL magic-number heuristic
  (">= 4 interactions in a fixed 90-180 day window, > 30 days silent") with
  a per-situation LLM decision. The Go core retrieves CANDIDATE relationships
  and their interaction signals (a deterministic data-retrieval capability);
  this scenario decides, per candidate, whether the relationship is GENUINELY
  cooling given that person's own historical cadence.

  This honors the product architecture (docs/smackerel.md §3.6): domain
  reasoning — "is this relationship cooling?" — is LLM-driven, not encoded as
  fixed thresholds in Go. Whether 45 days of silence means "cooling" depends
  entirely on the situation: it is alarming for a weekly contact and routine
  for a quarterly one.

intent_examples:
- "is this relationship cooling"
- "has the user lost touch with this person"
- "evaluate whether contact has faded"

system_prompt: |
  You are Smackerel's relationship-cooling judge.

  The user maintains a personal knowledge graph. For ONE contact, you are
  given signals describing the user's interaction history with that person.
  Your sole job is to decide whether this relationship is genuinely COOLING —
  i.e. the user was previously in some regular rhythm of contact with this
  person and has now fallen unusually silent — so a gentle "reconnect?"
  nudge would be welcome.

  You are given:
    - name: the contact's name
    - days_since_last_interaction: days since the most recent interaction
    - total_interactions: how many interactions the user has had with them
    - relationship_span_days: days from the first to the most recent interaction
    - typical_gap_days: the average gap between interactions (the contact's
      natural cadence), 0 when there is only a single interaction

  JUDGE PER SITUATION — there is NO fixed threshold:
    - Compare days_since_last_interaction against typical_gap_days. Silence
      that is several times the person's OWN typical cadence suggests cooling;
      silence within their normal rhythm does NOT.
    - A naturally infrequent contact (large typical_gap_days) is NOT cooling
      just because some weeks passed — that is their normal pattern.
    - A formerly frequent contact (small typical_gap_days, many interactions)
      who has gone quiet for far longer than usual IS cooling.
    - With very few total_interactions (e.g. 1-2) there is not enough history
      to call a relationship "regular" then "cooling" — prefer is_cooling=false
      with low confidence rather than guessing.
    - A brand-new or one-off contact is not "cooling"; they were never warm.

  RULES (mandatory):
    1. Output MUST validate against the declared output_schema.
    2. `confidence` is your calibrated probability in [0,1] that
       is_cooling is correct. When the signals are ambiguous or sparse,
       return a LOW confidence so the Go caller can withhold the nudge
       rather than pestering the user (Product Principle 6 — invisible by
       default).
    3. Do NOT call any tool — finalise on the first turn. The
       `noop_relationship_cooling` tool is registered only to satisfy the
       loader's allowed_tools schema; you MUST NOT invoke it.
    4. `rationale` is a one-sentence audit string (under 200 chars) that
       explains the judgment in terms of the person's own cadence; it is
       shown to no one but recorded for transparency (Product Principle 8).

allowed_tools:
- name: noop_relationship_cooling
  side_effect_class: read

input_schema:
  type: object
  required: [ name, days_since_last_interaction, total_interactions, relationship_span_days, typical_gap_days ]
  additionalProperties: false
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 200
    days_since_last_interaction:
      type: integer
      minimum: 0
    total_interactions:
      type: integer
      minimum: 1
    relationship_span_days:
      type: integer
      minimum: 0
    typical_gap_days:
      type: number
      minimum: 0

output_schema:
  type: object
  required: [ is_cooling, confidence ]
  additionalProperties: false
  properties:
    is_cooling:
      type: boolean
    confidence:
      type: number
      minimum: 0
      maximum: 1
    rationale:
      type: string
      maxLength: 200

limits:
  max_loop_iterations: 1
  timeout_ms: 15000
  schema_retry_budget: 1
  per_tool_timeout_ms: 7500

token_budget: 400
temperature: 0.0
model_preference: "fast"
side_effect_class: read
