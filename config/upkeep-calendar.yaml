# Smackerel upkeep calendar
# Owned by bubbles.upkeep. Engine: knb/shared/upkeep/upkeep-engine.sh
version: 1
tasks:
- id: backup
  cadence: daily
  at: "04:30"
  retention: "30d"
- id: restore-test
  cadence: weekly
  at: "sun 05:00"
  retention: "90d"
  blocks_on_failure: [ release-train-promote ]
- id: bcdr-drill
  cadence: quarterly
  retention: "5y"
  # requires_offsite_backend: true => this drill only activates once an offsite backend exists.
  # Today release-trains.yaml offsite_required: false => offsite/BCDR is WARN-only (G114/G116 warn, not block).
  # Operator flips offsite_required: true after provisioning T3/T4 hardware; this drill then becomes live.
  requires_offsite_backend: true
- id: patch-cycle
  cadence: monthly
  at: "first-sun 06:00"
  retention: "1y"
- id: secret-rotation
  cadence: quarterly
  retention: "5y"
- id: flag-cleanup-audit
  cadence: monthly
  retention: "1y"
- id: compliance-sweep
  cadence: quarterly
  retention: "7y"
