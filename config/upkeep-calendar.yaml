# Smackerel upkeep calendar
# Owned by bubbles.upkeep. Engine: knb/shared/upkeep/upkeep-engine.sh
version: 1
tasks:
- id: backup
  cadence: daily
  at: "04:30"
  retention: "30d"
- id: restore-test
  cadence: weekly
  at: "sun 05:00"
  retention: "90d"
  blocks_on_failure: [ release-train-promote ]
- id: bcdr-drill
  cadence: quarterly
  retention: "5y"
  requires_offsite_backend: true
- id: patch-cycle
  cadence: monthly
  at: "first-sun 06:00"
  retention: "1y"
- id: secret-rotation
  cadence: quarterly
  retention: "5y"
- id: flag-cleanup-audit
  cadence: monthly
  retention: "1y"
- id: compliance-sweep
  cadence: quarterly
  retention: "7y"
