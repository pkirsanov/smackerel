# Spec 049 — Prometheus alert rules (FR-049-003).
#
# This file is committed AS-IS (no template substitution) and mounted
# read-only into the prometheus container at /etc/prometheus/alerts.yml.
# Every rule below references a metric name that is actually emitted
# today by either internal/metrics/ (Go core) or ml/app/metrics.py
# (Python sidecar). The static contract test
# internal/deploy/monitoring_alerts_contract_test.go (T-049-004)
# parses this file and rejects any expression that references a
# metric name not in the known-metrics allowlist extracted from the
# live runtime code.
#
# Receivers (Telegram, PagerDuty, email, etc.) are NOT shipped here.
# Alertmanager routing belongs to the deploy-adapter overlay so the
# product repo stays target-agnostic (per
# .github/copilot-instructions.md "No env-specific content").
#
# Thresholds and `for:` windows are intentionally conservative — tune
# via overlay if a deployment needs tighter alerting.

groups:
# ─────────────────────────────────────────────────────────────────────
# Service availability — fires when Prometheus has not scraped a
# target successfully for 2 minutes. `up` is the synthetic per-scrape
# gauge Prometheus injects for every target; no Smackerel-side
# instrumentation needed.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-availability
  rules:
  - alert: SmackerelCoreUnavailable
    expr: up{job="smackerel-core"} == 0
    for: 2m
    labels:
      severity: critical
      component: core
    annotations:
      summary: "smackerel-core /metrics is unreachable for >=2m"
      description: |
        Prometheus has not successfully scraped smackerel-core for at least
        2 minutes. Inspect container health: `docker ps`, `docker logs
        <core-container>`. The /metrics endpoint is unauthenticated and
        served on the SST-bound CORE_CONTAINER_PORT inside the compose
        network — confirm Postgres + NATS dependencies are healthy first.

  - alert: SmackerelMLUnavailable
    expr: up{job="smackerel-ml"} == 0
    for: 2m
    labels:
      severity: critical
      component: ml
    annotations:
      summary: "smackerel-ml /metrics is unreachable for >=2m"
      description: |
        Prometheus has not successfully scraped smackerel-ml for at least
        2 minutes. The Go core has a graceful-degradation fallback to text
        search (spec 050), so end users may not notice immediately, but
        ingestion enrichment is paused. Inspect ML sidecar logs and
        confirm the embedding ThreadPoolExecutor is alive.

# ─────────────────────────────────────────────────────────────────────
# Ingestion pipeline — fires when no new artifacts have been ingested
# in the last 30 minutes despite the core being up. Catches the case
# where the runtime is healthy but every connector silently stopped
# producing.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-ingestion
  rules:
  - alert: SmackerelIngestionStalled
    expr: |
      up{job="smackerel-core"} == 1
      and
      rate(smackerel_artifacts_ingested_total[30m]) == 0
    for: 15m
    labels:
      severity: warning
      component: ingestion
    annotations:
      summary: "No artifacts ingested in 30 minutes while core is healthy"
      description: |
        smackerel_artifacts_ingested_total has not increased in 30
        minutes even though the core is up. Likely causes: all
        connectors disabled/misconfigured, scheduler stuck, or upstream
        sources unreachable. Check `smackerel_connector_sync_total` per
        connector to localise.

# ─────────────────────────────────────────────────────────────────────
# NATS dead-letter pressure — fires when messages keep failing all
# retries and landing in the DEADLETTER stream. The metric is bounded
# per-stream so the alert fires per stream when the threshold is
# exceeded.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-nats
  rules:
  - alert: SmackerelNATSDeadLetterPressure
    expr: |
      sum by (stream) (rate(smackerel_nats_deadletter_total[10m])) > 0.05
    for: 10m
    labels:
      severity: warning
      component: nats
    annotations:
      summary: "Sustained NATS dead-letter rate on stream {{ $labels.stream }}"
      description: |
        More than 0.05 messages/second are landing in the dead-letter
        queue for stream {{ $labels.stream }} over the last 10 minutes.
        Inspect ML sidecar logs (most DLQ traffic is enrichment
        failures), confirm Ollama/LLM availability if the failing
        stream is SEARCH/DOMAIN/INTELLIGENCE.

# ─────────────────────────────────────────────────────────────────────
# Database pressure — fires when the connection pool is saturated.
# Threshold uses the configured max_conns (10 by default per
# config/smackerel.yaml infrastructure.postgres.max_conns).
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-database
  rules:
  - alert: SmackerelDBPoolSaturated
    expr: smackerel_db_connections_active >= 9
    for: 5m
    labels:
      severity: warning
      component: postgres
    annotations:
      summary: "Postgres connection pool >=90% of max for 5 minutes"
      description: |
        Active connections are at or above 9 (90% of the default 10
        max_conns) for 5 minutes. New requests will queue or 503.
        Either bump infrastructure.postgres.max_conns in the SST and
        regenerate config + restart, or hunt the slow query in
        pg_stat_activity.

# ─────────────────────────────────────────────────────────────────────
# ML embedding starvation — fires when the bounded ThreadPoolExecutor
# is rejecting requests at the queue cap (spec 050). The Go core
# falls back to text search, so end-user search keeps working, but
# quality is degraded.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-ml-embedding
  rules:
  - alert: SmackerelMLEmbeddingStarvation
    expr: |
      rate(smackerel_ml_embedding_rejected_total[5m]) > 0
    for: 10m
    labels:
      severity: warning
      component: ml
    annotations:
      summary: "ML embedding pool is rejecting requests"
      description: |
        smackerel_ml_embedding_rejected_total is incrementing — the
        bounded ThreadPoolExecutor (spec 050) is rejecting new work at
        the queue cap. Search is falling back to text-only matching.
        Either raise services.ml.embedding_workers /
        services.ml.embedding_queue_max in the SST or scale the ML
        container's CPU envelope (deploy_resources.smackerel_ml.cpus).

# ─────────────────────────────────────────────────────────────────────
# Twitter API connector (spec 056) — fires when api.twitter.com is
# chronically rate-limiting or returning sustained retryable errors.
# Metrics: smackerel_connector_twitter_api_rate_limit_reset_seconds
# (gauge, seconds until next reset) and
# smackerel_connector_twitter_api_retries_total{reason} (counter).
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-connector-twitter
  rules:
  - alert: TwitterAPIRateLimitChronicExhaustion
    expr: |
      max_over_time(smackerel_connector_twitter_api_rate_limit_reset_seconds{connector="twitter"}[15m]) > 60
    for: 30m
    labels:
      severity: warning
      component: connector
    annotations:
      summary: "Twitter API rate-limit reset window >60s for 30 minutes"
      description: |
        api.twitter.com has been rate-limiting the connector with a
        reset window above 60 seconds continuously for 30 minutes. Sync
        cadence will degrade. Verify the bearer token tier
        (TWITTER_BEARER_TOKEN), reduce poll frequency in the SST, or
        narrow active source lists.
  - alert: TwitterAPIRetryStorm
    expr: |
      sum by (endpoint, reason) (rate(smackerel_connector_twitter_api_retries_total{connector="twitter"}[5m])) > 0.2
    for: 10m
    labels:
      severity: warning
      component: connector
    annotations:
      summary: "Twitter API retry rate >0.2/s on {{ $labels.endpoint }} ({{ $labels.reason }})"
      description: |
        smackerel_connector_twitter_api_retries_total is incrementing faster
        than 0.2/s for endpoint {{ $labels.endpoint }} with reason
        {{ $labels.reason }} over 10 minutes. Likely causes: upstream
        5xx, sustained 429, or a connectivity issue between the home
        lab and api.twitter.com. Check connector logs for the failing
        endpoint.

# ─────────────────────────────────────────────────────────────────────
# Alert delivery pipeline — fires when the alert delivery system
# itself is failing. This is the "monitor the monitor" rule: if
# operator alerts cannot reach Telegram, the operator needs to know
# via Prometheus + Alertmanager (deploy-adapter responsibility).
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-alert-delivery
  rules:
  - alert: SmackerelAlertDeliveryFailing
    expr: rate(smackerel_alert_delivery_failures_total[15m]) > 0
    for: 15m
    labels:
      severity: critical
      component: alerts
    annotations:
      summary: "Smackerel alert delivery pipeline is failing"
      description: |
        smackerel_alert_delivery_failures_total has incremented in
        the last 15 minutes. Operator-facing notifications (Telegram
        etc.) may be lost. Check core logs for the recent failure
        class and verify the configured TELEGRAM_BOT_TOKEN / chat
        mapping are still valid.

# ─────────────────────────────────────────────────────────────────────
# Backup staleness — fires when smackerel_backup_last_success_unixtime
# has not advanced inside the daily backup window. Spec 048 wires
# this metric from scripts/commands/backup.sh via the on-disk JSON
# status file polled by internal/backup.Watcher.
# A still-zero metric (the watcher saw no status file at all) is the
# strongest stale signal: time() - 0 > window is trivially true, so
# this rule fires on a brand-new host that has never produced a
# backup. That is the desired behavior.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-backup
  rules:
  - alert: SmackerelBackupStale
    expr: |
      up{job="smackerel-core"} == 1
      and
      (time() - smackerel_backup_last_success_unixtime) > 90000
    for: 30m
    labels:
      severity: warning
      component: backup
    annotations:
      summary: "No successful backup in the last 25h"
      description: |
        The smackerel_backup_last_success_unixtime gauge has not
        advanced inside the expected daily-backup window. Likely
        causes: the backup timer is not firing, pg_dump is failing,
        or the status file at ${BACKUP_STATUS_FILE} is missing or
        unreadable. Run `./smackerel.sh backup` manually to
        reproduce, then check the JSON status file for last_error.
        Run `./smackerel.sh backup-restore-test` to verify the
        most recent artifact actually restores cleanly.

# ─────────────────────────────────────────────────────────────────────
# Connector sync health — fires when any connector's failure rate is
# elevated over a 24h window. This is the generic connector health
# signal; connector-specific alerts (e.g. TwitterAPI*) provide deeper
# diagnostics for high-traffic connectors.
# Metric: smackerel_connector_sync_total{connector, status}
# Ref: docs/Operations.md "Google Maps Timeline Connector" section
# (spec 005 Phase 4 / spec 011 Maps Connector).
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-connector-sync
  rules:
  - alert: ConnectorSyncFailureRateHigh24h
    expr: |
      (
        sum by (connector) (rate(smackerel_connector_sync_total{status="error"}[24h]))
        /
        (sum by (connector) (rate(smackerel_connector_sync_total[24h])) > 0)
      ) > 0.1
    for: 1h
    labels:
      severity: warning
      component: connector
    annotations:
      summary: "Connector {{ $labels.connector }} failure rate >10% over 24h"
      description: |
        smackerel_connector_sync_total shows connector {{ $labels.connector }}
        has a failure rate exceeding 10% over the last 24 hours. Likely
        causes: upstream API unavailable, credentials expired, or
        connector configuration drift. Check connector logs:
        `docker logs <core-container> 2>&1 | grep -i {{ $labels.connector }}`
        and verify the connector's required config in config/smackerel.yaml.

# ─────────────────────────────────────────────────────────────────────
# ML sidecar NATS dead-letter (spec 081 round 16 devops sweep
# F-081-DEVOPS-001) — the Python ML sidecar's JetStream consumers route
# exhausted poison messages to deadletter.<subject> under DISTINCT
# metric names from the Go core: smackerel_ml_nats_deadletter_total and
# smackerel_ml_nats_deadletter_publish_failures_total (ml/app/metrics.py,
# FR-081-003) vs the Go core's smackerel_nats_deadletter_total. The
# existing SmackerelNATSDeadLetterPressure rule (smackerel-nats group)
# only watches the Go metric, so ML-side dead-letter pressure — and,
# critically, publish-to-deadletter failures — shipped unmonitored with
# spec 081. These two rules close that observability gap.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-ml-nats
  rules:
  - alert: SmackerelMLNATSDeadLetterPressure
    expr: |
      sum by (stream) (rate(smackerel_ml_nats_deadletter_total[10m])) > 0.05
    for: 10m
    labels:
      severity: warning
      component: ml
    annotations:
      summary: "Sustained ML-sidecar NATS dead-letter rate on stream {{ $labels.stream }}"
      description: |
        More than 0.05 messages/second from the Python ML sidecar are
        landing in the dead-letter queue for stream {{ $labels.stream }}
        over the last 10 minutes (spec 081 poison-pill routing). This is
        the ML-side companion to SmackerelNATSDeadLetterPressure, which
        only watches the Go core's smackerel_nats_deadletter_total.
        Inspect ML sidecar logs and confirm Ollama/LLM availability if
        the failing stream is SEARCH/SYNTHESIS — most ML dead-letter
        traffic is enrichment failures.

  - alert: SmackerelMLNATSDeadLetterPublishFailing
    expr: |
      sum by (subject) (rate(smackerel_ml_nats_deadletter_publish_failures_total[10m])) > 0
    for: 10m
    labels:
      severity: critical
      component: ml
    annotations:
      summary: "ML sidecar cannot publish to the dead-letter queue (subject {{ $labels.subject }})"
      description: |
        smackerel_ml_nats_deadletter_publish_failures_total is
        incrementing for subject {{ $labels.subject }}. Per the spec 081
        publish-before-term invariant (design §4), the ML sidecar nak()s
        the original message when the dead-letter publish fails, so the
        poison message is redelivered in a loop and is NOT terminated —
        forensic evidence is preserved but that consumer is stuck
        retrying and making no forward progress. Inspect the DEADLETTER
        stream health (`docker exec <nats-container> nats stream info
        DEADLETTER`) and confirm it is not at its MaxBytes/MaxMsgs limit;
        check the ML sidecar logs for the recurring publish error.

# ─────────────────────────────────────────────────────────────────────
# LLM scenario agent (spec 037 round 22 devops sweep F-037-DEVOPS-001) —
# the agent is a live runtime surface that routes intents to scenarios,
# drives an LLM over NATS, and executes allowlisted tools. It persists a
# DB trace + two NATS events per invocation but shipped with ZERO
# Prometheus metrics, so an operator had no push-based alert when the
# agent degraded. internal/metrics/agent.go now emits the backing series;
# these three rules watch the three highest-value operational dimensions:
# LLM-provider health, scenario timeout-budget reachability, and the
# tool-allowlist security boundary. Loop-limit / schema-failure remain
# observable via smackerel_agent_invocations_total{outcome=...} for
# dashboards without a dedicated page.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-agent
  rules:
  - alert: SmackerelAgentProviderErrors
    expr: |
      sum(rate(smackerel_agent_invocations_total{outcome="provider-error"}[10m])) > 0.05
    for: 10m
    labels:
      severity: warning
      component: agent
    annotations:
      summary: "LLM scenario agent provider-error rate elevated"
      description: |
        smackerel_agent_invocations_total{outcome="provider-error"} is
        incrementing faster than 0.05/s over 10 minutes — the agent's LLM
        driver (NATS request/reply to the ML sidecar, backed by
        Ollama/cloud) is returning provider errors or empty turns. Every
        scenario invocation that needs the LLM will fail. Confirm the ML
        sidecar is up (SmackerelMLUnavailable), check Ollama/LLM
        availability, and inspect agent_traces rows with outcome
        'provider-error' for the failing provider/model.

  - alert: SmackerelAgentInvocationTimeouts
    expr: |
      sum(rate(smackerel_agent_invocations_total{outcome="timeout"}[15m])) > 0.05
    for: 15m
    labels:
      severity: warning
      component: agent
    annotations:
      summary: "LLM scenario agent invocations timing out"
      description: |
        smackerel_agent_invocations_total{outcome="timeout"} is
        incrementing faster than 0.05/s over 15 minutes — invocations are
        exceeding their per-scenario wall-clock budget
        (agent.defaults.timeout_ms_ceiling / scenario timeout_ms). This is
        usually a model too slow for the configured budget on the current
        hardware tier. Compare warm model latency against the scenario
        budget, raise the SST timeout, or select a faster provider/model;
        inspect agent_traces rows with outcome 'timeout' and the
        outcome_detail deadline to localise the scenario.

  - alert: SmackerelAgentAllowlistViolations
    expr: |
      sum by (scenario) (rate(smackerel_agent_tool_calls_total{result="allowlist-violation"}[10m])) > 0
    for: 10m
    labels:
      severity: warning
      component: agent
    annotations:
      summary: "LLM scenario agent allowlist violations on scenario {{ $labels.scenario }}"
      description: |
        smackerel_agent_tool_calls_total{result="allowlist-violation"} is
        incrementing for scenario {{ $labels.scenario }} over 10 minutes.
        The agent-enforced tool allowlist (NOT LLM-policy) is rejecting
        tool calls the model proposed. Sustained violations mean either an
        active prompt-injection attempt steering the model toward
        off-allowlist (often write/external) tools, or a scenario whose
        allowlist drifted out of sync with its prompt. Inspect agent_traces
        for the scenario, confirm no write tool ever executed (the rejected
        call never reaches the handler), and review the scenario allowlist.

# ─────────────────────────────────────────────────────────────────────
# Cloud-drive integration (spec 038 round 30 devops sweep
# F-038-DEVOPS-001) — the provider-neutral drive surface (Google Drive
# today) emits five live counters from internal/drive/observability/
# (smackerel_drive_scan_files_total, _extract_files_total,
# _save_attempts_total, _retrieve_decisions_total, and
# _provider_errors_total), incremented by the scan/extract/save/retrieve
# services. They satisfied the pull/dashboard half of FR-038-017 but
# shipped with ZERO push-based alert rules, so an operator got no page
# when the drive provider degraded, when save-back (cross-feature write
# production, FR-038-004 / FR-038-012) started failing, or when the
# retrieve boundary — the surface an earlier chaos round hardened against
# memory exhaustion (io.LimitReader) — began refusing en masse. These
# three rules close that gap. The metrics live OUTSIDE internal/metrics/,
# so the alert-contract allowlist
# (internal/deploy/monitoring_alerts_contract_test.go) was extended in
# the same change to also walk internal/drive/observability/metrics.go.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-drive
  rules:
  - alert: DriveProviderErrors
    expr: |
      sum by (provider, work_type) (rate(smackerel_drive_provider_errors_total[10m])) > 0.05
    for: 10m
    labels:
      severity: warning
      component: drive
    annotations:
      summary: "Cloud-drive provider {{ $labels.provider }} erroring on {{ $labels.work_type }}"
      description: |
        smackerel_drive_provider_errors_total for provider
        {{ $labels.provider }} is incrementing faster than 0.05/s over 10
        minutes on work type {{ $labels.work_type }} (scan / extract /
        save / retrieve). The drive provider API (e.g. Google Drive) is
        failing or the stored OAuth bearer token has expired — per spec
        038 design §2.3 only the access token is persisted, so an expired
        token moves the connection out of `healthy` and every drive
        operation fails until the user re-authorizes. Inspect the core
        logs for the failing work type and confirm connection health via
        `GET /v1/connectors/drive/connection/{id}`.
  - alert: DriveSaveBackFailing
    expr: |
      sum by (provider) (rate(smackerel_drive_save_attempts_total{outcome="error"}[15m])) > 0.05
    for: 15m
    labels:
      severity: warning
      component: drive
    annotations:
      summary: "Cloud-drive save-back failing for provider {{ $labels.provider }}"
      description: |
        smackerel_drive_save_attempts_total{outcome="error"} for provider
        {{ $labels.provider }} is incrementing faster than 0.05/s over 15
        minutes. The Save Service write path (FR-038-004 / FR-038-012
        cross-feature production — meal plans, receipts, digests routed to
        a drive folder) is failing at the provider boundary. This is
        distinct from a deliberate policy `refused` / `blocked` outcome.
        Likely causes: provider quota, a revoked write scope, or provider
        5xx. Check `GET /v1/drive/save/requests` for the failing rows and
        the core logs for the provider error class.
  - alert: DriveRetrieveRefusalSpike
    expr: |
      sum by (provider) (rate(smackerel_drive_retrieve_decisions_total{mode="refused"}[10m])) > 0.1
    for: 15m
    labels:
      severity: warning
      component: drive
    annotations:
      summary: "Cloud-drive retrieve refusals elevated for provider {{ $labels.provider }}"
      description: |
        smackerel_drive_retrieve_decisions_total{mode="refused"} for
        provider {{ $labels.provider }} is exceeding 0.1/s over 10 minutes
        for 15 minutes. The retrieval boundary (FR-038-010 — Telegram and
        other channels requesting drive files subject to sensitivity,
        sharing, and channel-safety policy) is refusing en masse. Either a
        sensitivity/sharing policy regressed and is blocking legitimate
        retrievals, or a channel is probing the boundary with requests it
        is not authorized for (this is the same retrieve surface an earlier
        chaos round hardened against memory exhaustion). Inspect the drive
        retrieve decision logs (slog `drive retrieve: decision`, which
        records provider + mode + sensitivity) and confirm the sensitivity
        policy thresholds match the configured values.

# ─────────────────────────────────────────────────────────────────────
# Phase-3 intelligence layer (spec 004 round 31 devops sweep
# F-004-DEVOPS-001) — the synthesis / contextual-alert / weekly-digest
# subsystem emits live metrics from internal/intelligence/ and
# internal/digest/ but shipped with asymmetric alert coverage: only the
# DELIVERY side (smackerel_alert_delivery_failures_total →
# SmackerelAlertDeliveryFailing) had a rule, while the PRODUCTION side and
# the DIGEST synthesis path shipped unmonitored. These two rules close
# that gap:
#
#   1. smackerel_alert_producer_failures_total{type} — incremented by
#      internal/intelligence/alert_timing.go + alert_producers.go whenever
#      an LLM timing/cooling judgment errors OR the CreateAlert DB insert
#      fails for a contextual alert (bill reminder, return-window,
#      trip-prep, relationship-cooling — spec 004 R-304). A chronic
#      production failure means the user silently misses deadlines: the
#      spec 004 stated failure condition. This is the production-side twin
#      of SmackerelAlertDeliveryFailing (delivery-side).
#
#   2. smackerel_digest_generation_total{status="fallback"} — incremented
#      by internal/digest/generator.go when the NATS publish to the ML LLM
#      generation path (SubjectDigestGenerate) fails and the generator
#      stores a plain-text fallback digest WITHOUT LLM synthesis (spec 004
#      R-302). This is a publish-side failure, NOT a consumer dead-letter,
#      so SmackerelNATSDeadLetterPressure / smackerel-ml-nats do not catch
#      it. Sustained fallbacks mean the weekly/daily synthesis ("connection
#      discovered", "patterns noticed") has silently degraded to a flat
#      list.
#
# Both metrics already live in internal/metrics/metrics.go, so the alert
# allowlist contract (internal/deploy/monitoring_alerts_contract_test.go)
# already sees them; the two alert names are registered in the structural
# contract (internal/metrics/prometheus_alerts_contract_test.go) in the
# same change.
# ─────────────────────────────────────────────────────────────────────
- name: smackerel-intelligence
  rules:
  - alert: SmackerelIntelligenceAlertProductionFailing
    expr: |
      sum by (type) (rate(smackerel_alert_producer_failures_total[15m])) > 0
    for: 15m
    labels:
      severity: warning
      component: intelligence
    annotations:
      summary: "Phase-3 alert production failing for type {{ $labels.type }}"
      description: |
        smackerel_alert_producer_failures_total{type="{{ $labels.type }}"}
        is incrementing over 15 minutes — the spec 004 contextual-alert
        producers (bill reminders, return-window, trip-prep,
        relationship-cooling, commitment tracking — R-304) are failing to
        create alerts. The failure is either an LLM timing/cooling judgment
        error (NATS request/reply to the ML sidecar) or a CreateAlert DB
        insert failure. Unlike SmackerelAlertDeliveryFailing — which fires
        when a PRODUCED alert cannot be delivered to Telegram — this fires
        on the PRODUCTION side: the alert is never created, so the user
        silently misses the deadline (the spec 004 stated failure
        condition). Confirm the ML sidecar is up (SmackerelMLUnavailable),
        check the alerts table write path / DB health
        (SmackerelDBPoolSaturated), and inspect the core logs for the
        "alert timing evaluation failed" / "failed to create … alert" warn
        lines to localise the failing producer.

  - alert: SmackerelDigestSynthesisDegraded
    expr: |
      sum(rate(smackerel_digest_generation_total{status="fallback"}[1h])) > 0
    for: 30m
    labels:
      severity: warning
      component: intelligence
    annotations:
      summary: "Phase-3 digest synthesis degraded — LLM generation path falling back"
      description: |
        smackerel_digest_generation_total{status="fallback"} is
        incrementing over the last hour — the spec 004 daily/weekly
        synthesis digest (R-302) is failing to publish its context to the
        ML LLM generation path (NATS subject digest.generate) and the
        generator is storing plain-text fallback digests WITHOUT LLM
        synthesis. The high-value "connection discovered" / "patterns
        noticed" sections silently collapse to a flat stats list. This is a
        NATS PUBLISH-side failure, not a consumer dead-letter, so
        SmackerelNATSDeadLetterPressure and the smackerel-ml-nats rules do
        NOT cover it. Confirm the ML sidecar is up (SmackerelMLUnavailable),
        verify NATS connectivity from the core, and inspect the core logs
        for the "NATS publish failed, generating fallback digest" warn line.
