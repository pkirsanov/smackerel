<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smackerel</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Setup Screen (shown when not configured) -->
  <div id="setup-screen" class="screen">
    <div class="header">
      <img src="../icons/icon-48.svg" alt="Smackerel" class="logo">
      <h1>Smackerel Setup</h1>
    </div>

    <div class="form-group">
      <label for="server-url">Server URL</label>
      <input type="url" id="server-url" placeholder="https://your-server.example.com" autocomplete="url">
      <div id="http-warning" class="warning hidden">⚠️ Insecure connection — HTTPS recommended</div>
    </div>

    <div class="form-group">
      <label for="auth-token">Auth Token</label>
      <input type="password" id="auth-token" placeholder="Paste your auth token" autocomplete="off">
    </div>

    <button id="test-btn" class="btn primary">Test Connection</button>

    <div id="test-result" class="status-box hidden"></div>

    <button id="save-btn" class="btn primary hidden">Save Settings</button>
  </div>

  <!-- Main Screen (shown when configured) -->
  <div id="main-screen" class="screen hidden">
    <div class="header">
      <img src="../icons/icon-48.svg" alt="Smackerel" class="logo-sm">
      <div class="header-text">
        <h1>Smackerel</h1>
        <div id="connection-status" class="connection-status"></div>
      </div>
    </div>

    <div class="current-page" id="current-page">
      <div class="page-title" id="page-title">Loading...</div>
      <div class="page-url" id="page-url"></div>
    </div>

    <button id="capture-btn" class="btn primary capture-btn">Save to Smackerel</button>

    <div id="capture-result" class="status-box hidden"></div>

    <div id="queue-status" class="queue-status hidden">
      <span id="queue-count">0</span> item(s) queued offline
      <button id="sync-btn" class="btn-link">Sync now</button>
    </div>

    <div class="footer-actions">
      <button id="settings-btn" class="btn-link">Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
