<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>People — Smackerel Wiki</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/wiki.html" class="logo-link" aria-label="Back to Wiki"><img src="/pwa/icon.svg" alt="Smackerel" class="logo"></a>
  <h1 id="wiki-people-heading">People</h1>
  <p class="subtitle">People surfaced by the intelligence layer.</p>
  <!-- Spec 073 SCOPE-073-05 — SCN-073-B02. Consumes /api/people. -->

  <section id="wiki-people-index" class="card" aria-labelledby="wiki-people-heading" aria-busy="true" data-endpoint="/api/people">
    <p id="wiki-people-status" class="status info" role="status" aria-live="polite">Loading people...</p>
    <ul id="wiki-people-list" class="wiki-list" role="list" hidden></ul>
  </section>

  <section id="wiki-person-detail" class="card" aria-labelledby="wiki-person-detail-heading" hidden>
    <h2 id="wiki-person-detail-heading"></h2>
    <p id="wiki-person-status" class="status info" role="status" aria-live="polite">Loading person...</p>
    <div class="wiki-related-block">
      <h3>Timeline</h3>
      <ul id="wiki-person-timeline" class="wiki-timeline" role="list"></ul>
    </div>
    <div class="wiki-related-block">
      <h3>Related topics</h3>
      <div id="wiki-person-topics" data-related="topics"></div>
    </div>
    <div class="wiki-related-block">
      <h3>Related places</h3>
      <div id="wiki-person-places" data-related="places"></div>
    </div>
    <div class="wiki-related-block">
      <h3>Graph edges (Related)</h3>
      <div id="wiki-person-edges" data-related="edges"></div>
    </div>
  </section>

  <p class="footer"><a href="/pwa/wiki.html">Back to wiki</a></p>
  <script type="module" src="/pwa/wiki_people.js"></script>
</body>
</html>
