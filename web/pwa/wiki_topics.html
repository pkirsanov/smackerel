<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Topics — Smackerel Wiki</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/wiki.html" class="logo-link" aria-label="Back to Wiki">
    <img src="/pwa/icon.svg" alt="Smackerel" class="logo">
  </a>
  <h1 id="wiki-topics-heading">Topics</h1>
  <p class="subtitle">Topics derived from the knowledge graph.</p>
  <!-- Spec 073 SCOPE-073-05 — SCN-073-B01. Consumes GET /api/topics + /api/topics/{id} + /api/graph/edges. -->

  <section id="wiki-topics-index" class="card" aria-labelledby="wiki-topics-heading" aria-busy="true" data-endpoint="/api/topics">
    <p id="wiki-topics-status" class="status info" role="status" aria-live="polite">Loading topics...</p>
    <ul id="wiki-topics-list" class="wiki-list" role="list" hidden></ul>
  </section>

  <section id="wiki-topic-detail" class="card" aria-labelledby="wiki-topic-detail-heading" hidden>
    <h2 id="wiki-topic-detail-heading"></h2>
    <p id="wiki-topic-status" class="status info" role="status" aria-live="polite">Loading topic...</p>
    <div class="wiki-related-block">
      <h3>Linked artifacts</h3>
      <div id="wiki-topic-artifacts" data-related="artifacts"></div>
    </div>
    <div class="wiki-related-block">
      <h3>Related people</h3>
      <div id="wiki-topic-people" data-related="people"></div>
    </div>
    <div class="wiki-related-block">
      <h3>Related places</h3>
      <div id="wiki-topic-places" data-related="places"></div>
    </div>
    <div class="wiki-related-block">
      <h3>Graph edges (Related)</h3>
      <div id="wiki-topic-edges" data-related="edges"></div>
    </div>
  </section>

  <p class="footer"><a href="/pwa/wiki.html">Back to wiki</a></p>
  <script type="module" src="/pwa/wiki_topics.js"></script>
</body>
</html>
