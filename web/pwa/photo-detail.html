<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Photo Detail — Smackerel</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/photo-search.html" class="logo-link" aria-label="Back to Photo Search">
    <img src="/pwa/icon.svg" alt="Smackerel" class="logo">
  </a>
  <h1>Photo Detail</h1>
  <section id="photo-detail" class="card" aria-busy="true" data-endpoint="/v1/photos/{id}">
    <p id="photo-detail-status" class="status info" role="status" aria-live="polite">Loading photo...</p>
    <dl id="photo-detail-fields" class="connector-detail-fields"></dl>
  </section>
  <script src="/pwa/photo-detail.js"></script>
</body>
</html>
