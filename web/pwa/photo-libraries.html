<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Photo Libraries — Smackerel</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/" class="logo-link" aria-label="Back to Smackerel home">
    <img src="/pwa/icon.svg" alt="Smackerel" class="logo">
  </a>
  <h1>Photo Libraries</h1>
  <p class="subtitle">Connected photo sources</p>

  <section id="photo-libraries" class="card" aria-labelledby="photo-libraries-heading" aria-busy="true">
    <h2 id="photo-libraries-heading">Libraries</h2>
    <p id="photo-libraries-status" class="status info" role="status" aria-live="polite">Loading photo libraries...</p>
    <ul id="photo-libraries-list" class="connector-list" hidden></ul>
    <p id="photo-libraries-empty" class="status pending" role="status" hidden>No photo library is connected.</p>
    <p id="photo-libraries-error" class="status error" role="alert" hidden></p>
    <div class="connector-card-actions">
      <a class="btn btn-primary" href="/pwa/photo-library-add.html">Connect</a>
      <a class="btn" href="/pwa/photo-search.html">Search</a>
    </div>
  </section>

  <p class="footer"><a href="/pwa/">Back to home</a></p>
  <script src="/pwa/photo-libraries.js"></script>
</body>
</html>
