<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Photo Library — Smackerel</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/photo-libraries.html" class="logo-link" aria-label="Back to Photo Libraries">
    <img src="/pwa/icon.svg" alt="Smackerel" class="logo">
  </a>
  <h1>Photo Library</h1>
  <p class="subtitle">Sync state</p>

  <section id="photo-library-detail" class="card" aria-labelledby="photo-library-heading" aria-busy="true" data-endpoint="/v1/photos/connectors/{id}">
    <h2 id="photo-library-heading">Immich</h2>
    <p id="photo-library-status" class="status info" role="status" aria-live="polite">Loading photo library...</p>
    <div id="photo-library-progress" class="scan-progress"></div>
    <ul id="photo-library-skips" class="skipped-review"></ul>
  </section>

  <script src="/pwa/photo-library-detail.js"></script>
</body>
</html>
