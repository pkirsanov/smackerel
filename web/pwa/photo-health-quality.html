<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Photo Health — Quality — Smackerel</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/photo-libraries.html" class="logo-link" aria-label="Back to Photo Libraries">
    <img src="/pwa/icon.svg" alt="Smackerel" class="logo">
  </a>
  <h1>Photo Health: Quality</h1>
  <p class="subtitle">Confidence histogram from on-device classification — feature 040 Scope 3.</p>

  <section id="photo-health-quality" class="card" aria-labelledby="photo-health-quality-heading"
           aria-busy="true" data-endpoint="/v1/photos/health/quality">
    <h2 id="photo-health-quality-heading">Confidence buckets</h2>
    <p id="photo-health-quality-status" class="status info" role="status" aria-live="polite">Loading quality histogram...</p>
    <table id="photo-health-quality-buckets" class="data-table">
      <thead><tr><th>Bucket</th><th>Photos</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="/pwa/photo-health-quality.js"></script>
</body>
</html>
