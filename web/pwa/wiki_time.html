<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Time — Smackerel Wiki</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/wiki.html" class="logo-link" aria-label="Back to Wiki"><img src="/pwa/icon.svg" alt="Smackerel" class="logo"></a>
  <h1 id="wiki-time-heading">Time</h1>
  <p class="subtitle">Artifacts grouped by day in a calendar-style scroll.</p>
  <!-- Spec 073 SCOPE-073-05 — SCN-073-B04. Consumes /api/time?from=&to=. -->

  <section id="wiki-time-section" class="card" aria-labelledby="wiki-time-heading" aria-busy="true" data-endpoint="/api/time">
    <p id="wiki-time-status" class="status info" role="status" aria-live="polite">Loading time view...</p>
    <ol id="wiki-time-days" class="wiki-time-days" role="list" hidden></ol>
  </section>

  <p class="footer"><a href="/pwa/wiki.html">Back to wiki</a></p>
  <script type="module" src="/pwa/wiki_time.js"></script>
</body>
</html>
