<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Connect Photo Libraries — Smackerel</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" href="/pwa/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/pwa/style.css">
</head>
<body>
  <a href="/pwa/photo-libraries.html" class="logo-link" aria-label="Back to Photo Libraries">
    <img src="/pwa/icon.svg" alt="Smackerel" class="logo">
  </a>
  <h1>Photo Libraries</h1>
  <p class="subtitle">Connect Immich</p>

  <form id="photo-library-add" class="card" aria-labelledby="photo-library-add-heading" data-test-endpoint="/v1/photos/connectors/test" data-connect-endpoint="/v1/photos/connectors">
    <h2 id="photo-library-add-heading">Immich</h2>
    <label class="field-label" for="base-url">Base URL</label>
    <input id="base-url" name="base_url" autocomplete="url" required>
    <label class="field-label" for="api-key">API key</label>
    <input id="api-key" name="api_key" type="password" autocomplete="off" required>
    <label class="field-label" for="included-albums">Included albums</label>
    <input id="included-albums" name="included_albums" placeholder="Family, Receipts">
    <label class="field-label" for="excluded-albums">Excluded albums</label>
    <input id="excluded-albums" name="excluded_albums" placeholder="Private">
    <p id="photo-library-add-status" class="status info" role="status" aria-live="polite">Ready</p>
    <div class="connector-card-actions">
      <button type="button" id="test-connection" class="btn">Test</button>
      <button type="submit" class="btn btn-primary">Connect</button>
    </div>
  </form>

  <script src="/pwa/photo-library-add.js"></script>
</body>
</html>
