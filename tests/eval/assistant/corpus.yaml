# Spec 061 SCOPE-10 — offline evaluation corpus.
#
# Source-of-truth contract per design.md §13 item 6:
#   - ≥30 messages per intent label
#   - 5 labels: retrieval, weather, notifications, capture,
#               ambiguous-borderline
#   - ≥150 rows total
#   - Each row carries ground_truth_intent + ground_truth_capture_expected
#   - ground_truth_slots is the per-label slot ground truth (may be empty)
#
# This file is consumed by:
#   - tests/eval/assistant/corpus_validation_test.go (structural)
#   - tests/eval/assistant/harness.go (acceptance run, behind
#     //go:build integration)
#
# Quarterly refresh per design §13. Seeded RNG keeps the harness
# deterministic across runs.
#
# Label rules:
#   - retrieval: questions that should hit the retrieval skill
#                ("What did I save about X?", "Show me my notes on Y")
#   - weather: weather-explicit questions
#   - notifications: notification scheduling / management
#   - capture: messages with no question shape that SHOULD be captured
#              verbatim ("Idea: …", random-noise capture)
#   - ambiguous-borderline: messages whose ground_truth_intent is
#                           explicitly the borderline disambiguation
#                           path; the facade SHOULD ask one clarifying
#                           question OR fall back to capture
#
# ground_truth_capture_expected:
#   - true  → harness MUST observe a capture-fallback path
#   - false → harness MUST observe an answered/proposed path

corpus:
