# Spec 100 F-100-OPT-01 — tiny Ollama-API stub for the e2e-ui browser lane.
#
# Replaces the ~3 GB heavyweight ollama image (SST
# infrastructure.ollama.test.image) for the disposable `smackerel-test-e2e-ui`
# stack ONLY. The browser UI journeys do NOT exercise GPU inference (the
# assistant answer-quality leg is ENV-CONSTRAINED — chaos_saga J5). core/ml
# only need the ollama endpoint to be REACHABLE at boot, NOT functional:
#   - core /api/health checkOllama() does GET <OLLAMA_URL>/api/tags but EXCLUDES
#     ollama from the overall gate and always returns HTTP 200
#     (internal/api/health.go);
#   - ml only requires OLLAMA_URL be a non-empty string — no boot reachability
#     probe (ml/app/main.py::_check_required_config).
#
# So this answers the boot-probe surface with HTTP 200 in ~1s. TEST-ONLY: wired
# only through docker-compose.e2e-ui.override.yml (e2e_ui_compose). Never wired
# into deploy/compose.deploy.yml (real digest-pinned ollama/ollama:rocm) or the
# dev/integration/e2e lanes. Mirrors the tests/e2e/stub-providers nginx pattern.

server {
    # OLLAMA_CONTAINER_PORT (SST infrastructure.ollama.container_port = 11434,
    # the fixed Ollama API port). Inter-container callers reach this via the
    # compose DNS name `ollama`; the host port map is inherited from the base
    # service definition.
    listen 11434 default_server;
    server_name _;

    # JSON is the Ollama API content type; /healthz overrides to text below.
    default_type application/json;

    # Container healthcheck probe (see docker-compose.e2e-ui.override.yml).
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Ollama model inventory — core /api/health checkOllama() GET and the
    # openknowledge discovery adapter GET. An empty list is honest for a stub
    # ("reachable, no models loaded"); the browser lane never runs real
    # inference, so no model is fabricated as available.
    location = /api/tags {
        return 200 '{"models":[]}';
    }
    location = /api/ps {
        return 200 '{"models":[]}';
    }
    location = /api/version {
        return 200 '{"version":"0.0.0-e2e-ui-stub"}';
    }

    # Any other boot-time /api probe (e.g. POST /api/show, /api/generate on the
    # ENV-CONSTRAINED J5 turn) -> 200 empty object so nothing 404s during
    # bring-up. A stub, not an inference engine.
    location /api/ {
        return 200 '{}';
    }

    location = / {
        return 200 '{"stub":"smackerel-e2e-ui-ollama"}';
    }
}
