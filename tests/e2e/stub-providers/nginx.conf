# Spec 061 design §18.4 — Stub HTTP server for external-provider URLs.
# Serves canned JSON fixtures so shell e2e fixtures are hermetic (no
# real-network egress per bubbles-test-environment-isolation).
#
# Route inventory (v1):
#   /healthz                    -> 200 "ok"
#   /v1/search                  -> 200 canned open-meteo geocode JSON
#   /v1/forecast                -> 200 canned open-meteo forecast JSON
#   /always-503/v1/search       -> 503 (BS-006 outage path)
#   /always-503/v1/forecast     -> 503 (BS-006 outage path)
server {
    listen 8080 default_server;
    server_name _;

    # Healthcheck endpoint (compose healthcheck probe).
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # BS-006 outage path. Order matters — these must match BEFORE the
    # /v1/* happy-path routes since `location` longest-prefix wins.
    location = /always-503/v1/search {
        add_header Content-Type application/json always;
        return 503 '{"error":"provider_unavailable"}';
    }
    location = /always-503/v1/forecast {
        add_header Content-Type application/json always;
        return 503 '{"error":"provider_unavailable"}';
    }

    # Open-Meteo geocode happy path. Returns the canned fixture
    # regardless of query string (deterministic for BS-003).
    location = /v1/search {
        add_header Content-Type application/json;
        if ($arg_name ~* "springfield") {
            return 200 '{"results":[{"id":4250542,"name":"Springfield","latitude":39.8017,"longitude":-89.6436,"elevation":182.0,"feature_code":"PPLA2","country_code":"US","admin1_id":4896861,"timezone":"America/Chicago","population":114394,"country_id":6252001,"country":"United States","admin1":"Illinois"},{"id":4409896,"name":"Springfield","latitude":37.2153,"longitude":-93.2982,"elevation":396.0,"feature_code":"PPLA2","country_code":"US","admin1_id":4398678,"timezone":"America/Chicago","population":169176,"country_id":6252001,"country":"United States","admin1":"Missouri"},{"id":4951788,"name":"Springfield","latitude":42.1015,"longitude":-72.5898,"elevation":25.0,"feature_code":"PPLA2","country_code":"US","admin1_id":6254926,"timezone":"America/New_York","population":155929,"country_id":6252001,"country":"United States","admin1":"Massachusetts"}]}';
        }
        alias /usr/share/nginx/html/fixtures/search.json;
    }

    # Open-Meteo forecast happy path. Same shape.
    location = /v1/forecast {
        add_header Content-Type application/json;
        alias /usr/share/nginx/html/fixtures/forecast.json;
    }
}
