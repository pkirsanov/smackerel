# Build/Deploy Contract (SST-derived)
#
# This file is the contract the build pipeline produces and the deploy adapter consumes.
# Adapter scripts MUST NOT read repo source files; they only read this contract +
# their own `<target>/params.yaml` + the published config bundle for the target environment.
#
# This contract describes WHAT (which images, which schema version, what env names exist)
# without prescribing target-specific knobs (which are owned by `<target>/params.yaml`).
contractVersion: 1

project: smackerel

# Application images this project builds. Each image is pulled by digest only.
images:
- name: smackerel-core
  description: Go runtime (HTTP API, NATS bridge, scheduler, graph)
  registry: ghcr.io/pkirsanov/smackerel-core
- name: smackerel-ml
  description: Python ML sidecar (embeddings, LLM gateway, transcript)
  registry: ghcr.io/pkirsanov/smackerel-ml

# Third-party images pinned for reproducibility. NOT built by this project.
# Each entry MAY carry an optional `profile:` field indicating that the image
# is only required when the operator activates that Docker Compose profile.
# Entries without `profile:` are part of the default profile set.
# Drift between this list and `deploy/compose.deploy.yml::services.*.image`
# is locked by `internal/deploy/external_images_contract_test.go` (BUG-049-001).
externalImages:
- name: postgres
  image: pgvector/pgvector:pg16
- name: nats
  image: nats:2.10-alpine
- name: ollama
  image: ollama/ollama:rocm
# Spec 049 — only required when operator enables `--profile monitoring`.
# SST pin: config/smackerel.yaml::monitoring.prometheus.image
- name: prometheus
  image: prom/prometheus:v2.55.1
  profile: monitoring
# Spec 064 SCOPE-17 — only required when operator enables `--profile searxng`
# (driven by environments.<env>.searxng_enabled in config/smackerel.yaml).
# SST pin: config/smackerel.yaml::assistant.open_knowledge.searxng.image
- name: searxng
  image: searxng/searxng:2026.5.30-bd863f16b
  profile: searxng

# Config bundle environments. CI emits one bundle per env, identified by <env>-<sourceSha>.
# Per BUG-047-001 / DEVOPS-HL-002, the published build-manifest-<sourceSha>.yaml
# carries a `sha256:` field next to each `ref:` for adapter-side hash
# verification (Build-Once Deploy-Many: "Missing bundle hash verification |
# Allows tampered config to deploy" in docs/Deployment.md). The adapter
# `apply.sh` MUST verify the pulled bundle's sha256 byte-for-byte against the
# manifest's `sha256:` value before mounting the bundle.
configBundles:
  registry: ghcr.io/pkirsanov/smackerel-config-bundles
  manifestSchema:
    refField: ref
    hashField: sha256
    hashAlgorithm: sha256
  environments:
  - dev
  - test
  - home-lab

# Signing requirements — adapter `apply` MUST verify these before container start.
signing:
  enabled: true
  scheme: cosign-keyless
  transparencyLog: rekor
  attestations:
  - sbom # syft-generated SPDX SBOM
  - provenance # SLSA provenance

# Rollout strategies the project supports. Each adapter declares its strategy in params.yaml.
rolloutStrategies:
- name: recreate
  description: Stop old, start new — brief downtime acceptable
- name: blue-green
  description: Run new alongside old, switch traffic when healthy

# Per-spec SST key catalog (informational + adapter-side rendering contract).
# Each entry names a key in `config/smackerel.yaml` whose resolved value flows
# into the env file that the adapter mounts into the runtime. All keys are
# REQUIRED — the generator and runtime both fail loud on missing or empty
# values (Gate G028, smackerel-no-defaults). Adapters do NOT default these;
# they consume the bundle as-is and inject secrets at apply time via the
# spec 052 secret-injection path.
#
# Drift between this catalog and `config/smackerel.yaml` is operator-visible
# but not currently lockstep-tested; treat the YAML as the SST authority.
sstKeyCatalog:
- spec: 064-open-ended-knowledge-agent
  description: Open-knowledge assistant agent (bounded planner ↔ tool loop)
  keys:
  - path: assistant.open_knowledge.enabled
    type: bool
    secret: false
  - path: assistant.open_knowledge.provider
    type: enum
    allowed: [ searxng, brave, tavily ]
    secret: false
  - path: assistant.open_knowledge.provider_endpoint
    type: string
    secret: false
    notes: Empty string permitted when enabled=false
  - path: assistant.open_knowledge.provider_api_key
    type: string
    secret: true
    notes: Empty permitted for searxng; non-empty required for brave/tavily when enabled. Injected via spec 052 secret-injection path; never committed.
  - path: assistant.open_knowledge.llm_model_id
    type: string
    secret: false
  - path: assistant.open_knowledge.llm_timeout_ms
    type: int
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.max_iterations
    type: int
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.per_query_token_budget
    type: int
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.per_query_usd_budget
    type: float
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.monthly_budget_usd
    type: float
    secret: false
    notes: ">=0 (explicit)"
  - path: assistant.open_knowledge.per_user_monthly_budget_usd
    type: float
    secret: false
    notes: ">=0 (explicit)"
  - path: assistant.open_knowledge.tool_allowlist
    type: string[]
    secret: false
    notes: Deny-by-default; non-empty when enabled. v1 set is internal_retrieval, web_search, unit_convert, calculator.
  - path: assistant.open_knowledge.web_snippet_cache_enabled
    type: bool
    secret: false
  - path: assistant.open_knowledge.allowed_egress_hosts
    type: string[]
    secret: false
    notes: Application-layer egress allowlist. Provider host implicit. Bare hostnames only; no wildcards in v1.
  - path: assistant.open_knowledge.circuit_breaker.failure_threshold
    type: int
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.circuit_breaker.open_window_seconds
    type: int
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.circuit_breaker.half_open_after_seconds
    type: int
    secret: false
    notes: ">0 when enabled"
  - path: assistant.open_knowledge.searxng.image
    type: string
    secret: false
    notes: Pinned upstream tag; never :latest.
  - path: assistant.open_knowledge.searxng.container_port
    type: int
    secret: false
  - path: assistant.open_knowledge.searxng.secret_key
    type: string
    secret: true
    notes: Non-empty; entrypoint substitutes into settings.yml. Operators MUST override the committed dev/test placeholder.
  - path: assistant.open_knowledge.searxng.base_url
    type: string
    secret: false
  perEnvKeys:
  - path: environments.<env>.searxng_enabled
    type: bool
    secret: false
    notes: Flips the searxng Compose profile for the env.
  - path: environments.<env>.searxng_host_port
    type: int
    secret: false
    notes: Host port for ad-hoc dev inspection (loopback bind only).
  - path: environments.<env>.searxng_bind_address
    type: string
    secret: false
    notes: Host bind address; loopback by convention for dev/test.
