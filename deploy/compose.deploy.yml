# Smackerel deployment compose (Build-Once Deploy-Many — bubbles G074)
#
# This file is the ONLY compose surface adapter `apply.sh` is allowed to invoke.
# It is shipped INSIDE every config bundle (config-bundle-<env>-<sourceSha>.tar.gz)
# and extracted into the operator host's `composeDir` before container start.
#
# Contract (NON-NEGOTIABLE):
#   - Container images come from the registry by digest only. SMACKEREL_CORE_IMAGE
#     and SMACKEREL_ML_IMAGE are EXPORTED by apply.sh from --image-core/--image-ml.
#     There are NO `:-` fallback defaults: if either is unset, compose fails loud.
#   - There are NO `build:` blocks. The adapter MUST NOT compile anything.
#   - All file references are relative to this compose file's own directory
#     (i.e. <composeDir>/), populated from the extracted bundle.
#   - Bound host ports come from the extracted env file (./app.env).
#   - Backend services (smackerel-core, smackerel-ml) bind ${HOST_BIND_ADDRESS}
#     on the host. There is NO default — the deploy adapter MUST set
#     HOST_BIND_ADDRESS explicitly in app.env (e.g. 127.0.0.1 for loopback,
#     a tailnet IP for tailnet-edge fronting). Compose fails loud at start
#     time if HOST_BIND_ADDRESS is unset or empty (Gate G028, fail-loud SST
#     — the `${VAR:-default}` form is FORBIDDEN). External exposure is
#     owned by the host reverse proxy (Caddy) running outside this stack —
#     see bubbles/skills/bubbles-tailnet-edge-pattern/SKILL.md and
#     specs/042-tailnet-edge-bind-pattern/.
#   - Infra services (postgres, nats) have NO host port mapping. DevOps reaches
#     them via `tailscale ssh <host> -- docker exec -it <container> ...`
#     (Pattern P1). This closes a small footgun and keeps the persistence
#     boundary off the host network entirely.
#   - Volume names embed the project (env) suffix, e.g. smackerel-home-lab-postgres-data.
#     They are declared in app.env via POSTGRES_VOLUME_NAME etc. so the bundle
#     environment owns the persistence boundary.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # No host port published. DevOps reaches Postgres via:
    #   tailscale ssh <host> -- docker exec -it smackerel-<env>-postgres \
    #       psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
    # See specs/042-tailnet-edge-bind-pattern/ (Pattern P1).
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" pg_isready -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" && PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -Atqc 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived from
          # deploy_resources.postgres.{cpus,memory} via
          # config/generated/<env>.env. Fail-loud per Gate G028:
          # the `${VAR:-default}` form is FORBIDDEN — the deploy
          # adapter MUST emit POSTGRES_CPU_LIMIT and
          # POSTGRES_MEMORY_LIMIT in app.env or compose aborts.
          cpus: "${POSTGRES_CPU_LIMIT:?POSTGRES_CPU_LIMIT must be set by deploy adapter}"
          memory: "${POSTGRES_MEMORY_LIMIT:?POSTGRES_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: postgres
      com.smackerel.lifecycle: persistent
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    command: ["--config", "/etc/nats/nats.conf"]
    # No host port published. DevOps reaches NATS via:
    #   tailscale ssh <host> -- docker exec -it smackerel-<env>-nats \
    #       nats sub '>'    # or any other nats CLI subcommand
    # See specs/042-tailnet-edge-bind-pattern/ (Pattern P1).
    volumes:
      - nats-data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NATS_MONITOR_PORT}/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${NATS_CPU_LIMIT:?NATS_CPU_LIMIT must be set by deploy adapter}"
          memory: "${NATS_MEMORY_LIMIT:?NATS_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: nats
      com.smackerel.lifecycle: ephemeral
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  smackerel-core:
    image: ${SMACKEREL_CORE_IMAGE}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # The Go binary writes nothing under `/`; only `/tmp` (log buffering)
    # is needed. The contract test
    # internal/deploy/compose_filesystem_contract_test.go
    # blocks regression at build time.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${CORE_HOST_PORT}:${CORE_CONTAINER_PORT}"
    env_file:
      - ./app.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: ${CORE_CONTAINER_PORT}
      LOG_LEVEL: info
      AGENT_SCENARIO_DIR: /app/prompt_contracts
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./prompt_contracts:/app/prompt_contracts:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${CORE_CONTAINER_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${CORE_CPU_LIMIT:?CORE_CPU_LIMIT must be set by deploy adapter}"
          memory: "${CORE_MEMORY_LIMIT:?CORE_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: core
      com.smackerel.lifecycle: ephemeral
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  smackerel-ml:
    image: ${SMACKEREL_ML_IMAGE}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${ML_CONTAINER_PORT}"]
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # The HuggingFace caches AND sentence-transformers caches AND uvicorn
    # temp files all live under `/tmp/...` thanks to HF_HOME and
    # SENTENCE_TRANSFORMERS_HOME overrides set in `environment:` below;
    # one 768M tmpfs at `/tmp` absorbs them all and survives container
    # restart with the model re-downloaded on first request.
    read_only: true
    tmpfs:
      - /tmp:size=768m,mode=1777,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${ML_HOST_PORT}:${ML_CONTAINER_PORT}"
    env_file:
      - ./app.env
    environment:
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
      # Spec 045 FR-045-003 — redirect HuggingFace + sentence-transformers
      # caches into the read-only-root tmpfs at /tmp. Without these
      # overrides the libraries default to `~/.cache/huggingface/...`
      # which would attempt to write under `/` and fail at first request.
      HF_HOME: /tmp/hf-cache
      SENTENCE_TRANSFORMERS_HOME: /tmp/st-cache
    volumes:
      - ./prompt_contracts:/app/prompt_contracts:ro
      - ./nats_contract.json:/config/nats_contract.json:ro
    stop_grace_period: 15s
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${ML_CONTAINER_PORT}/health')"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 / FR-045-002 — SST-derived; fail-loud
          # per Gate G028. The Go core Validate() chain ALSO enforces
          # ML_MEMORY_LIMIT against ML_MODEL_MEMORY_PROFILES_JSON so
          # an oversized model can never silently OOM under this cap.
          cpus: "${ML_CPU_LIMIT:?ML_CPU_LIMIT must be set by deploy adapter}"
          memory: "${ML_MEMORY_LIMIT:?ML_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: ml
      com.smackerel.lifecycle: ephemeral
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    image: ollama/ollama:0.23.2
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # Persistent model store stays on the named volume `ollama-data`
    # mounted at /root/.ollama so model downloads survive restarts.
    # Two small tmpfs entries cover the runtime scratch paths the
    # ollama server uses outside that volume.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
      - /.ollama_tmp:size=64m,mode=1777,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    ports:
      # Spec 042: bind via HOST_BIND_ADDRESS — deploy adapter MUST set it (no default; fail-loud per Gate G028).
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${OLLAMA_HOST_PORT}:${OLLAMA_CONTAINER_PORT}"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    # spec 043 / BUG-002 (2026-05-10) — same fix as docker-compose.yml. `wget`
    # is not in ollama/ollama:0.23.2; `ollama list` is. Mirror per BUG-001
    # design.md OQ-BUG-001-A (deploy compose lit-string mirrors the
    # SST-driven docker-compose.yml until a future spec wires ${OLLAMA_IMAGE}
    # substitution into deploy/compose.deploy.yml). Adversarial guard:
    # tests/integration/ollama_healthcheck_test.go.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${OLLAMA_CPU_LIMIT:?OLLAMA_CPU_LIMIT must be set by deploy adapter}"
          memory: "${OLLAMA_MEMORY_LIMIT:?OLLAMA_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: ollama
      com.smackerel.lifecycle: persistent
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # Spec 049 — Monitoring stack (Prometheus). Profile-gated; off by
  # default. The deploy adapter enables it by appending `--profile
  # monitoring` to its compose invocation when the operator wants the
  # monitoring stack live alongside the runtime. Reverse-proxy
  # fronting + Alertmanager wiring + Grafana provisioning all stay in
  # the deploy-adapter overlay (per "No env-specific content").
  #
  # Invariants enforced by internal/deploy/monitoring_*_contract_test.go
  # and the spec 042 / spec 045 contract tests:
  #   - host port uses ${HOST_BIND_ADDRESS:?...} fail-loud SST form
  #   - read_only: true + tmpfs allowlist [/tmp] only
  #   - deploy.resources.limits.cpus/memory use ${PROMETHEUS_*_LIMIT:?...}
  #   - cap_drop: [ALL], no-new-privileges:true
  #   - profile: [monitoring] so it does not start unless requested
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # The TSDB lives on the named volume prometheus-data mounted at
    # /prometheus. Only /tmp is allowlisted as writable tmpfs.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: nobody
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS}d"
      - "--web.listen-address=:${PROMETHEUS_CONTAINER_PORT}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      # Spec 042: bind via HOST_BIND_ADDRESS — deploy adapter MUST set it
      # (no default; fail-loud per Gate G028). The deploy adapter may set
      # HOST_BIND_ADDRESS to a tailnet IP so Prometheus is reachable on
      # the operator's overlay network but never on the broader internet.
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${PROMETHEUS_HOST_PORT}:${PROMETHEUS_CONTAINER_PORT}"
    volumes:
      - prometheus-data:/prometheus
      # prometheus.yml and alerts.yml are extracted from the deploy
      # bundle into <composeDir>/ alongside this compose file.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PROMETHEUS_CONTAINER_PORT}/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${PROMETHEUS_CPU_LIMIT:?PROMETHEUS_CPU_LIMIT must be set by deploy adapter}"
          memory: "${PROMETHEUS_MEMORY_LIMIT:?PROMETHEUS_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: prometheus
      com.smackerel.lifecycle: ephemeral
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME}
  nats-data:
    name: ${NATS_VOLUME_NAME}
  ollama-data:
    name: ${OLLAMA_VOLUME_NAME}
  prometheus-data:
    name: ${PROMETHEUS_VOLUME_NAME}
