# Smackerel deployment compose (Build-Once Deploy-Many — bubbles G074)
#
# This file is the ONLY compose surface adapter `apply.sh` is allowed to invoke.
# It is shipped INSIDE every config bundle (config-bundle-<env>-<sourceSha>.tar.gz)
# and extracted into the operator host's `composeDir` before container start.
#
# Contract (NON-NEGOTIABLE):
#   - Container images come from the registry by digest only. SMACKEREL_CORE_IMAGE
#     and SMACKEREL_ML_IMAGE are EXPORTED by apply.sh from --image-core/--image-ml.
#     There are NO `:-` fallback defaults: if either is unset, compose fails loud.
#   - There are NO `build:` blocks. The adapter MUST NOT compile anything.
#   - All file references are relative to this compose file's own directory
#     (i.e. <composeDir>/), populated from the extracted bundle.
#   - Bound host ports come from the extracted env file (./app.env).
#   - Backend services (smackerel-core, smackerel-ml) bind ${HOST_BIND_ADDRESS}
#     on the host. There is NO default — the deploy adapter MUST set
#     HOST_BIND_ADDRESS explicitly in app.env (e.g. 127.0.0.1 for loopback,
#     a tailnet IP for tailnet-edge fronting). Compose fails loud at start
#     time if HOST_BIND_ADDRESS is unset or empty (Gate G028, fail-loud SST
#     — the `${VAR:-default}` form is FORBIDDEN). External exposure is
#     owned by the host reverse proxy (Caddy) running outside this stack —
#     see bubbles/skills/bubbles-tailnet-edge-pattern/SKILL.md and
#     specs/042-tailnet-edge-bind-pattern/.
#   - Infra services (postgres, nats) have NO host port mapping. DevOps reaches
#     them via `tailscale ssh <host> -- docker exec -it <container> ...`
#     (Pattern P1). This closes a small footgun and keeps the persistence
#     boundary off the host network entirely.
#   - Volume names embed the project (env) suffix, e.g. smackerel-home-lab-postgres-data.
#     They are declared in app.env via POSTGRES_VOLUME_NAME etc. so the bundle
#     environment owns the persistence boundary.

services:
  postgres:
    # Spec 082 SCOPE-082-06 — pinned by sha256 digest (verified 2026-06-10)
    # for supply-chain reproducibility. Byte-for-byte lockstep with
    # deploy/contract.yaml::externalImages (external_images_contract_test.go).
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # No host port published. DevOps reaches Postgres via:
    #   tailscale ssh <host> -- docker exec -it smackerel-<env>-postgres \
    #       psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
    # See specs/042-tailnet-edge-bind-pattern/ (Pattern P1).
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" pg_isready -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" && PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -Atqc 'SELECT 1'" ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived from
          # deploy_resources.postgres.{cpus,memory} via
          # config/generated/<env>.env. Fail-loud per Gate G028:
          # the `${VAR:-default}` form is FORBIDDEN — the deploy
          # adapter MUST emit POSTGRES_CPU_LIMIT and
          # POSTGRES_MEMORY_LIMIT in app.env or compose aborts.
          cpus: "${POSTGRES_CPU_LIMIT:?POSTGRES_CPU_LIMIT must be set by deploy adapter}"
          memory: "${POSTGRES_MEMORY_LIMIT:?POSTGRES_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: postgres
      com.smackerel.lifecycle: persistent
      # knb spec 014 scope 03 — shared-observability discovery labels. product
      # is SST-sourced (METRICS_SCRAPE_LABEL_PRODUCT); service is the per-
      # container identity the shared Prometheus docker_sd scopes smackerel by.
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: postgres
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nats:
    # Spec 082 SCOPE-082-06 — pinned by sha256 digest (verified 2026-06-10).
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    command: [ "--config", "/etc/nats/nats.conf" ]
    # No host port published. DevOps reaches NATS via:
    #   tailscale ssh <host> -- docker exec -it smackerel-<env>-nats \
    #       nats sub '>'    # or any other nats CLI subcommand
    # See specs/042-tailnet-edge-bind-pattern/ (Pattern P1).
    volumes:
      - nats-data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NATS_MONITOR_PORT}/healthz" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${NATS_CPU_LIMIT:?NATS_CPU_LIMIT must be set by deploy adapter}"
          memory: "${NATS_MEMORY_LIMIT:?NATS_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: nats
      # Spec 082 SCOPE-082-04 — JetStream persists at-least-once in-flight
      # capture state (events accepted but not yet processed by core) to the
      # nats-data named volume. It MUST survive a `./smackerel.sh clean` /
      # `down` on a running home-lab stack, so it is labelled `persistent`
      # (was `ephemeral`, which marked it as fair game for cleanup and risked
      # wiping queued captures). The clean tooling preserves volumes whose
      # component is labelled persistent.
      com.smackerel.lifecycle: persistent
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: nats
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  smackerel-core:
    image: ${SMACKEREL_CORE_IMAGE:?SMACKEREL_CORE_IMAGE must be set by the deploy adapter at apply}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # The Go binary writes nothing under `/`; only `/tmp` (log buffering)
    # is needed. The contract test
    # internal/deploy/compose_filesystem_contract_test.go
    # blocks regression at build time.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${CORE_HOST_PORT}:${CORE_CONTAINER_PORT}"
    env_file:
      - ./app.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: ${CORE_CONTAINER_PORT}
      LOG_LEVEL: info
      AGENT_SCENARIO_DIR: /app/prompt_contracts
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./prompt_contracts:/app/prompt_contracts:ro
      # Spec 061 SUBSTRATE-TOUCHPOINT-1 Option (b): sibling skills manifest
      # for the conversational assistant capability layer. The runtime
      # resolves the manifest at `filepath.Dir(AGENT_SCENARIO_DIR)/assistant/scenarios.yaml`
      # so the mount target MUST be a sibling of /app/prompt_contracts.
      - ./assistant:/app/assistant:ro
      # Spec 048 (F-3) — bind-mount the absolute host backup dir so the
      # backup-status watcher (cmd/core -> internal/backup.Watcher) can read the
      # status JSON the deploy-adapter's backup hook writes after each run,
      # advancing smackerel_backup_last_success_unixtime for SmackerelBackupStale.
      # Per docs/Deployment.md Spec-048 "Bind mounts": the deploy adapter MUST
      # pin BACKUP_LOCAL_DIR to an absolute host path (fail-loud ${VAR:?} form)
      # and bind it at the SAME path so the container's BACKUP_STATUS_FILE
      # resolves identically inside and out. Read-only: core only READS the
      # status file. Target-agnostic — the absolute value is adapter-owned
      # (No env-specific content in this repo).
      - "${BACKUP_LOCAL_DIR:?BACKUP_LOCAL_DIR must be set by deploy adapter}:${BACKUP_LOCAL_DIR}:ro"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${CORE_CONTAINER_PORT}/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${CORE_CPU_LIMIT:?CORE_CPU_LIMIT must be set by deploy adapter}"
          memory: "${CORE_MEMORY_LIMIT:?CORE_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: core
      com.smackerel.lifecycle: ephemeral
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: core
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  smackerel-ml:
    image: ${SMACKEREL_ML_IMAGE:?SMACKEREL_ML_IMAGE must be set by the deploy adapter at apply}
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${ML_CONTAINER_PORT}" ]
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # Spec 082 SCOPE-082-03 — the HuggingFace + sentence-transformers model
    # caches now live on the PERSISTENT named volume `ml-model-cache`
    # mounted at /home/smackerel/.cache (the image's baked cache path; the
    # ML image runs as non-root USER smackerel and bakes the embedding
    # model there at build time — ml/Dockerfile). Docker initializes the
    # fresh named volume FROM the image content on first mount, so the model
    # is present with correct ownership and is NOT re-downloaded from
    # HuggingFace on restart (the prior /tmp tmpfs override both ignored the
    # baked model and lost it on restart). The /tmp tmpfs now only absorbs
    # uvicorn scratch, so it is shrunk to 128M.
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${ML_HOST_PORT}:${ML_CONTAINER_PORT}"
    env_file:
      - ./app.env
    environment:
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
      # Spec 045 FR-045-003 + Spec 082 SCOPE-082-03 — point the HuggingFace +
      # sentence-transformers caches at the PERSISTENT ml-model-cache volume
      # mounted at /home/smackerel/.cache (matching the image's baked ENV).
      # Without an override the libraries default to these same paths, but
      # the read-only root would reject writes; the persistent mount makes
      # them writable AND durable. The prior /tmp form re-downloaded the
      # model on every restart (external HuggingFace dependency on the
      # reboot-recovery path) — removed.
      HF_HOME: /home/smackerel/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /home/smackerel/.cache/sentence-transformers
    volumes:
      - ./prompt_contracts:/app/prompt_contracts:ro
      - ./nats_contract.json:/config/nats_contract.json:ro
      # Spec 082 SCOPE-082-03 — persistent embedding-model cache (mounted at
      # the image's baked cache path so the model survives restarts).
      - ml-model-cache:/home/smackerel/.cache
    stop_grace_period: 15s
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${ML_CONTAINER_PORT}/health')" ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 / FR-045-002 — SST-derived; fail-loud
          # per Gate G028. The Go core Validate() chain ALSO enforces
          # ML_MEMORY_LIMIT against ML_MODEL_MEMORY_PROFILES_JSON so
          # an oversized model can never silently OOM under this cap.
          cpus: "${ML_CPU_LIMIT:?ML_CPU_LIMIT must be set by deploy adapter}"
          memory: "${ML_MEMORY_LIMIT:?ML_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: ml
      com.smackerel.lifecycle: ephemeral
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: ml
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    # Spec 082 SCOPE-082-06 — pinned by sha256 digest (verified 2026-06-10).
    image: ollama/ollama:rocm@sha256:e658cf94b88ef88aa0868bc5900e6f83ccf77262ef2ca582601161f865a2b080
    restart: unless-stopped
    devices:
      # AMD ROCm — required for GPU inference on home-lab (Radeon 8060S iGPU,
      # gfx1151 / Strix Halo). Without these the daemon falls back to 100% CPU
      # and the 26B model can't fit within scenario budgets. /dev/kfd is the
      # kernel fusion driver IPC node; /dev/dri exposes the render node.
      - /dev/kfd
      - /dev/dri
    group_add:
      # Spec 082 SCOPE-082-09 — render + video host GIDs needed to access
      # /dev/dri/renderD128. These are HOST-SPECIFIC (a different distro/host
      # assigns different render/video GIDs) — exactly the "value that changes
      # when a different operator deploys" that the no-env-specific-content +
      # deployment-ownership-boundary policy forbids as literals in this
      # generic compose. They are routed to adapter-supplied fail-loud env
      # vars (Gate G028, no silent default): the deploy adapter MUST emit
      # OLLAMA_RENDER_GID and OLLAMA_VIDEO_GID into app.env (resolved from
      # `getent group render` / `getent group video` on the real host) or
      # compose aborts at substitution time. The HSA/HCC gfx env literals
      # below stay generic because they describe the GPU CLASS, not the host.
      - "${OLLAMA_RENDER_GID:?OLLAMA_RENDER_GID must be set by deploy adapter (host render group GID, e.g. getent group render)}"
      - "${OLLAMA_VIDEO_GID:?OLLAMA_VIDEO_GID must be set by deploy adapter (host video group GID, e.g. getent group video)}"
    environment:
      # Daemon-side model keep-alive default; SST-derived per
      # infrastructure.ollama.keep_alive (config/smackerel.yaml). Without this
      # the daemon evicts loaded models after its 5-minute internal default,
      # causing every sporadic /weather or /ask call to incur a multi-second
      # cold reload.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:?OLLAMA_KEEP_ALIVE must be set by deploy adapter (infrastructure.ollama.keep_alive)}
      # AMD ROCm gfx1151 (Strix Halo Radeon 8060S) is not in the stock ROCm
      # target list; the override pins HSA to the closest supported family so
      # the daemon picks the iGPU instead of CPU. HCC target keeps the same
      # value for any kernel that compiles at runtime.
      HSA_OVERRIDE_GFX_VERSION: "11.5.1"
      HCC_AMDGPU_TARGET: "gfx1151"
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # Persistent model store stays on the named volume `ollama-data`
    # mounted at /root/.ollama so model downloads survive restarts.
    # Two small tmpfs entries cover the runtime scratch paths the
    # ollama server uses outside that volume.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
      - /.ollama_tmp:size=64m,mode=1777,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    ports:
      # Spec 042: bind via HOST_BIND_ADDRESS — deploy adapter MUST set it (no default; fail-loud per Gate G028).
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${OLLAMA_HOST_PORT}:${OLLAMA_CONTAINER_PORT}"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    # spec 043 / BUG-002 (2026-05-10) — same fix as docker-compose.yml. `wget`
    # is not in ollama/ollama:0.23.2; `ollama list` is. Mirror per BUG-001
    # design.md OQ-BUG-001-A (deploy compose lit-string mirrors the
    # SST-driven docker-compose.yml until a future spec wires ${OLLAMA_IMAGE}
    # substitution into deploy/compose.deploy.yml). Adversarial guard:
    # tests/integration/ollama_healthcheck_test.go.
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${OLLAMA_CPU_LIMIT:?OLLAMA_CPU_LIMIT must be set by deploy adapter}"
          memory: "${OLLAMA_MEMORY_LIMIT:?OLLAMA_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: ollama
      com.smackerel.lifecycle: persistent
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: ollama
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # Spec 049 — Monitoring stack (Prometheus). Profile-gated; off by
  # default. The deploy adapter enables it by appending `--profile
  # monitoring` to its compose invocation when the operator wants the
  # monitoring stack live alongside the runtime. Reverse-proxy
  # fronting + Alertmanager wiring + Grafana provisioning all stay in
  # the deploy-adapter overlay (per "No env-specific content").
  #
  # Invariants enforced by internal/deploy/monitoring_*_contract_test.go
  # and the spec 042 / spec 045 contract tests:
  #   - host port uses ${HOST_BIND_ADDRESS:?...} fail-loud SST form
  #   - read_only: true + tmpfs allowlist [/tmp] only
  #   - deploy.resources.limits.cpus/memory use ${PROMETHEUS_*_LIMIT:?...}
  #   - cap_drop: [ALL], no-new-privileges:true
  #   - profile: [monitoring] so it does not start unless requested
  prometheus:
    image: ${PROMETHEUS_IMAGE:?PROMETHEUS_IMAGE must be set when the monitoring profile is enabled}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # The TSDB lives on the named volume prometheus-data mounted at
    # /prometheus. Only /tmp is allowlisted as writable tmpfs.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: nobody
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS}d"
      - "--web.listen-address=:${PROMETHEUS_CONTAINER_PORT}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      # Spec 042: bind via HOST_BIND_ADDRESS — deploy adapter MUST set it
      # (no default; fail-loud per Gate G028). The deploy adapter may set
      # HOST_BIND_ADDRESS to a tailnet IP so Prometheus is reachable on
      # the operator's overlay network but never on the broader internet.
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${PROMETHEUS_HOST_PORT}:${PROMETHEUS_CONTAINER_PORT}"
    volumes:
      - prometheus-data:/prometheus
      # prometheus.yml and alerts.yml are extracted from the deploy
      # bundle into <composeDir>/ alongside this compose file.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    profiles:
      - monitoring
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PROMETHEUS_CONTAINER_PORT}/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          # Spec 045 FR-045-001 — SST-derived; fail-loud per Gate G028.
          cpus: "${PROMETHEUS_CPU_LIMIT:?PROMETHEUS_CPU_LIMIT must be set by deploy adapter}"
          memory: "${PROMETHEUS_MEMORY_LIMIT:?PROMETHEUS_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: prometheus
      com.smackerel.lifecycle: ephemeral
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: prometheus
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # Spec 064 SCOPE-17 — SearxNG self-hosted web search backend for the
  # open-knowledge agent. Opt-in via the `searxng` Compose profile;
  # ENABLE_SEARXNG=true in the deploy env file (driven by
  # environments.<env>.searxng_enabled in config/smackerel.yaml) makes
  # ./smackerel.sh up include the profile.
  searxng:
    image: ${SEARXNG_IMAGE:?SEARXNG_IMAGE must be set by deploy adapter}
    restart: unless-stopped
    profiles:
      - searxng
    security_opt:
      - no-new-privileges:true
    # SearxNG entrypoint needs to chown /etc/searxng on first start, so
    # we keep the default Linux capabilities (no cap_drop). Read-only
    # root + tmpfs on writable paths still satisfy FR-045-003.
    read_only: true
    tmpfs:
      - /etc/searxng:size=4m,mode=1777,nosuid,nodev
      - /var/cache/searxng:size=64m,mode=1777,nosuid,noexec,nodev
      - /var/log/searxng:size=16m,mode=1777,nosuid,noexec,nodev
      - /tmp:size=32m,mode=1777,nosuid,noexec,nodev
    ports:
      - "${HOST_BIND_ADDRESS:?HOST_BIND_ADDRESS must be set by deploy adapter}:${SEARXNG_HOST_PORT:?SEARXNG_HOST_PORT must be set by deploy adapter}:${SEARXNG_CONTAINER_PORT:?SEARXNG_CONTAINER_PORT must be set by deploy adapter}"
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?SEARXNG_SECRET must be set by deploy adapter}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:?SEARXNG_BASE_URL must be set by deploy adapter}
      SEARXNG_PORT: ${SEARXNG_CONTAINER_PORT}
      SEARXNG_BIND_ADDRESS: "0.0.0.0"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${SEARXNG_CONTAINER_PORT}/healthz" ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    deploy:
      resources:
        limits:
          # Spec 082 SCOPE-082-05 — SST-derived; fail-loud per Gate G028.
          # Was a hardcoded `memory: 256M` with NO cpus cap, drifting from
          # the spec-045 resource contract every other service follows.
          cpus: "${SEARXNG_CPU_LIMIT:?SEARXNG_CPU_LIMIT must be set by deploy adapter}"
          memory: "${SEARXNG_MEMORY_LIMIT:?SEARXNG_MEMORY_LIMIT must be set by deploy adapter}"
    labels:
      com.smackerel.component: searxng
      com.smackerel.lifecycle: ephemeral
      com.bubbles.product: ${METRICS_SCRAPE_LABEL_PRODUCT}
      com.bubbles.service: searxng
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME}
  nats-data:
    name: ${NATS_VOLUME_NAME}
  ollama-data:
    name: ${OLLAMA_VOLUME_NAME}
  prometheus-data:
    name: ${PROMETHEUS_VOLUME_NAME}
  # Spec 082 SCOPE-082-03 — persistent embedding-model cache for smackerel-ml.
  # Initialized from the image's baked /home/smackerel/.cache on first mount
  # so the embedding model is never re-downloaded from HuggingFace on restart.
  ml-model-cache:
    name: ${ML_MODEL_CACHE_VOLUME_NAME}
    labels:
      com.smackerel.lifecycle: persistent
