<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Smackerel Favicon: compact honey pot -->
  <defs>
    <style>
      .s { stroke: #1a1a18; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .d { fill: #1a1a18; }
      @media (prefers-color-scheme: dark) {
        .s { stroke: #e8e8e4; }
        .d { fill: #e8e8e4; }
      }
    </style>
  </defs>

  <!-- Pot body -->
  <path class="s" stroke-width="1.5"
        d="M10 13
           C8.5 13, 7 15, 7 17.5
           C7 21, 8 24.5, 10 26.5
           C12 28.5, 14 29, 16 29
           C18 29, 20 28.5, 22 26.5
           C24 24.5, 25 21, 25 17.5
           C25 15, 23.5 13, 22 13Z"/>

  <!-- Rim -->
  <ellipse class="s" stroke-width="1.5" cx="16" cy="13" rx="7" ry="1.8"/>

  <!-- Label band -->
  <path class="s" stroke-width="0.9" d="M9 19 C9 19, 12.5 18, 16 18 C19.5 18, 23 19, 23 19"/>
  <path class="s" stroke-width="0.9" d="M9.5 22 C9.5 22, 12.5 21, 16 21 C19.5 21, 22.5 22, 22.5 22"/>

  <!-- Honey drip -->
  <path class="s" stroke-width="1.2" d="M13 11 C13 10, 13.5 8.5, 13 7"/>
  <circle class="d" cx="13" cy="6.2" r="1"/>

  <!-- Dipper -->
  <line class="s" stroke-width="1.4" x1="20" y1="5" x2="15" y2="12"/>
  <path class="s" stroke-width="1.2" d="M18.5 6 C19.5 5.3, 20.8 5.6, 21.3 6.8 C21.8 8, 21.3 9, 20.2 9.5"/>

  <!-- Honeycomb nodes -->
  <polygon class="s" stroke-width="0.8" points="4,8 5.5,7 7,8 7,10 5.5,11 4,10"/>
  <polygon class="s" stroke-width="0.8" points="25,6 26.5,5 28,6 28,8 26.5,9 25,8"/>
  <line class="s" stroke-width="0.5" opacity="0.3" x1="5.5" y1="10" x2="9" y2="13"/>
  <line class="s" stroke-width="0.5" opacity="0.3" x1="26.5" y1="8" x2="23" y2="13"/>
</svg>
