<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 128" fill="none">
  <!-- Smackerel Logotype: honey pot mark + wordmark -->
  <defs>
    <style>
      .stroke { stroke: #1a1a18; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1a1a18; }
      .text { fill: #1a1a18; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      @media (prefers-color-scheme: dark) {
        .stroke { stroke: #e8e8e4; }
        .dot { fill: #e8e8e4; }
        .text { fill: #e8e8e4; }
      }
    </style>
  </defs>

  <!-- Honey pot mark (scaled down) -->
  <g transform="translate(6, 10) scale(0.84)">
    <!-- Pot body -->
    <path class="stroke" stroke-width="2.8"
          d="M40 50
             C34 50, 28 56, 28 66
             C28 80, 32 92, 40 100
             C48 108, 56 110, 64 110
             C72 110, 80 108, 88 100
             C96 92, 100 80, 100 66
             C100 56, 94 50, 88 50Z"/>
    <!-- Rim -->
    <ellipse class="stroke" stroke-width="2.8" cx="64" cy="50" rx="28" ry="6"/>
    <!-- Label band -->
    <path class="stroke" stroke-width="1.8" d="M36 72 C36 72, 50 68, 64 68 C78 68, 92 72, 92 72"/>
    <path class="stroke" stroke-width="1.8" d="M38 82 C38 82, 50 78, 64 78 C78 78, 90 82, 90 82"/>
    <!-- S mark -->
    <path class="stroke" stroke-width="2.2" d="M58 72 C62 70, 68 70, 68 73 C68 76, 58 76, 58 79 C58 82, 64 82, 68 80"/>
    <!-- Honey drip -->
    <path class="stroke" stroke-width="2"
          d="M50 44 C50 40, 52 36, 52 32 C52 28, 48 26, 48 22"/>
    <circle class="dot" cx="48" cy="20" r="2.5"/>
    <!-- Dipper -->
    <line class="stroke" stroke-width="2.5" x1="76" y1="18" x2="56" y2="46"/>
    <path class="stroke" stroke-width="2" d="M72 22 C75 20, 78 21, 80 24 C82 27, 81 30, 78 32"/>
    <path class="stroke" stroke-width="1.3" d="M74 24 L79 27"/>
    <path class="stroke" stroke-width="1.3" d="M74 27 L78 30"/>
    <!-- Honeycomb nodes -->
    <polygon class="stroke" stroke-width="1.3" points="20,28 25,25 30,28 30,34 25,37 20,34"/>
    <polygon class="stroke" stroke-width="1.3" points="30,18 35,15 40,18 40,24 35,27 30,24"/>
    <line class="stroke" stroke-width="0.9" opacity="0.35" x1="25" y1="25" x2="35" y2="24"/>
    <line class="stroke" stroke-width="0.8" opacity="0.2" x1="25" y1="34" x2="38" y2="50"/>
  </g>

  <!-- Wordmark -->
  <text class="text" x="118" y="76" font-size="42" font-weight="300" letter-spacing="3">smackerel</text>

  <!-- Tagline -->
  <text class="text" x="120" y="96" font-size="11" font-weight="400" letter-spacing="4" opacity="0.5">A SMACKEREL OF EVERYTHING</text>
</svg>
