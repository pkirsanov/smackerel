<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Smackerel Logo Mark: honey pot with honeycomb knowledge-graph nodes -->
  <defs>
    <style>
      .stroke { stroke: #1a1a18; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1a1a18; }
      @media (prefers-color-scheme: dark) {
        .stroke { stroke: #e8e8e4; }
        .dot { fill: #e8e8e4; }
      }
    </style>
  </defs>

  <!-- Honey pot body -->
  <path class="stroke" stroke-width="2.5"
        d="M40 50
           C34 50, 28 56, 28 66
           C28 80, 32 92, 40 100
           C48 108, 56 110, 64 110
           C72 110, 80 108, 88 100
           C96 92, 100 80, 100 66
           C100 56, 94 50, 88 50Z"/>

  <!-- Pot rim / lip -->
  <ellipse class="stroke" stroke-width="2.5" cx="64" cy="50" rx="28" ry="6"/>

  <!-- Pot label band -->
  <path class="stroke" stroke-width="1.5" d="M36 72 C36 72, 50 68, 64 68 C78 68, 92 72, 92 72"/>
  <path class="stroke" stroke-width="1.5" d="M38 82 C38 82, 50 78, 64 78 C78 78, 90 82, 90 82"/>

  <!-- "S" on the pot (for Smackerel) -->
  <path class="stroke" stroke-width="2" d="M58 72 C62 70, 68 70, 68 73 C68 76, 58 76, 58 79 C58 82, 64 82, 68 80"/>

  <!-- Honey drip from rim -->
  <path class="stroke" stroke-width="2"
        d="M50 44 C50 40, 52 36, 52 32
           C52 28, 48 26, 48 22"/>
  <circle class="dot" cx="48" cy="20" r="2.5"/>

  <!-- Honey dipper leaning on pot -->
  <line class="stroke" stroke-width="2.5" x1="76" y1="18" x2="56" y2="46"/>
  <!-- Dipper head grooves -->
  <path class="stroke" stroke-width="1.8" d="M72 22 C75 20, 78 21, 80 24 C82 27, 81 30, 78 32"/>
  <path class="stroke" stroke-width="1.2" d="M74 24 L79 27"/>
  <path class="stroke" stroke-width="1.2" d="M74 27 L78 30"/>

  <!-- Honeycomb knowledge-graph nodes (hexagonal) -->
  <polygon class="stroke" stroke-width="1.2" points="20,28 25,25 30,28 30,34 25,37 20,34"/>
  <polygon class="stroke" stroke-width="1.2" points="30,18 35,15 40,18 40,24 35,27 30,24"/>
  <line class="stroke" stroke-width="0.8" opacity="0.4" x1="25" y1="25" x2="35" y2="24"/>

  <polygon class="stroke" stroke-width="1.2" points="100,30 105,27 110,30 110,36 105,39 100,36"/>
  <polygon class="stroke" stroke-width="1.2" points="110,20 115,17 120,20 120,26 115,29 110,26"/>
  <line class="stroke" stroke-width="0.8" opacity="0.4" x1="105" y1="27" x2="115" y2="26"/>

  <!-- Bottom knowledge nodes -->
  <circle class="dot" cx="22" cy="100" r="2.5"/>
  <circle class="dot" cx="12" cy="88" r="2"/>
  <circle class="dot" cx="106" cy="98" r="2.5"/>
  <circle class="dot" cx="116" cy="86" r="2"/>

  <!-- Connection lines from nodes to pot -->
  <line class="stroke" stroke-width="0.75" opacity="0.25" x1="25" y1="34" x2="38" y2="50"/>
  <line class="stroke" stroke-width="0.75" opacity="0.25" x1="105" y1="36" x2="92" y2="50"/>
  <line class="stroke" stroke-width="0.75" opacity="0.25" x1="22" y1="100" x2="38" y2="100"/>
  <line class="stroke" stroke-width="0.75" opacity="0.25" x1="106" y1="98" x2="90" y2="100"/>
  <line class="stroke" stroke-width="0.8" opacity="0.4" x1="12" y1="88" x2="22" y2="100"/>
  <line class="stroke" stroke-width="0.8" opacity="0.4" x1="116" y1="86" x2="106" y2="98"/>
</svg>
