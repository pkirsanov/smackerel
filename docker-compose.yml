# Smackerel Docker Compose
# Runtime env is generated via ./smackerel.sh config generate

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" pg_isready -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" && PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -Atqc 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      com.smackerel.component: postgres
      com.smackerel.lifecycle: persistent

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    command: ["--config", "/etc/nats/nats.conf"]
    ports:
      - "127.0.0.1:${NATS_CLIENT_HOST_PORT}:${NATS_CLIENT_PORT}"
      - "127.0.0.1:${NATS_MONITOR_HOST_PORT}:${NATS_MONITOR_PORT}"
    volumes:
      - nats-data:/data
      - ./config/generated/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NATS_MONITOR_PORT}/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      com.smackerel.component: nats
      com.smackerel.lifecycle: ephemeral

  smackerel-core:
    image: ${SMACKEREL_CORE_IMAGE:-}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${SMACKEREL_VERSION:-dev}
        COMMIT_HASH: ${SMACKEREL_COMMIT:-unknown}
        BUILD_TIME: ${SMACKEREL_BUILD_TIME:-unknown}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${CORE_HOST_PORT}:${CORE_CONTAINER_PORT}"
    env_file:
      - ${SMACKEREL_ENV_FILE:-config/generated/dev.env}
    environment:
      # Override host paths with container-internal mount paths.
      # The env_file provides the host path; these overrides point to the
      # volume-mounted location inside the container.
      PORT: ${CORE_CONTAINER_PORT}
      BOOKMARKS_IMPORT_DIR: ${BOOKMARKS_IMPORT_DIR:+/data/bookmarks-import}
      MAPS_IMPORT_DIR: ${MAPS_IMPORT_DIR:+/data/maps-import}
      BROWSER_HISTORY_PATH: ${BROWSER_HISTORY_PATH:+/data/browser-history/History}
      TWITTER_ARCHIVE_DIR: ${TWITTER_ARCHIVE_DIR:+/data/twitter-archive}
      # Prompt contract YAMLs are mounted read-only at the container path below;
      # generated env values point at host paths, so override them for the
      # container view.
      AGENT_SCENARIO_DIR: /app/prompt_contracts
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ${BOOKMARKS_IMPORT_DIR:-./data/bookmarks-import}:/data/bookmarks-import:ro
      - ${MAPS_IMPORT_DIR:-./data/maps-import}:/data/maps-import:ro
      - ${BROWSER_HISTORY_PATH:-./data/browser-history/History}:/data/browser-history/History:ro
      - ${TWITTER_ARCHIVE_DIR:-./data/twitter-archive}:/data/twitter-archive:ro
      # Spec 037 Scope 10: scenario YAMLs read-only — paired with the
      # AGENT_SCENARIO_DIR override in `environment:` above. Operators
      # drop new YAMLs in the host dir and SIGHUP triggers Bridge.Reload.
      - ./config/prompt_contracts:/app/prompt_contracts:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${CORE_CONTAINER_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      com.smackerel.component: core
      com.smackerel.lifecycle: ephemeral

  smackerel-ml:
    image: ${SMACKEREL_ML_IMAGE:-}
    build:
      context: ./ml
      dockerfile: Dockerfile
      args:
        VERSION: ${SMACKEREL_VERSION:-dev}
        COMMIT_HASH: ${SMACKEREL_COMMIT:-unknown}
        BUILD_TIME: ${SMACKEREL_BUILD_TIME:-unknown}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${ML_CONTAINER_PORT}"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${ML_HOST_PORT}:${ML_CONTAINER_PORT}"
    env_file:
      - ${SMACKEREL_ENV_FILE:-config/generated/dev.env}
    environment:
      # Override: container-internal path for prompt contracts (mounted via volume)
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
    volumes:
      - ./config/prompt_contracts:/app/prompt_contracts:ro
      - ./config/nats_contract.json:/config/nats_contract.json:ro
    stop_grace_period: 15s
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${ML_CONTAINER_PORT}/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
    labels:
      com.smackerel.component: ml
      com.smackerel.lifecycle: ephemeral

  ollama:
    image: ollama/ollama:0.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT}:${OLLAMA_CONTAINER_PORT}"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${OLLAMA_CONTAINER_PORT}/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
    labels:
      com.smackerel.component: ollama
      com.smackerel.lifecycle: persistent

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME}
  nats-data:
    name: ${NATS_VOLUME_NAME}
  ollama-data:
    name: ${OLLAMA_VOLUME_NAME}
