# Smackerel Docker Compose
# Runtime env is generated via ./smackerel.sh config generate

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      com.smackerel.component: postgres
      com.smackerel.lifecycle: persistent

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "${NATS_MONITOR_PORT}"]
    ports:
      - "${NATS_CLIENT_HOST_PORT}:${NATS_CLIENT_PORT}"
      - "${NATS_MONITOR_HOST_PORT}:${NATS_MONITOR_PORT}"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NATS_MONITOR_PORT}/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      com.smackerel.component: nats
      com.smackerel.lifecycle: ephemeral

  smackerel-core:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CORE_HOST_PORT}:${CORE_CONTAINER_PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: ${NATS_URL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      SMACKEREL_AUTH_TOKEN: ${SMACKEREL_AUTH_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS}
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      DIGEST_CRON: ${DIGEST_CRON}
      LOG_LEVEL: ${LOG_LEVEL}
      PORT: ${CORE_CONTAINER_PORT}
      ML_SIDECAR_URL: ${ML_SIDECAR_URL}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${CORE_CONTAINER_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      com.smackerel.component: core
      com.smackerel.lifecycle: ephemeral

  smackerel-ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${ML_CONTAINER_PORT}"]
    restart: unless-stopped
    ports:
      - "${ML_HOST_PORT}:${ML_CONTAINER_PORT}"
    environment:
      NATS_URL: ${NATS_URL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      OLLAMA_URL: ${OLLAMA_URL}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${ML_CONTAINER_PORT}/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
    labels:
      com.smackerel.component: ml
      com.smackerel.lifecycle: ephemeral

  ollama:
    image: ollama/ollama:0.6
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT}:${OLLAMA_CONTAINER_PORT}"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    deploy:
      resources:
        limits:
          memory: 8G
    labels:
      com.smackerel.component: ollama
      com.smackerel.lifecycle: persistent

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME}
  nats-data:
    name: ${NATS_VOLUME_NAME}
  ollama-data:
    name: ${OLLAMA_VOLUME_NAME}
