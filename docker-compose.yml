# Smackerel Docker Compose
# Runtime env is generated via ./smackerel.sh config generate

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" pg_isready -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" && PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -p ${POSTGRES_CONTAINER_PORT} -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -Atqc 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      com.smackerel.component: postgres
      com.smackerel.lifecycle: persistent

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    command: ["--config", "/etc/nats/nats.conf"]
    ports:
      - "127.0.0.1:${NATS_CLIENT_HOST_PORT}:${NATS_CLIENT_PORT}"
      - "127.0.0.1:${NATS_MONITOR_HOST_PORT}:${NATS_MONITOR_PORT}"
    volumes:
      - nats-data:/data
      - ./config/generated/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NATS_MONITOR_PORT}/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      com.smackerel.component: nats
      com.smackerel.lifecycle: ephemeral

  smackerel-core:
    # HL-RESCAN-012 / Gate G028 — fail-loud SST form. Empty value is
    # allowed (build-from-source dev pattern); unset is forbidden.
    image: ${SMACKEREL_CORE_IMAGE?must be set in env file (run ./smackerel.sh config generate); empty value is allowed for build-from-source dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # HL-RESCAN-012 / Gate G028 — build metadata is SST-managed; the
        # generator (scripts/commands/config.sh) emits SMACKEREL_VERSION /
        # SMACKEREL_COMMIT / SMACKEREL_BUILD_TIME into the env file with
        # CI overrides resolved. Fail-loud here defends against env-file
        # drift.
        VERSION: ${SMACKEREL_VERSION:?must be set in env file (run ./smackerel.sh config generate)}
        COMMIT_HASH: ${SMACKEREL_COMMIT:?must be set in env file (run ./smackerel.sh config generate)}
        BUILD_TIME: ${SMACKEREL_BUILD_TIME:?must be set in env file (run ./smackerel.sh config generate)}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # Mirrors deploy/compose.deploy.yml so dev stack runs hardened and
    # surfaces issues (e.g. unexpected writes to `/`) before deploy.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${CORE_HOST_PORT}:${CORE_CONTAINER_PORT}"
    env_file:
      # HL-RESCAN-012 / Gate G028 — fail-loud. Use ./smackerel.sh up
      # which exports SMACKEREL_ENV_FILE via --env-file, or set it
      # explicitly before invoking docker compose.
      - ${SMACKEREL_ENV_FILE:?must be set — use ./smackerel.sh up or export SMACKEREL_ENV_FILE=config/generated/dev.env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Override host paths with container-internal mount paths.
      # The env_file provides the host path; these overrides point to the
      # volume-mounted location inside the container. Container-internal mount
      # paths are bare literal architectural constants (matching the existing
      # AGENT_SCENARIO_DIR / PROMPT_CONTRACTS_DIR pattern below) — not subject
      # to Gate G028 because they are NOT runtime configuration. BUG-029-005.
      PORT: ${CORE_CONTAINER_PORT}
      BOOKMARKS_IMPORT_DIR: /data/bookmarks-import
      MAPS_IMPORT_DIR: /data/maps-import
      BROWSER_HISTORY_PATH: /data/browser-history/History
      TWITTER_ARCHIVE_DIR: /data/twitter-archive
      # Prompt contract YAMLs are mounted read-only at the container path below;
      # generated env values point at host paths, so override them for the
      # container view.
      AGENT_SCENARIO_DIR: /app/prompt_contracts
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      # BUG-029-005: Fail-loud SST contract for the 4 connector-fixture mount
      # paths. The shell-env > yaml-value > repo-default precedence (see
      # scripts/commands/config.sh) guarantees the env file always emits
      # a non-empty value, so these fail-loud forms can never be tripped
      # by an SST-emitted env file (Gate G028 / HL-RESCAN-012).
      - ${BOOKMARKS_IMPORT_DIR:?Gate G028 / HL-RESCAN-012 — must be SST-emitted; run ./smackerel.sh config generate or ./smackerel.sh up}:/data/bookmarks-import:ro
      - ${MAPS_IMPORT_DIR:?Gate G028 / HL-RESCAN-012 — must be SST-emitted; run ./smackerel.sh config generate or ./smackerel.sh up}:/data/maps-import:ro
      - ${BROWSER_HISTORY_PATH:?Gate G028 / HL-RESCAN-012 — must be SST-emitted; run ./smackerel.sh config generate or ./smackerel.sh up}:/data/browser-history/History:ro
      - ${TWITTER_ARCHIVE_DIR:?Gate G028 / HL-RESCAN-012 — must be SST-emitted; run ./smackerel.sh config generate or ./smackerel.sh up}:/data/twitter-archive:ro
      # Spec 037 Scope 10: scenario YAMLs read-only — paired with the
      # AGENT_SCENARIO_DIR override in `environment:` above. Operators
      # drop new YAMLs in the host dir and SIGHUP triggers Bridge.Reload.
      - ./config/prompt_contracts:/app/prompt_contracts:ro
      # Spec 061 SUBSTRATE-TOUCHPOINT-1 Option (b): sibling skills manifest
      # for the conversational assistant capability layer. The runtime
      # resolves the manifest at `filepath.Dir(AGENT_SCENARIO_DIR)/assistant/scenarios.yaml`
      # (see cmd/core/wiring_assistant_scenarios.go::assistantManifestRelPath)
      # so the mount target MUST be a sibling of /app/prompt_contracts.
      - ./config/assistant:/app/assistant:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${CORE_CONTAINER_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      com.smackerel.component: core
      com.smackerel.lifecycle: ephemeral

  smackerel-ml:
    # HL-RESCAN-012 / Gate G028 — fail-loud SST form. Empty value is
    # allowed (build-from-source dev pattern); unset is forbidden.
    image: ${SMACKEREL_ML_IMAGE?must be set in env file (run ./smackerel.sh config generate); empty value is allowed for build-from-source dev}
    build:
      context: ./ml
      dockerfile: Dockerfile
      args:
        # HL-RESCAN-012 / Gate G028 — build metadata is SST-managed; see
        # smackerel-core comment above for the resolution chain.
        VERSION: ${SMACKEREL_VERSION:?must be set in env file (run ./smackerel.sh config generate)}
        COMMIT_HASH: ${SMACKEREL_COMMIT:?must be set in env file (run ./smackerel.sh config generate)}
        BUILD_TIME: ${SMACKEREL_BUILD_TIME:?must be set in env file (run ./smackerel.sh config generate)}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${ML_CONTAINER_PORT}"]
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # HF cache + sentence-transformers cache + uvicorn temp files all live
    # under /tmp via the HF_HOME and SENTENCE_TRANSFORMERS_HOME overrides
    # in `environment:` below. Mirrors deploy/compose.deploy.yml.
    read_only: true
    tmpfs:
      - /tmp:size=768m,mode=1777,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${ML_HOST_PORT}:${ML_CONTAINER_PORT}"
    env_file:
      # HL-RESCAN-012 / Gate G028 — fail-loud. See smackerel-core for
      # the same enforcement.
      - ${SMACKEREL_ENV_FILE:?must be set — use ./smackerel.sh up or export SMACKEREL_ENV_FILE=config/generated/dev.env}
    environment:
      # Override: container-internal path for prompt contracts (mounted via volume)
      PROMPT_CONTRACTS_DIR: /app/prompt_contracts
      # Spec 045 FR-045-003 — redirect HuggingFace + sentence-transformers
      # caches into the read-only-root tmpfs at /tmp.
      HF_HOME: /tmp/hf-cache
      SENTENCE_TRANSFORMERS_HOME: /tmp/st-cache
    volumes:
      - ./config/prompt_contracts:/app/prompt_contracts:ro
      - ./config/nats_contract.json:/config/nats_contract.json:ro
    stop_grace_period: 15s
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${ML_CONTAINER_PORT}/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
    labels:
      com.smackerel.component: ml
      com.smackerel.lifecycle: ephemeral

  ollama:
    # Spec 043 — image hoisted to SST. Resolves to infrastructure.ollama.image
    # for dev/home-lab and infrastructure.ollama.test.image for the test stack.
    image: ${OLLAMA_IMAGE}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # Persistent model store stays on the named volume `ollama-data`
    # mounted at /root/.ollama. Mirrors deploy/compose.deploy.yml.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
      - /.ollama_tmp:size=64m,mode=1777,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT}:${OLLAMA_CONTAINER_PORT}"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    # spec 043 / BUG-002 (2026-05-10) — healthcheck command MUST invoke a
    # binary that exists in whichever ollama image the OLLAMA_IMAGE SST key
    # currently resolves to. The previous wget-spider form broke when
    # BUG-001 bumped infrastructure.ollama.test.image to a newer ollama
    # release whose base image ships neither wget nor curl in PATH. The
    # in-image `ollama list` CLI is a real liveness signal — exits 0 only
    # when the daemon is reachable on OLLAMA_HOST (default loopback on the
    # OLLAMA_CONTAINER_PORT). Adversarial guard:
    # tests/integration/ollama_healthcheck_test.go.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
    labels:
      com.smackerel.component: ollama
      com.smackerel.lifecycle: persistent

  # Spec 049 — Monitoring stack. Off by default; enable with
  # `docker compose --profile monitoring up -d`. Prometheus scrapes
  # smackerel-core:${CORE_CONTAINER_PORT}/metrics and
  # smackerel-ml:${ML_CONTAINER_PORT}/metrics over the compose
  # network using service names (no IPs or hostnames). The rendered
  # /etc/prometheus/prometheus.yml comes from
  # config/generated/prometheus.yml (regenerate via
  # `./smackerel.sh config generate`). Alert rules are static at
  # config/prometheus/alerts.yml. The contract tests in
  # internal/deploy/monitoring_*_contract_test.go enforce these
  # invariants at build time.
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    restart: unless-stopped
    # Spec 045 FR-045-003 — read-only root with explicit tmpfs allowlist.
    # The TSDB lives on a named volume mounted at /prometheus. Only /tmp
    # is allowed as writable tmpfs (Prometheus uses it for query buffers).
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: nobody
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS}d"
      - "--web.listen-address=:${PROMETHEUS_CONTAINER_PORT}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT}:${PROMETHEUS_CONTAINER_PORT}"
    volumes:
      - prometheus-data:/prometheus
      - ./config/generated/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PROMETHEUS_CONTAINER_PORT}/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      com.smackerel.component: prometheus
      com.smackerel.lifecycle: ephemeral

  # Spec 061 design §18.4 — In-tree stub HTTP container for external
  # provider URLs (open-meteo and any future provider-backed skill).
  # Lifecycle: ENABLED ONLY when the `test` profile is selected
  # (scripts/lib/runtime.sh adds `--profile test` iff TARGET_ENV=test).
  # Production and dev stacks NEVER see this container, and the
  # §18.3 production-safety guard in internal/config/assistant.go
  # rejects startup if any non-test env contains the substring
  # `stub-providers` in a URL key. Zero persistent volume — fully
  # recreated per test run per bubbles-test-environment-isolation.
  stub-providers:
    image: nginx:alpine
    container_name: smackerel-test-stub-providers
    profiles:
      - test
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=8m,mode=1777,nosuid,noexec,nodev
      - /var/run:size=8m,mode=1777,nosuid,nodev
      - /tmp:size=8m,mode=1777,nosuid,noexec,nodev
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./tests/e2e/stub-providers/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tests/e2e/stub-providers/fixtures:/usr/share/nginx/html/fixtures:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M
    labels:
      com.smackerel.component: test-stub
      com.smackerel.lifecycle: ephemeral

  # Spec 061 SCOPE-09a design §8.3.2 Step 1 — Jaeger all-in-one sidecar
  # for OTel span emission. Lifecycle: ENABLED ONLY when the `test` or
  # `dev-otel` compose profile is selected (matches §18.4 stub-providers
  # pattern). Production and home-lab stacks NEVER see this container.
  # When started, the test/dev core flips ASSISTANT_OBSERVABILITY_OTEL_ENABLED=true
  # via env override and points ASSISTANT_OBSERVABILITY_OTEL_ENDPOINT at
  # smackerel-test-jaeger:4317 so OTLP/gRPC spans land in the in-memory
  # Jaeger UI at :16686 for the per-turn span-tree assertion test in
  # SCOPE-09b. Zero persistent volume — fully recreated per test run
  # per bubbles-test-environment-isolation.
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: smackerel-test-jaeger
    profiles:
      - test
      - dev-otel
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      # Jaeger UI (browser-accessible during dev-otel sessions).
      - "127.0.0.1:16686:16686"
      # OTLP/gRPC receiver — what cmd/core's exporter dials.
      - "127.0.0.1:4317:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:14269/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      com.smackerel.component: jaeger-sidecar
      com.smackerel.lifecycle: ephemeral

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME}
  nats-data:
    name: ${NATS_VOLUME_NAME}
  ollama-data:
    name: ${OLLAMA_VOLUME_NAME}
  prometheus-data:
    name: ${PROMETHEUS_VOLUME_NAME}
