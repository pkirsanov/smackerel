# Smackerel Docker Compose
# Usage: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: smackerel
      POSTGRES_PASSWORD: smackerel
      POSTGRES_DB: smackerel
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smackerel -d smackerel"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      com.smackerel.component: postgres
      com.smackerel.lifecycle: persistent

  nats:
    image: nats:latest
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      com.smackerel.component: nats
      com.smackerel.lifecycle: ephemeral

  smackerel-core:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      com.smackerel.component: core
      com.smackerel.lifecycle: ephemeral

  smackerel-ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      com.smackerel.component: ml
      com.smackerel.lifecycle: ephemeral

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    profiles:
      - ollama
    labels:
      com.smackerel.component: ollama
      com.smackerel.lifecycle: persistent
